<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>papermap</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
  <aside id="sidebar">
    <h1>papermap</h1>
    <ul id="corpora"></ul>
  </aside>
  <section id="content">
    <nav id="viewtabs" hidden>
      <button data-view="browse">Resources</button>
      <button data-view="map">Map</button>
      <button data-view="topics">Topics</button>
      <button data-view="blogs">Blogs</button>
      <button data-view="timeline">Timeline</button>
    </nav>
    <div id="filterbar" hidden></div>
    <main id="main">
      <p class="placeholder">Pick a corpus from the sidebar.</p>
    </main>
  </section>
  <button id="lang-toggle" type="button" title="Switch language / 切换语言">中</button>
  <button id="zen-toggle" type="button" title="Zen mode (Esc to exit)">Z</button>
  <script type="module" src="{{ url_for('static', filename='lang.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='zen.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='comments.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
