# ----- DATASETS -----
- id: tcga-pancan
  pinned: true
  kind: dataset
  label: TCGA pan-cancer (RNA-seq + SNP array + WES)
  modality: multi-omics
  year: 2018
  status: open
  access: open
  papermap_category: datasets
  url: https://portal.gdc.cancer.gov/
  topics:
  - pan-cancer
  - multi-omics
  - genomics
  why: The main arena for Aims 1–4 — provides the bulk RNA-seq for signature scoring, the SNP array / WES for HRDsum + BRCA1/2 calls, and per-cancer cohort sizes that let the project move from per-tumor associations to pan-cancer mixed models.

- id: cptac-pancan-2024
  pinned: true
  kind: dataset
  label: CPTAC pan-cancer proteogenomics (10 cancer types, 1,043 patients)
  modality: proteomics
  year: 2024
  status: open
  access: open
  papermap_category: datasets
  url: https://proteomic.datacommons.cancer.gov/
  topics:
  - pan-cancer
  - proteomics
  - multi-omics
  why: The cross-validation layer for Aim 5 — confirms transcript-level CCR8/eTreg/IFN findings hold at the protein and phosphosite level. 10 cancer types covers most of the project's pan-cancer scope.
  qa:
    did: Provides matched genomic, transcriptomic, proteomic, and phosphoproteomic measurements across 10 cancer types and 1,043 patients in the harmonized CPTAC pan-cancer release.
    purpose: To enable cross-omic validation of any transcript-level finding — does the protein and phospho readout agree with the RNA story?
    method: Matched multi-omic profiling on the same tumor samples; reprocessed by the CPTAC consortium with shared pipelines; surfaced via the Proteomic Data Commons.
    result: A pan-cancer multi-omic resource that this project uses to confirm CCR8, LAG3, TNFRSF18, and IFN-pathway members are concordantly altered at the protein/phospho level in HRD tumors, not just at the transcript level.

