# ----- ANCHOR -----
- id: luo-2024
  pinned: true
  starred: true
  kind: paper
  label: Luo et al. — PARPi or chemo neoadjuvant in ovarian cancer informs effector-Treg targeting in HRD
  modality: single-cell-rna
  year: 2024
  released: '2024-08'
  status: published
  org_type: academic
  region: China
  papermap_category: anchor
  url: https://doi.org/10.1016/j.cell.2024.06.013
  people:
  - Luo Y
  - Xia Y
  - Liu D
  - Liang H
  - Gao Q
  topics:
  - hrd
  - parpi
  - ccr8
  - treg
  - exhausted-cd8
  - interferon
  - mhc-class-ii
  - ovarian-cancer
  - single-cell
  why: The mechanism anchor — HRD → IFN signaling → tumor-cell MHC-II^hi + co-inhibitory ligands → CCR8⁺ terminal eTreg enrichment (co-occurring with terminally exhausted CD8); in CCR8-humanized mice bearing orthotopic Trp53⁻/⁻;Brca1⁻/⁻ ID8 tumors, niraparib + anti-CCR8 (ZL-1218) produced significantly greater tumor suppression than either agent alone. Closes the loop in HGSOC; opens the pan-cancer question this project answers.
  qa:
    did: Used scRNA + TCR repertoire on neoadjuvant-niraparib HGSOC samples (phase II NCT04507841) to trace how HRD reshapes the tumor microenvironment, then validated the mechanism in CCR8-humanized (hCCR8 knock-in) mice with niraparib + anti-CCR8 (ZL-1218) combination treatment.
    purpose: To identify which tumor-immune circuit explains why HRD tumors should — but often don't — sustain durable anti-tumor immunity under PARPi, and to convert that circuit into a druggable combination hypothesis.
    method: Single-cell transcriptomes + paired TCR clones from HGSOC patients on the phase II niraparib arm; comparison of HRD vs HRP patients; in-vivo combination of niraparib with the clinical-stage anti-CCR8 antibody ZL-1218 in CCR8-humanized mice bearing orthotopic Trp53⁻/⁻;Brca1⁻/⁻ ID8 ovarian tumors, plus a parallel anti-CD25 arm as an alternative eTreg-depletion control.
    result: HRD enriches CCR8⁺ terminal effector Tregs co-occurring with terminally exhausted CD8 T cells; tumor cells in HRD samples upregulate MHC-II and co-inhibitory ligands consistent with IFN conditioning; niraparib + ZL-1218 produces significantly greater tumor suppression than either agent alone — niraparib monotherapy still attenuates tumor progression on its own, the combination simply goes further.

# ----- HRD GENOMICS -----
- id: knijnenburg-2018
  starred: true
  kind: paper
  label: Knijnenburg et al. — Genomic and molecular landscape of DDR deficiency across TCGA
  modality: genomics
  year: 2018
  status: published
  org_type: academic
  region: US
  papermap_category: hrd-genomics
  url: https://doi.org/10.1016/j.celrep.2018.03.076
  topics:
  - hrd
  - dna-repair
  - pan-cancer
  - signatures
  why: The canonical TCGA pan-cancer HRD landscape — gives the HRDsum (LOH+LST+TAI) scores plus per-cancer distributions this project uses as its primary genomic-scar definition.

- id: hrd-npj-2022
  kind: paper
  label: npj Precision Oncology 2022 — HRD genomic scar patterns pan-cancer
  modality: genomics
  year: 2022
  status: published
  papermap_category: hrd-genomics
  url: https://www.nature.com/articles/s41698-022-00276-6
  topics:
  - hrd
  - pan-cancer
  - signatures
  why: Cautionary anchor — shows the HRDsum ≥42 cutpoint optimal for ovarian is suboptimal in other cancer types, motivating the project's tumor-type-specific cutpoint sensitivity analysis.

- id: hrd-scirep-2023
  kind: paper
  label: Sci Rep 2023 — Pan-cancer HRD → exhausted T → anti-PD-1 response
  modality: bulk-rna
  year: 2023
  status: published
  papermap_category: hrd-genomics
  url: https://www.nature.com/articles/s41598-023-31888-y
  topics:
  - hrd
  - exhausted-cd8
  - immunotherapy
  - pan-cancer
  why: The closest prior pan-cancer link from HRD to immune exhaustion to anti-PD-1 response — establishes the broad pattern this project will refine into a CCR8/IFN-specific stratifier.

- id: hrd-humancell-2021
  kind: paper
  label: Human Cell 2021 — HRD score as predictive marker for immunotherapy
  modality: clinical
  year: 2021
  status: published
  papermap_category: hrd-genomics
  url: https://link.springer.com/journal/13577
  topics:
  - hrd
  - immunotherapy
  why: Treats HRD as a candidate IO biomarker; useful as a precedent for the project's stratifier framing while making clear that HRD alone (without IFN/eTreg gating) is too coarse.

- id: hrd-tme-2025
  kind: review
  label: Biomarker Research 2025 — The distinct landscape of TME in HRD cancers
  modality: bulk-rna
  year: 2025
  status: published
  papermap_category: hrd-genomics
  url: https://biomarkerres.biomedcentral.com/
  topics:
  - hrd
  - tumor-microenvironment
  - interferon
  - immunotherapy
  why: Synthesizes the dynamic balance of early immune activation vs late immunosuppression in HRD tumors — the conceptual frame this project operationalizes as a stratifier.

# ----- IFN BRIDGE -----
- id: cgas-sting-parpi-review
  kind: review
  label: PARPi-induced cGAS-STING and type I IFN (mechanism review)
  modality: dna-damage
  year: 2023
  status: published
  papermap_category: ifn-bridge
  topics:
  - parpi
  - cgas-sting
  - interferon
  - dna-damage
  why: Background for the IFN bridge — DNA damage → cytosolic DNA → cGAS-STING → type I IFN — the mechanism that lets HRD/PARPi remodel the TME at all.

- id: ifn-double-edge-review
  kind: review
  label: The double edge of IFN in the tumor microenvironment
  modality: bulk-rna
  year: 2022
  status: published
  papermap_category: ifn-bridge
  topics:
  - interferon
  - mhc-class-ii
  - tumor-microenvironment
  - exhausted-cd8
  why: Frames the central tension this project measures — IFN recruits effector T cells and simultaneously upregulates PD-L1/MHC-II/co-inhibitory ligands; useful to cite when arguing the eTreg enrichment is IFN-conditioned, not IFN-absent.

# ----- CCR8 / eTreg -----
- id: ccr8-target-review-2025
  starred: true
  kind: review
  label: CCR8 — a promising therapeutic target against tumor-infiltrating Treg cells (Gao lab review, 2025)
  modality: bulk-rna
  year: 2025
  status: published
