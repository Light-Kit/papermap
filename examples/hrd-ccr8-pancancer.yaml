  - single-cell
  - tumor-microenvironment
  why: The rare per-patient germline-BRCA1 single-cell dataset — 69 specimens (incl. BRCA1+/– preneoplastic tissue), GSE161529. Critical for asking what BRCA1-heterozygous epithelium looks like before tumor — the IFN baseline reference.

- id: wu-2021-breast
  kind: paper
