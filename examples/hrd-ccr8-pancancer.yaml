title: HRD × CCR8⁺ eTreg — a pan-cancer multi-omics vault
subtitle: A project-notebook vault for the bet that HRD tumors carry an IFN-conditioned CCR8⁺ effector-Treg immunosuppressive program — and that the (HRD-high × IFN/eTreg-high) intersection defines a pan-cancer subgroup suited to PARPi + anti-CCR8. Anchor paper, supporting literature across HRD/PARPi · IFN-cGAS-STING · CCR8-eTreg, the datasets and signatures the analysis depends on, the anti-CCR8 antibody pipeline, and the relevant trials. Compare lines up the antibodies; Topics surfaces the three threads; Blogs hosts the literature review + analysis plan.
