  - signatures
  - breast-cancer
  - ovarian-cancer
  why: 497 breast + 561 ovarian; defines the GIS ≥42 (LOH+TAI+LST) threshold at 95% sensitivity for BRCA1/2 loss. The FDA-CDx anchor (NOVA/PRIMA/PAOLA companion) — needed to justify per-cancer cutpoint deviations.

