# ----- PAN-CANCER ATLASES -----
- id: zheng-2021-tcell
  starred: true
  kind: paper
  label: Zheng et al. — Pan-cancer single-cell landscape of tumor-infiltrating T cells (Science 2021)
  modality: single-cell-rna
  year: 2021
  status: published
  org_type: academic
  region: China
  papermap_category: atlas-singlecell
  url: https://doi.org/10.1126/science.abe6474
  people:
  - Zheng L
  - Qin S
  - Zhang Z
  topics:
  - single-cell
  - treg
  - exhausted-cd8
  - pan-cancer
  - tumor-microenvironment
  why: The pan-cancer T-cell atlas (21 cancer types, 316 patients, ~390k T cells) — confirms CCR8 marks intratumoral eTregs across tumor types and supplies the per-cancer eTreg fractions this project will compare against HRD surrogates.
  qa:
    did: Built a pan-cancer single-cell atlas of tumor-infiltrating T cells across 21 cancer types and 316 patients, integrating ~390k T cells with paired TCR repertoire information.
    purpose: To answer whether T-cell states (Treg, exhausted, effector) are shared archetypes across cancers or tumor-type-specific, and to provide a reference panel future single-cell studies can map onto.
    method: Integrated scRNA + paired TCR sequencing across multiple datasets; defined cell states by clustering; quantified per-tumor-type fractions and TCR-clonotype sharing across states.
    result: Identified recurring T-cell states — including CCR8-defined effector Tregs and terminally exhausted CD8 — that appear across cancer types at variable abundance; established the shared-archetype framing the project applies pan-cancer.

