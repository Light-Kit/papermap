  why: Used to estimate per-sample immune-cell fractions (Tregs, CD8 subsets, DCs) — gives the "total immune infiltrate" covariate that confounder-controls the project's main claim.

- id: exphrd-2024
  kind: tool
  label: expHRD — transcriptome-based HRD prediction (cohort-independent ssGSEA)
