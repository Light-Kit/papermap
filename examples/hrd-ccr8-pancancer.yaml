  - pan-cancer
  - signatures
  why: The canonical TCGA pan-cancer HRD landscape — gives the HRDsum (LOH+LST+TAI) scores plus per-cancer distributions this project uses as its primary genomic-scar definition.

- id: hrd-npj-2022
  kind: paper
  label: npj Precision Oncology 2022 — HRD genomic scar patterns pan-cancer
  modality: genomics
  year: 2022
  status: published
  papermap_category: hrd-genomics
  url: https://www.nature.com/articles/s41698-022-00276-6
  topics:
  - hrd
  - pan-cancer
  - signatures
  why: Cautionary anchor — shows the HRDsum ≥42 cutpoint optimal for ovarian is suboptimal in other cancer types, motivating the project's tumor-type-specific cutpoint sensitivity analysis.

- id: hrd-scirep-2023
  kind: paper
  label: Sci Rep 2023 — Pan-cancer HRD → exhausted T → anti-PD-1 response
  modality: bulk-rna
  year: 2023
  status: published
  papermap_category: hrd-genomics
  url: https://www.nature.com/articles/s41598-023-31888-y
  topics:
  - hrd
  - exhausted-cd8
  - immunotherapy
  - pan-cancer
  why: The closest prior pan-cancer link from HRD to immune exhaustion to anti-PD-1 response — establishes the broad pattern this project will refine into a CCR8/IFN-specific stratifier.

- id: hrd-humancell-2021
  kind: paper
  label: Human Cell 2021 — HRD score as predictive marker for immunotherapy
  modality: clinical
  year: 2021
  status: published
  papermap_category: hrd-genomics
  url: https://link.springer.com/journal/13577
  topics:
  - hrd
  - immunotherapy
  why: Treats HRD as a candidate IO biomarker; useful as a precedent for the project's stratifier framing while making clear that HRD alone (without IFN/eTreg gating) is too coarse.

- id: hrd-tme-2025
  kind: review
  label: Biomarker Research 2025 — The distinct landscape of TME in HRD cancers
  modality: bulk-rna
  year: 2025
  status: published
  papermap_category: hrd-genomics
  url: https://biomarkerres.biomedcentral.com/
  topics:
  - hrd
  - tumor-microenvironment
  - interferon
  - immunotherapy
  why: Synthesizes the dynamic balance of early immune activation vs late immunosuppression in HRD tumors — the conceptual frame this project operationalizes as a stratifier.

# ----- IFN BRIDGE -----
- id: cgas-sting-parpi-review
  kind: review
  label: PARPi-induced cGAS-STING and type I IFN (mechanism review)
  modality: dna-damage
  year: 2023
  status: published
  papermap_category: ifn-bridge
  topics:
  - parpi
  - cgas-sting
  - interferon
  - dna-damage
  why: Background for the IFN bridge — DNA damage → cytosolic DNA → cGAS-STING → type I IFN — the mechanism that lets HRD/PARPi remodel the TME at all.

- id: ifn-double-edge-review
  kind: review
  label: The double edge of IFN in the tumor microenvironment
  modality: bulk-rna
  year: 2022
  status: published
  papermap_category: ifn-bridge
  topics:
  - interferon
  - mhc-class-ii
  - tumor-microenvironment
  - exhausted-cd8
  why: Frames the central tension this project measures — IFN recruits effector T cells and simultaneously upregulates PD-L1/MHC-II/co-inhibitory ligands; useful to cite when arguing the eTreg enrichment is IFN-conditioned, not IFN-absent.

# ----- CCR8 / eTreg -----
- id: ccr8-target-review-2025
  starred: true
  kind: review
  label: CCR8 — a promising therapeutic target against tumor-infiltrating Treg cells (Gao lab review, 2025)
  modality: bulk-rna
  year: 2025
  status: published
  org_type: academic
  region: China
  papermap_category: ccr8-etreg
  topics:
  - ccr8
  - treg
  - immunotherapy
  - pan-cancer
  why: Closest review to the project's scope — argues CCR8 is the right Treg target and walks through per-cancer evidence; the project differentiates by adding HRD/IFN gating.

- id: ccr8-onco-2022
  kind: paper
  label: OncoImmunology 2022 — GS-1811 anti-CCR8 antibody + TCGA Treg target screen
  modality: bulk-rna
  year: 2022
  status: published
  papermap_category: ccr8-etreg
  url: https://www.tandfonline.com/journals/koni20
  topics:
  - ccr8
  - treg
  - immunotherapy
  why: Established intratumoral-Treg specificity of CCR8 across TCGA and the depletion-antibody approach; the technical precedent every later anti-CCR8 program cites.

- id: ccr8-lung-tcga
  kind: paper
  label: CCR8⁺ Treg in non-small-cell lung cancer — TCGA + function
  modality: bulk-rna
  year: 2023
  status: published
  papermap_category: ccr8-etreg
  topics:
  - ccr8
  - treg
  - immunotherapy
  why: Per-cancer evidence — confirms the CCR8⁺ eTreg pattern in NSCLC; one of the lung pieces of the pan-cancer landscape this project will systematize.

- id: ccr8-colorectal-tcga
  kind: paper
  label: CCR8⁺ Treg in colorectal cancer — TCGA + function
  modality: bulk-rna
  year: 2023
  status: published
  papermap_category: ccr8-etreg
  topics:
  - ccr8
  - treg
  - immunotherapy
  why: Per-cancer evidence in colorectal — relevant because CRC has both MSI-high (decoupled from HRD) and MSS subtypes the project must separate.

- id: ccr8-hcc-tcga
  kind: paper
  label: CCR8⁺ Treg in hepatocellular carcinoma — TCGA + function
  modality: bulk-rna
