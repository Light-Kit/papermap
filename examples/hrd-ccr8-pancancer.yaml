# ----- HRD SCORING METHODS -----
- id: davies-2017-hrdetect
  starred: true
  kind: signature
  label: HRDetect (Davies et al. — WGS lasso HRD classifier, Nat Med 2017)
  modality: genomics
  year: 2017
  status: published
  papermap_category: signatures
  url: https://doi.org/10.1038/nm.4292
  people:
  - Davies H
  - Nik-Zainal S
  topics:
  - hrd
  - signatures
  - dna-repair
  why: WGS HRD classifier — lasso on 6 features (SBS3, SBS8, RS3, RS5, microhomology-deletion fraction, HRD-index). Cutpoint ≥0.7. AUC ~0.98 vs CHORD ~0.95. The reference WGS classifier; use on Hartwig / PCAWG-style WGS cohorts.

- id: sztupinszki-2018-scarhrd
  starred: true
  kind: tool
  label: scarHRD (Sztupinszki et al. — open R package for WES/WGS HRDsum, npj Breast Cancer 2018)
  modality: genomics
  year: 2018
  status: published
  papermap_category: signatures
  url: https://doi.org/10.1038/s41523-018-0066-6
  topics:
  - hrd
  - signatures
  why: Open R package that ports the Knijnenburg/Telli HRDsum to NGS (WES/WGS via Sequenza/ASCAT segments). Default cutpoint HRDsum ≥42. Turn-key WES → HRDsum for TCGA/CPTAC re-runs.

- id: telli-2016-mychoice
  kind: paper
  label: Telli et al. — Myriad myChoice GIS ≥42 cutpoint origin (Clin Cancer Res 2016)
  modality: genomics
  year: 2016
