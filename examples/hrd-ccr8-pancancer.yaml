  - signatures
  - immunotherapy
  why: Lets the project add HRD calls to RNA-seq-only cohorts (especially ICI clinical cohorts), bridging Aim 6's translational test where SNP/WES isn't available.

# ----- ANTI-CCR8 ANTIBODY PIPELINE -----
- id: zl-1218
  starred: true
  kind: drug
