  - ovarian-cancer
  why: ARIEL2 part 1 HGSOC PFS endpoint — established the FoundationFocus / F1CDx LOH ≥14% (refined to ≥16% in ARIEL3) HRD-positive call. The rucaparib-specific operating point; orthogonal to HRDsum.

- id: hodgson-2018-ariel3-loh
