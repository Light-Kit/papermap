# ----- SIGNATURES / METHODS -----
- id: hrdsum
  kind: signature
  label: HRDsum (LOH + LST + TAI/NtAI)
  modality: genomics
  year: 2018
  status: published
  papermap_category: signatures
  url: https://doi.org/10.1016/j.celrep.2018.03.076
  topics:
  - hrd
  - signatures
  - dna-repair
  why: Primary genomic-scar HRD score; the composite metric of Knijnenburg 2018 used as the main HRD definition with tumor-type-specific cutpoints (sensitivity analysis required outside ovarian).

- id: sbs3
  kind: signature
  label: SBS3 — Mutational signature of HR-deficiency (COSMIC v3)
  modality: genomics
  year: 2020
  status: published
  papermap_category: signatures
  url: https://cancer.sanger.ac.uk/signatures/sbs/sbs3/
  topics:
  - hrd
  - signatures
  - dna-repair
  why: Orthogonal HRD definition based on SNV patterns — used to test whether genomic-scar HRD and mutational-signature HRD agree pan-cancer (they don't always; the disagreement is itself a result).

- id: etreg-signature
  starred: true
  kind: signature
  label: Cell 2024 terminal eTreg gene signature (CCR8 + LAG3 + TNFRSF18 + …)
  modality: single-cell-rna
  year: 2024
  status: published
  papermap_category: signatures
  url: https://doi.org/10.1016/j.cell.2024.06.013
  topics:
  - ccr8
  - treg
  - signatures
  - signatures
  why: Reused directly from Luo 2024 so the pan-cancer comparison stays apples-to-apples with the mechanism paper. Scored via ssGSEA on bulk RNA, validated against single-cell.

- id: ifn-isg-signature
  kind: signature
  label: Type-I IFN / ISG response signature (Liberzon Hallmark)
  modality: bulk-rna
  year: 2015
  status: published
  papermap_category: signatures
  url: https://www.gsea-msigdb.org/gsea/msigdb/cards/HALLMARK_INTERFERON_ALPHA_RESPONSE
  topics:
  - interferon
  - signatures
  why: The standard ISG / type-I IFN signature; used to estimate IFN-conditioning of the TME in bulk RNA samples (the IFN axis of the 2D / 3D stratifier).

- id: ssgsea
  kind: tool
  label: ssGSEA — single-sample gene set enrichment
  modality: bulk-rna
  year: 2009
  status: published
  papermap_category: signatures
  url: https://www.gsea-msigdb.org/
  topics:
  - signatures
  why: Scoring engine for the eTreg and IFN signatures; sample-level scores that can be regressed against HRD status with covariates.

- id: cibersortx
  kind: tool
  label: CIBERSORTx — bulk transcriptome deconvolution
  modality: bulk-rna
  year: 2019
  status: published
  papermap_category: signatures
  url: https://cibersortx.stanford.edu/
  topics:
  - signatures
  - deconvolution
  why: Used to estimate per-sample immune-cell fractions (Tregs, CD8 subsets, DCs) — gives the "total immune infiltrate" covariate that confounder-controls the project's main claim.

- id: exphrd-2024
  kind: tool
  label: expHRD — transcriptome-based HRD prediction (cohort-independent ssGSEA)
  modality: bulk-rna
  year: 2024
  status: published
  papermap_category: signatures
  topics:
  - hrd
  - signatures
  - immunotherapy
  why: Lets the project add HRD calls to RNA-seq-only cohorts (especially ICI clinical cohorts), bridging Aim 6's translational test where SNP/WES isn't available.

