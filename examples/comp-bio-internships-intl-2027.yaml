title: comp-bio PhD internships — international (2027 target)
subtitle: 'Non-US summer-internship tracker for a computational-biology PhD — 193 companies/labs and 238
  roles across UK & Europe, China, Singapore/Japan/Korea, and Canada/Australia. Filter Resources by region
  (modality) and research topic. Eligibility is flagged for a Chinese-national (PRC) candidate: China
  roles are visa-free (Work-auth ✓); elsewhere needs an intern/work-permit and host support (✓ = explicitly
  international-friendly · ? = verify · ✗ = nationals/PR only or no sponsorship). Built from the 2026
  cycle + recurring programs — Summer-2027 links are not posted yet; rows show the recurring/closed-2026
  templates they follow. The US vault is separate.'
vocab:
  kind:
