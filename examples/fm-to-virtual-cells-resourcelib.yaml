    purpose: 'The aim was to make structure prediction directly useful for drug-design pipelines that need protein-ligand and protein-DNA pose prediction rather than just monomer folds. Together with RFDiffusion for de novo design and ESM-3 for multimodal generation, AF3 forms the 2024-2025 protein-design trio that pharma now treats as table stakes.'
    method: 'AF3 generalises the AlphaFold2 architecture to predict joint structures of proteins together with nucleic acids, ions, and ligands. The model operates over a heterogeneous biomolecular vocabulary and produces complex-level coordinates, replacing the per-modality stitching that drug-design pipelines previously assembled from separate single-task tools.'
    result: 'AF3 made complex-structure prediction directly available to drug-design pipelines covering protein-ligand and protein-DNA poses. The closed-weights hosted-API distribution drew academic pushback against the closed-weights precedent and sits at one corner of the protein-design trio with RFDiffusion and ESM-3 that pharma drug-discovery groups now treat as table stakes.'
