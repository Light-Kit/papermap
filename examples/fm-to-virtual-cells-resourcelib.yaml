  description: torchcfm is the conditional flow-matching library that provides the mathematical foundation used by several Virtual Cell Challenge winners and a growing set of perturbation-prediction methods. As infrastructure rather than a model in itself, it lowers the cost of building flow-matching variants by handling the path-construction, vector-field-parameterisation, and training-loop details that would otherwise be reinvented in each paper. The result is that flow-matching has spread faster in single-cell biology than it would have without a reference implementation, including into the perturbation-prediction work behind CellFlow and Squidiff. For a working researcher it is the right starting point for any flow-matching experiment on biological data. The open question is how long torchcfm remains the de facto standard before either a more biology-specific fork emerges or the broader generative-modelling community moves on to a successor formulation; both are plausible on a two-to-three-year horizon.
- id: scarches
