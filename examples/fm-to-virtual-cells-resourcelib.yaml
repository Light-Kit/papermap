  why: Adapter-style PEFT cuts scLLM fine-tuning to <4% params and beats zero-shot — practical answer to the reckoning.
  description: A 2025 Nature Machine Intelligence paper showing that adapter-style parameter-efficient fine-tuning (PEFT) lets single-cell large language models like scGPT and Geneformer be specialised with under 4% of their parameters trained, while consistently outperforming zero-shot transfer. The result matters because the 2025 single-cell foundation model reckoning hinged on whether multi-billion-parameter scLLMs actually transfer better than simpler baselines once you account for compute and overfitting; this work offers a pragmatic middle path, conceding that full fine-tuning is wasteful and zero-shot is unreliable, and converging on adapter tuning as the deployable default. Coming from a Chinese academic group, it is also a sign that PEFT recipes from NLP are migrating into single-cell tooling rather than being reinvented. What remains open is whether adapter-tuned scLLMs hold up against well-tuned linear baselines on perturbation prediction, the harder benchmark category where the reckoning bit hardest.
