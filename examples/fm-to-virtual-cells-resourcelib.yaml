  why: 650M-parameter model pushing the scale frontier for single-cell foundation models.
  papermap_category: scfm
  description: AIDO.Cell is a 650-million-parameter single-cell foundation model from GenBio, pushing the scale frontier for cellular pretraining well beyond scGPT and Geneformer. The bet is that the same scaling laws that drove progress in language models also apply to single-cell data, and that gains will appear once parameter counts cross some threshold; the alternative reading, supported by the 2025 linear-baseline critiques, is that scale alone does not fix the underlying data and metric problems. Either way the model is one of the largest publicly released single-cell foundation models and serves as a useful test case for the scale hypothesis. The open repository makes it inspectable. The open question is whether AIDO.Cell beats well-tuned smaller baselines on the post-reckoning benchmarks rather than only on the legacy ones, and whether the scaling curve flattens, breaks, or continues at this regime.
  qa:
    did: 'AIDO.Cell is a 650-million-parameter single-cell foundation model from GenBio that pushes the scale frontier for cellular pretraining well beyond scGPT and Geneformer. It is positioned as a direct test of whether the scaling laws driving language-model progress also apply to single-cell data at a serious parameter count.'
    purpose: 'The aim was to stress-test the scale hypothesis for single-cell foundation models by pushing parameter count beyond the scGPT-Geneformer regime, on the bet that gains appear only once some threshold is crossed. The alternative reading, supported by 2025 linear-baseline critiques, is that scale alone does not fix the underlying data and metric problems.'
    method: 'The architecture follows the tokenised-gene-expression transformer family established by scGPT and Geneformer but scales pretrained parameters to 650M. The release is open enough to inspect tokenisation and training choices, which matters for diagnosing whether any observed gains come from scale itself or from incidental recipe changes.'
    result: 'AIDO.Cell is one of the largest publicly released single-cell foundation models and a useful test case for the scale hypothesis. The open question is whether it beats well-tuned smaller baselines on post-reckoning benchmarks rather than only legacy ones, and whether the scaling curve flattens, breaks, or continues at this regime.'
- id: celloracle
  kind: tool
  modality: multimodal
  name: CellOracle
  url: https://github.com/morris-lab/CellOracle
  topics:
  - perturbation-prediction
  - foundation-model
  why: GRN simulation using ATAC-seq-derived regulatory networks; strong on developmental trajectory perturbations, requires multi-omic input (Nature, 2023).
  papermap_category: other_fm
  year: 2023
  venue: Nature
  status: published
  description: 'CellOracle is a perturbation-prediction tool published in Nature in 2023 that simulates gene regulatory networks reconstructed from ATAC-seq, using the inferred GRN to propagate the effects of a knockout across the transcriptome. The strength is on developmental-trajectory perturbations, where the GRN scaffold provides useful inductive bias, and the requirement is real: CellOracle needs paired chromatin accessibility data rather than RNA alone. That requirement also bounds where it can be applied. Within the perturbation-prediction landscape it occupies a distinctive position as one of the few methods grounded in an explicit regulatory mechanism rather than a learned embedding, which makes it both interpretable and harder to extend to perturbations the GRN does not cover. For the virtual-cell agenda it is a useful baseline against which black-box predictors should be measured. The open question is how CellOracle compares to flow-matching and diffusion models on contemporary benchmarks.'
  qa:
    did: 'CellOracle, published in Nature 2023, introduced a perturbation-prediction tool that simulates gene regulatory networks reconstructed from ATAC-seq. The inferred GRN propagates the effects of a knockout across the transcriptome, providing one of the few mechanism-grounded predictors in the perturbation field, particularly strong on developmental trajectories.'
    purpose: 'The aim was to give perturbation prediction an explicit regulatory mechanism rather than a learned black-box embedding, so the simulated effects are interpretable and grounded in inferred transcription-factor activity. Developmental trajectories benefit most because the GRN scaffold provides useful inductive bias for the lineage transitions black-box predictors struggle with.'
    method: 'ATAC-seq data feed GRN inference, producing transcription-factor-to-target edges. A simulation step then propagates a knockout through the inferred network to predict downstream transcriptome shifts. The requirement for paired chromatin-accessibility data is real and bounds where the method can be applied compared to RNA-only competitors.'
    result: 'CellOracle established itself as one of the few perturbation methods grounded in an explicit regulatory mechanism rather than a learned embedding, making it both interpretable and harder to extend to perturbations the GRN does not cover. The open question is how it compares to flow-matching and diffusion models on contemporary benchmarks.'
- id: pdgrapher
  kind: tool
  modality: other
  name: PDGrapher
  url: https://github.com/mims-harvard/PDGrapher
  topics:
  - perturbation-prediction
  - foundation-model
  why: Inverts the perturbation problem by asking what intervention fixes a disease state rather than what a perturbation does; uniquely clinically relevant framing (Nature BME, 2025).
  papermap_category: other_fm
  year: 2025
  venue: Nature BME
  status: published
  description: 'PDGrapher is a 2025 Nature Biomedical Engineering paper from the Marinka Zitnik group that inverts the standard perturbation-prediction question: instead of asking what a known perturbation does to a cell, it asks what intervention would move a diseased cell back toward a healthy reference. The reformulation matters because the inverse framing is what actually maps onto drug discovery, where the target intervention is the unknown. PDGrapher operates over molecular graphs and protein-protein interaction networks, which gives it a different inductive bias than the embedding-space methods that dominate the field. Within the virtual-cell stack it sits alongside UNAGI as one of a small number of methods designed explicitly for clinical relevance rather than benchmark performance. The open question is how well the inverse predictions translate to wet-lab validation, and whether the PPI-network prior generalises to disease contexts where the relevant biology is not captured in current interactome databases.'
  qa:
    did: 'PDGrapher, a 2025 Nature Biomedical Engineering paper from the Marinka Zitnik group, inverted the standard perturbation-prediction question. Instead of asking what a known perturbation does to a cell, it asks what intervention would move a diseased cell back toward a healthy reference, operating over molecular graphs and PPI networks.'
    purpose: 'The reformulation maps directly onto drug discovery, where the target intervention is the unknown rather than the input. By inverting the question, PDGrapher addresses what most virtual-cell perturbation methods optimise for the wrong end of, and joins UNAGI as one of the few methods designed for clinical relevance over benchmark performance.'
    method: 'The model operates over molecular graphs combined with protein-protein interaction networks, using graph-neural inference to predict which interventions shift a diseased cell-state toward a healthy reference. The PPI prior provides a different inductive bias than the embedding-space methods that dominate the field, anchoring predictions in known interactome biology.'
    result: 'PDGrapher sits in the small set of perturbation methods designed explicitly for clinical relevance rather than benchmark performance, with the inverse framing aligning with actual drug-discovery workflows. Open questions are how well the inverse predictions translate to wet-lab validation and whether the PPI-network prior generalises across disease contexts.'
- id: cpa
  kind: tool
  modality: single-cell-rna
  name: CPA
  url: https://github.com/theislab/cpa
  topics:
  - perturbation-prediction
  - foundation-model
  why: Compositional Perturbation Autoencoder modeling combinatorial drug effects through disentangled latent representations (MSB, 2023).
  papermap_category: other_fm
  year: 2023
  venue: MSB
  status: published
  description: 'The Compositional Perturbation Autoencoder (CPA), published in Molecular Systems Biology in 2023, models combinatorial drug effects by learning disentangled latent representations that can be linearly combined to predict responses to drug pairs and doses not seen in training. The disentanglement objective is what gives CPA its compositional generalisation: covariates like cell type, drug identity, and dose are pushed into orthogonal subspaces, and predictions are made by addition in the latent rather than by joint conditioning. That made it one of the early methods able to make plausible predictions for unseen combinations, and it remains a common baseline. For the virtual-cell agenda it represents the disentanglement school of perturbation modelling, which is distinct from the GRN-simulation school CellOracle anchors and the generative-distribution school CellFlow and Squidiff occupy. The open question is whether CPA''s compositional structure survives at the scale of modern Perturb-seq atlases.'
  qa:
    did: 'The Compositional Perturbation Autoencoder (CPA), published in Molecular Systems Biology 2023, models combinatorial drug effects by learning disentangled latent representations that can be linearly combined to predict responses to unseen drug pairs and doses. It became one of the first methods able to make plausible predictions for unseen combinations.'
    purpose: 'The aim was to enable compositional generalisation across drug pairs and doses without seeing every combination in training. Pushing covariates like cell type, drug identity, and dose into orthogonal latent subspaces lets predictions be made by addition rather than joint conditioning, addressing the combinatorial explosion of perturbation-screening designs.'
    method: 'An autoencoder is trained with a disentanglement objective that forces covariates — cell type, drug identity, dose — into orthogonal latent subspaces. Predictions for new combinations are produced by adding the corresponding latent vectors and decoding, rather than by feeding the joint covariate set through a conditional encoder.'
    result: 'CPA remains a common baseline and represents the disentanglement school of perturbation modelling, distinct from CellOracle''s GRN-simulation school and CellFlow/Squidiff''s generative-distribution school. The open question is whether CPA''s compositional structure survives at the scale of modern Perturb-seq atlases, where the assumed orthogonality of latent factors may break down.'
- id: cellflow
  kind: tool
  modality: single-cell-rna
  name: CellFlow
  url: https://github.com/theislab/cellflow
  topics:
  - perturbation-prediction
  - foundation-model
  why: Flow matching for perturbation response distributions; outperforms GEARS on energy distance but struggles with combinatorial perturbations.
  papermap_category: other_fm
  description: CellFlow is a flow-matching model for single-cell perturbation response distributions that outperforms GEARS on energy-distance metrics but struggles with combinatorial perturbations, the case the perturbation-prediction community most wants to solve. It is part of a wave of flow-matching and diffusion methods entering the perturbation-prediction space alongside Squidiff and various conditional flow-matching variants from the torchcfm ecosystem. The strength of the flow-matching framing is that it predicts full response distributions rather than mean shifts, which matters because perturbation responses are genuinely heterogeneous across cells. The weakness, exposed by the combinatorial benchmarks, is that the inductive bias does not extrapolate well outside the training perturbation space. For the virtual-cell stack CellFlow is a useful test case for whether better distributional modelling alone fixes perturbation prediction or whether the limit is data, not method. The open question is what kind of combinatorial training data closes the gap.
  qa:
    did: 'CellFlow is a flow-matching model for single-cell perturbation response distributions that outperforms GEARS on energy-distance metrics but struggles with combinatorial perturbations — the case the perturbation-prediction community most wants to solve. It sits alongside Squidiff and torchcfm variants in the distributional-generation school.'
    purpose: 'The aim was to predict full response distributions rather than mean shifts, which matters because perturbation responses are genuinely heterogeneous across cells. Flow matching provides a tractable training objective for distributional generation, framing perturbation prediction as transport between control and treated cell populations rather than embedding arithmetic.'
    method: 'A conditional flow-matching objective learns vector fields that transport unperturbed cell distributions to perturbed ones, conditioned on perturbation identity. The recipe builds on the torchcfm reference implementation and produces full response distributions at inference, rather than the mean-shift estimates standard in earlier perturbation predictors.'
    result: 'CellFlow outperforms GEARS on energy-distance metrics but struggles on combinatorial perturbations, exposing that the flow-matching inductive bias does not extrapolate well outside the training perturbation space. The open question is what kind of combinatorial training data closes the gap, since better distributional modelling alone has not fixed perturbation prediction.'
