  url: https://github.com/Genentech/scimilarity
  topics:
  - foundation-model
  - single-cell
  why: Metric learning model trained on 23.4M cells for unified cell embedding; generalizes to new studies without retraining (Nature Biotechnology, 2024).
  papermap_category: scfm
  year: 2024
  venue: Nature Biotechnology
  status: published
  description: SCimilarity is a metric-learning model from Genentech published in Nature Biotechnology in 2024, trained on 23.4 million cells to produce a unified embedding that generalises to new studies without retraining. The design choice — metric learning rather than masked-language-model-style pretraining — matters because it sidesteps the tokenisation debate around scGPT and Geneformer, while still delivering an off-the-shelf embedding suitable for cell-type query and atlas integration. As an industry release from a major biopharma, it also signals that pharma is investing in single-cell foundation infrastructure rather than relying only on academic releases. For practitioners it is one of the more reliable defaults when the task is finding similar cells across studies, and the absence of fine-tuning makes deployment cheap. The open question is whether the metric-learning approach scales to the 100M-cell regime that newer atlas releases are reaching, and whether it transfers to perturbation tasks.
- id: aido-cell
  kind: tool
  name: AIDO.Cell
  url: https://github.com/genbio-ai/AIDO
  topics:
  - foundation-model
  - single-cell
  why: 650M-parameter model pushing the scale frontier for single-cell foundation models.
  papermap_category: scfm
  description: AIDO.Cell is a 650-million-parameter single-cell foundation model from GenBio, pushing the scale frontier for cellular pretraining well beyond scGPT and Geneformer. The bet is that the same scaling laws that drove progress in language models also apply to single-cell data, and that gains will appear once parameter counts cross some threshold; the alternative reading, supported by the 2025 linear-baseline critiques, is that scale alone does not fix the underlying data and metric problems. Either way the model is one of the largest publicly released single-cell foundation models and serves as a useful test case for the scale hypothesis. The open repository makes it inspectable. The open question is whether AIDO.Cell beats well-tuned smaller baselines on the post-reckoning benchmarks rather than only on the legacy ones, and whether the scaling curve flattens, breaks, or continues at this regime.
- id: celloracle
  kind: tool
  name: CellOracle
  url: https://github.com/morris-lab/CellOracle
  topics:
  - perturbation-prediction
  - foundation-model
  why: GRN simulation using ATAC-seq-derived regulatory networks; strong on developmental trajectory perturbations, requires multi-omic input (Nature, 2023).
  papermap_category: other_fm
  year: 2023
  venue: Nature
  status: published
  description: 'CellOracle is a perturbation-prediction tool published in Nature in 2023 that simulates gene regulatory networks reconstructed from ATAC-seq, using the inferred GRN to propagate the effects of a knockout across the transcriptome. The strength is on developmental-trajectory perturbations, where the GRN scaffold provides useful inductive bias, and the requirement is real: CellOracle needs paired chromatin accessibility data rather than RNA alone. That requirement also bounds where it can be applied. Within the perturbation-prediction landscape it occupies a distinctive position as one of the few methods grounded in an explicit regulatory mechanism rather than a learned embedding, which makes it both interpretable and harder to extend to perturbations the GRN does not cover. For the virtual-cell agenda it is a useful baseline against which black-box predictors should be measured. The open question is how CellOracle compares to flow-matching and diffusion models on contemporary benchmarks.'
- id: pdgrapher
  kind: tool
  name: PDGrapher
  url: https://github.com/mims-harvard/PDGrapher
  topics:
  - perturbation-prediction
  - foundation-model
  why: Inverts the perturbation problem by asking what intervention fixes a disease state rather than what a perturbation does; uniquely clinically relevant framing (Nature BME, 2025).
  papermap_category: other_fm
  year: 2025
  venue: Nature BME
  status: published
  description: 'PDGrapher is a 2025 Nature Biomedical Engineering paper from the Marinka Zitnik group that inverts the standard perturbation-prediction question: instead of asking what a known perturbation does to a cell, it asks what intervention would move a diseased cell back toward a healthy reference. The reformulation matters because the inverse framing is what actually maps onto drug discovery, where the target intervention is the unknown. PDGrapher operates over molecular graphs and protein-protein interaction networks, which gives it a different inductive bias than the embedding-space methods that dominate the field. Within the virtual-cell stack it sits alongside UNAGI as one of a small number of methods designed explicitly for clinical relevance rather than benchmark performance. The open question is how well the inverse predictions translate to wet-lab validation, and whether the PPI-network prior generalises to disease contexts where the relevant biology is not captured in current interactome databases.'
- id: cpa
  kind: tool
  name: CPA
  url: https://github.com/theislab/cpa
  topics:
  - perturbation-prediction
  - foundation-model
  why: Compositional Perturbation Autoencoder modeling combinatorial drug effects through disentangled latent representations (MSB, 2023).
  papermap_category: other_fm
  year: 2023
  venue: MSB
  status: published
  description: 'The Compositional Perturbation Autoencoder (CPA), published in Molecular Systems Biology in 2023, models combinatorial drug effects by learning disentangled latent representations that can be linearly combined to predict responses to drug pairs and doses not seen in training. The disentanglement objective is what gives CPA its compositional generalisation: covariates like cell type, drug identity, and dose are pushed into orthogonal subspaces, and predictions are made by addition in the latent rather than by joint conditioning. That made it one of the early methods able to make plausible predictions for unseen combinations, and it remains a common baseline. For the virtual-cell agenda it represents the disentanglement school of perturbation modelling, which is distinct from the GRN-simulation school CellOracle anchors and the generative-distribution school CellFlow and Squidiff occupy. The open question is whether CPA''s compositional structure survives at the scale of modern Perturb-seq atlases.'
- id: cellflow
  kind: tool
  name: CellFlow
  url: https://github.com/theislab/cellflow
  topics:
  - perturbation-prediction
  - foundation-model
  why: Flow matching for perturbation response distributions; outperforms GEARS on energy distance but struggles with combinatorial perturbations.
  papermap_category: other_fm
  description: CellFlow is a flow-matching model for single-cell perturbation response distributions that outperforms GEARS on energy-distance metrics but struggles with combinatorial perturbations, the case the perturbation-prediction community most wants to solve. It is part of a wave of flow-matching and diffusion methods entering the perturbation-prediction space alongside Squidiff and various conditional flow-matching variants from the torchcfm ecosystem. The strength of the flow-matching framing is that it predicts full response distributions rather than mean shifts, which matters because perturbation responses are genuinely heterogeneous across cells. The weakness, exposed by the combinatorial benchmarks, is that the inductive bias does not extrapolate well outside the training perturbation space. For the virtual-cell stack CellFlow is a useful test case for whether better distributional modelling alone fixes perturbation prediction or whether the limit is data, not method. The open question is what kind of combinatorial training data closes the gap.
- id: squidiff
  kind: tool
  name: Squidiff
  url: https://github.com/siyuh/Squidiff
  topics:
  - perturbation-prediction
  - foundation-model
  why: Diffusion model generating full response distributions for perturbation prediction; massively outperforms GEARS on standard benchmarks but has not yet faced the most rigorous evaluations (Nature Methods, 2026).
  papermap_category: other_fm
  year: 2026
  venue: Nature Methods
  status: published
  description: Squidiff is a 2026 Nature Methods paper introducing a diffusion model that generates full response distributions for single-cell perturbation prediction, reporting large gains over GEARS on standard benchmarks. The diffusion framing places it alongside CellFlow in the distributional-generation school of perturbation modelling, against the embedding-shift methods like scGPT-perturbation and the GRN-simulation methods like CellOracle. The caveat the authors themselves flag, and that the post-reckoning reader should hold onto, is that Squidiff has not yet faced the most rigorous evaluations — particularly the linear-baseline comparisons and the metric critiques raised in 2025-2026 — so the magnitude of the reported gains may shrink under harder scrutiny. As a fresh peer-reviewed release with open code, it is nevertheless one of the more credible recent entrants in the field. The open question is how it performs on combinatorial and held-out-perturbation benchmarks.
- id: torchcfm
  kind: tool
  name: TorchCFM
  url: https://github.com/atong01/conditional-flow-matching
  topics:
  - generative
  - perturbation-prediction
  why: Conditional flow matching library providing the mathematical foundation used by Virtual Cell Challenge winners.
  description: torchcfm is the conditional flow-matching library that provides the mathematical foundation used by several Virtual Cell Challenge winners and a growing set of perturbation-prediction methods. As infrastructure rather than a model in itself, it lowers the cost of building flow-matching variants by handling the path-construction, vector-field-parameterisation, and training-loop details that would otherwise be reinvented in each paper. The result is that flow-matching has spread faster in single-cell biology than it would have without a reference implementation, including into the perturbation-prediction work behind CellFlow and Squidiff. For a working researcher it is the right starting point for any flow-matching experiment on biological data. The open question is how long torchcfm remains the de facto standard before either a more biology-specific fork emerges or the broader generative-modelling community moves on to a successor formulation; both are plausible on a two-to-three-year horizon.
- id: scarches
  kind: tool
  name: scArches
  url: https://github.com/theislab/scarches
  topics:
  - generative
  - perturbation-prediction
  why: Transfer learning framework for mapping new data to trained reference VAEs without retraining from scratch (Nature Biotechnology, 2021).
  year: 2021
  venue: Nature Biotechnology
  status: published
  description: 'scArches is a transfer-learning framework from the Theis lab published in Nature Biotechnology in 2021 that maps new single-cell datasets onto trained reference VAEs without retraining from scratch, using architectural surgery to inject new conditional inputs while freezing the backbone. The design is essentially parameter-efficient fine-tuning before that term migrated from NLP into single-cell tooling, and it remains the canonical way to extend a fitted scVI or totalVI model to a new study or batch. For the virtual-cell agenda its relevance is operational: most reference atlases in production use today rely on scArches-style mappings rather than full re-training, which keeps inference cheap and reproducible. As a maintained scverse component it is reliable to depend on. The open question is whether the conditional-injection trick extends cleanly to transformer-backed models, where the architectural surgery is less obviously analogous to the VAE case it was designed for.'
- id: awesome-flow-matching-meets-biology
  kind: tool
  name: Awesome Flow Matching Meets Biology
  url: https://github.com/Violet24K/Awesome-Flow-Matching-Meets-Biology
  topics:
  - generative
  - perturbation-prediction
  why: Curated collection of flow matching applications in biology, covering perturbation prediction, molecular generation, and cell dynamics.
  description: 'An awesome-list-style curated collection on GitHub tracking flow-matching applications in biology, organised across perturbation prediction, molecular generation, and cell dynamics. The value of the list is as a current snapshot of a fast-moving subfield: flow matching arrived in biology around 2023 through the torchcfm reference implementation, and has since spread into CellFlow, Squidiff, and a number of molecular-generation systems. A curated list reduces the time cost of catching up because it surfaces the lineage — which papers cite which, which methods are extensions of which — without requiring the reader to reconstruct it from scratch. As community-maintained infrastructure it has the usual caveats around coverage gaps and stale entries. The open question is whether flow matching remains the right framing for cell dynamics over a longer horizon, or whether it gives way to a more biology-specific successor formulation.'
- id: physicell
  kind: paper
  name: PhysiCell
  url: https://github.com/MathCancer/PhysiCell
  topics:
  - digital-twin
  - mech-modeling
  why: Agent-based modeling framework for multicellular simulations using explicit equations rather than learned representations; the only truly mechanistic approach to virtual tumors (PLOS Computational Biology, 2018).
  year: 2018
  venue: PLOS Computational Biology
  status: published
  description: 'PhysiCell is an agent-based modelling framework for multicellular simulations introduced in PLOS Computational Biology in 2018 that uses explicit physical and biochemical equations rather than learned representations. Each cell is an agent with mechanical properties, signalling state, and rules for division, death, and migration, and tissues emerge from the rules. Within the virtual-cell library it occupies a distinct niche as the only truly mechanistic approach to virtual tumours and other multicellular systems: nothing in the deep-learning stack currently produces simulations that obey physics at this level of explicit constraint. The trade-off is parameterisation, since the rules and constants have to be supplied. For a working researcher PhysiCell is the right tool when the question requires mechanistic interpretation rather than statistical prediction. The open question is whether hybrid systems — learned components inside an agent-based scaffold — become the dominant integration pattern, and whether PhysiCell or a successor framework hosts them.'
- id: compass
  kind: paper
  name: COMPASS
  url: https://github.com/mims-harvard/COMPASS
  topics:
  - digital-twin
  - mech-modeling
  why: Concept bottleneck foundation model for immunotherapy response prediction; beats 22 baselines with interpretable cell-type-level features.
  description: COMPASS is a concept-bottleneck foundation model for immunotherapy response prediction from the Marinka Zitnik group at Harvard, designed so that predictions pass through an explicit layer of interpretable cell-type-level features before producing the final output. The reported result is that it beats 22 baselines on response-prediction benchmarks while preserving feature-level interpretability, which is the case the concept-bottleneck design is meant to make. For the virtual-cell stack it represents one of the more concrete attempts to do clinical-grade prediction with interpretability constraints rather than only post-hoc explanations, and the choice of immunotherapy response gives it direct relevance to oncology deployment. As an open release from a credible academic group it is reusable. The open question is whether the concept bottleneck holds up on prospective clinical cohorts rather than retrospective benchmarks, and whether the cell-type-level features chosen at design time transfer across tumour types.
- id: noetik-octo-vc
  kind: paper
  name: Noetik OCTO-vc
  url: https://www.noetik.ai/
  topics:
  - digital-twin
  - mech-modeling
  why: 1.5B-parameter virtual cell model from GSK partnership, targeting clinical oncology applications at population scale.
  description: 'OCTO-VC is a 1.5-billion-parameter virtual-cell model from Noetik, developed with a GSK partnership and targeting clinical oncology applications at population scale. As an industry release the documentation is thinner than for academic models, but the parameter count and the partner make the entry worth tracking: 1.5B sits at the upper end of currently disclosed single-cell-adjacent foundation models, and a Big Pharma partnership signals that the bet is on prospective clinical deployment rather than only on benchmark performance. For the virtual-cell library it is one of the few private-sector models large enough to test the scale hypothesis at a serious parameter count outside academic infrastructure. The open question is whether Noetik publishes architecture and benchmark details or follows the more typical industry pattern of disclosing only headline application results, and whether GSK uses the model in actual drug-development workflows.'
- id: virtual-cell-challenge
  kind: benchmark
  name: Virtual Cell Challenge
  url: https://www.kaggle.com/competitions/open-problems-single-cell-perturbations
  topics:
  - eval
  - benchmark
  why: Arc Institute competition with 5,000+ teams; most of 300+ submissions scored worse than mean baseline on MAE, and the winning approach was a hybrid using protein embeddings plus classical features (Cell, 2025).
  papermap_category: reckoning
  year: 2025
  venue: Cell
  status: published
  description: 'The Virtual Cell Challenge is an Arc Institute competition run in 2025 that drew over 5,000 teams and 300-plus formal submissions on a held-out Perturb-seq prediction task. The result that mattered for the field was the leaderboard: most submissions scored worse than the mean baseline on MAE, and the winning approach was a hybrid stack combining protein-language-model embeddings with classical features rather than a pure single-cell foundation model. Published in Cell in 2025, it became one of the central reference points in the year''s reckoning over whether scLLMs actually learn perturbation-relevant biology, since the answer at scale and on a clean benchmark was largely no. For a working researcher it is the canonical citation for the empirical case that the perturbation-prediction problem is unsolved. The open question is whether the next iteration of the challenge raises the ceiling or confirms the same baseline-dominance pattern.'
- id: perturbation-prediction-vs-baselines
  kind: benchmark
  name: Perturbation Prediction vs Baselines
  url: https://doi.org/10.1038/s41592-025-02772-6
  topics:
  - eval
  - benchmark
  why: Independent evaluation showing linear models match or beat scGPT and GEARS on held-out perturbations (Nature Methods, 2025).
  papermap_category: reckoning
  year: 2025
  venue: Nature Methods
  status: published
  description: 'A 2025 Nature Methods paper presenting an independent evaluation showing that simple linear models match or beat scGPT and GEARS on held-out perturbation tasks. The result became one of the central reference points in the 2025 single-cell foundation model reckoning because it was clean, independent, and easy to reproduce: the comparison was not between obscure methods but between the two most-cited deep learning perturbation predictors of the prior two years and a baseline a graduate student can implement in an afternoon. The implication is not that scGPT and GEARS are worthless but that the perturbation-prediction benchmarks they were tuned on do not reward the kind of biology a foundation model is supposed to learn. For a working researcher this is the citation to reach for when defending the use of strong baselines. The open question is which post-reckoning benchmarks will eventually separate the methods cleanly.'
- id: biollm
  kind: benchmark
  name: BioLLM
  url: https://github.com/BGIResearch/BioLLM
  topics:
  - eval
  - benchmark
  why: Standardized benchmarking framework running scBERT, Geneformer, scGPT, and scFoundation through unified APIs for fair comparison.
  papermap_category: reckoning
  description: 'BioLLM is a standardised benchmarking framework from BGI Research that runs scBERT, Geneformer, scGPT, and scFoundation through unified APIs, enabling fair comparison without the per-method boilerplate that usually distorts evaluations. The contribution is infrastructural: by isolating preprocessing, tokenisation, and inference behind a common interface, BioLLM removes the most common confounds in cross-model comparisons and exposes the underlying performance gaps. That role is particularly important after the 2025 reckoning, since the post-reckoning conversation has hinged on whether reported gains came from the models or from inconsistent evaluation pipelines. As an open release from a major Chinese genomics institute it is reusable and well-positioned to grow as new scLLMs appear. The open question is which evaluation protocols become the community defaults inside BioLLM, since the choice of held-out splits and metrics will largely determine which models look strong over the next benchmarking cycle.'
- id: human-cell-atlas
  kind: dataset
  name: Human Cell Atlas
  url: https://data.humancellatlas.org/
  topics:
  - single-cell
  why: Community effort mapping all human cell types with 70M+ cells across tissues and developmental stages.
  description: 'The Human Cell Atlas is the community effort to map every human cell type across tissues, developmental stages, and ages, currently holding more than 70 million single cells from hundreds of contributing studies. The data portal is the practical entry point for anyone training a single-cell foundation model, since the atlas''s curation and metadata standards have effectively defined what publishable pretraining data looks like over the last several years. For the virtual-cell stack the atlas is the substrate: nearly every scLLM, integration model, and reference-mapping tool of the 2022-2026 generation has been pretrained or evaluated against some subset of it. As a living consortium effort it continues to grow and to set governance norms for sharing. The open question is whether atlas growth keeps pace with the appetite of frontier models, and whether the next round of pretraining will require harder-to-collect modalities like single-cell proteomics or spatial data at comparable scale.'
- id: tisch2
  kind: dataset
  name: TISCH2
  url: http://tisch.comp-genomics.org/
  topics:
  - single-cell
  why: Curated single-cell tumor microenvironment atlas with 190 datasets covering 50+ cancer types and pre-annotated cell types.
  description: 'TISCH2 is a curated single-cell tumour microenvironment atlas that aggregates roughly 190 datasets across more than 50 cancer types with pre-annotated cell-type labels, designed so that researchers can pull tumour scRNA-seq for a specific cancer context without re-running the per-study preprocessing. The value is curation rather than novelty: the underlying studies are public, but the harmonised annotations and consistent loading conventions make TISCH2 the practical default for any oncology-focused virtual-cell project or benchmark. For the wider library it sits in the same category as CELLxGENE and the HCA portal — infrastructure that lowers the cost of building on existing data. The open question is how the harmonised annotations hold up against newer ontology releases and whether TISCH2 commits to the upkeep, since curated atlases tend to drift out of date quickly without active maintenance from the host group.'
- id: tcga
  kind: dataset
  name: TCGA
  url: https://portal.gdc.cancer.gov/
  topics:
  - single-cell
  why: Bulk RNA-seq plus clinical outcome data for 11,000+ patients across 33 cancer types.
  description: The Cancer Genome Atlas (TCGA) is the bulk RNA-seq, methylation, mutation, and clinical-outcome resource covering more than 11,000 patients across 33 cancer types, distributed through the GDC portal. Despite predating single-cell methods, TCGA remains structurally important to the virtual-cell agenda because it is the largest public dataset that pairs molecular measurements with clinical outcomes, which is what most virtual-cell models eventually need to validate against. Bulk-to-single-cell deconvolution methods, survival models built on patient embeddings, and many drug-response predictors trace back to TCGA as ground truth. For a working researcher it is the default citation whenever clinical relevance has to be demonstrated rather than just claimed. The open question is whether TCGA's bulk-and-clinical regime continues to anchor the validation layer, or whether newer cohorts with single-cell, spatial, and longitudinal data displace it over the next several years.
- id: depmap
  kind: dataset
  name: DepMap
  url: https://depmap.org/
  topics:
  - single-cell
  why: Cell line omics, drug response, and genetic dependency data for 1,000+ cell lines from the Cancer Dependency Map project.
  description: 'DepMap, the Cancer Dependency Map, provides multi-omic cell-line profiles, drug-response measurements, and CRISPR genetic-dependency scores for more than 1,000 cancer cell lines. For the virtual-cell agenda it is the substrate that most drug-target and synthetic-lethality predictors are evaluated against, because the paired genetic-dependency and pharmacological data are unusually clean and the cell-line coverage is broad enough for genuine train-test splits. Many of the perturbation-prediction methods in this library use DepMap either as training data or as validation, and the CRISPR essentiality calls are the de facto ground truth for in-silico knockout simulations on tumour contexts. The open question is the gap between cell-line biology and patient biology: DepMap predictors can score well in-distribution and fail in-clinic, and the virtual-cell community has not yet settled on a standardised way to test that gap, which limits how much weight DepMap-only validation can carry.'
- id: sc-pert
  kind: dataset
  name: sc-pert
  url: https://github.com/theislab/sc-pert
  topics:
  - single-cell
  why: Curated perturbation datasets in standardized h5ad format from the Theis lab, covering major Perturb-seq studies.
  description: 'sc-pert is a curated collection of perturbation datasets from the Theis lab, redistributed in standardised h5ad format and covering the major Perturb-seq studies that the field benchmarks against. The contribution is infrastructural rather than novel science: by handling the inconsistencies in how different Perturb-seq studies report guide assignments, dosing, and metadata, sc-pert removes one of the most tedious blockers to running a fair cross-study evaluation. That has made it a common starting point for methods papers that need to demonstrate generalisation across Perturb-seq sources rather than within a single study. For a working researcher it is the right default for assembling perturbation-prediction benchmark suites. The open question is how the collection keeps pace as new Perturb-seq atlases land at increasing scale, and whether maintenance stays with the Theis lab or migrates into a broader scverse-style community effort with shared upkeep.'
- id: l1000-cmap
  kind: dataset
  name: L1000/CMap
  url: https://clue.io/
  topics:
  - single-cell
  why: Connectivity Map with 1M+ transcriptional response profiles to chemical and genetic perturbations.
  description: The Connectivity Map (CMap), particularly its L1000 expansion, holds more than one million transcriptional response profiles to chemical and genetic perturbations measured on a reduced 978-gene panel, accessible through the clue.io portal. Despite the reduced gene panel, the scale and the breadth of perturbations make it the largest perturbation-response resource available, and it remains a common training and evaluation source for drug-response prediction, mechanism-of-action inference, and connectivity-based repurposing. For the virtual-cell stack it is the bulk-perturbation counterpart to the single-cell Perturb-seq atlases collected in sc-pert. The well-known caveat is that L1000 profiles are bulk, low-dimensional, and noisy compared to modern scRNA-seq, which bounds what models trained on it can learn. The open question is whether CMap-style coverage will ever be reproduced at single-cell resolution or whether L1000 remains the only large-scale perturbation atlas of its kind.
- id: spatialdb
  kind: dataset
  name: SpatialDB
  url: https://www.spatialomics.org/SpatialDB/
  topics:
  - single-cell
  why: Curated collection of 100+ spatial transcriptomics datasets across platforms and tissues.
  description: 'SpatialDB is a curated collection of more than 100 spatial transcriptomics datasets spanning the major commercial platforms — Visium, Slide-seq, MERFISH, and others — and a broad range of tissues. As infrastructure, its role is to make the spatial-omics field benchmarkable: spatial transcriptomics has historically suffered from per-platform data formats and per-study annotation conventions, and a curated cross-platform index reduces the cost of any analysis that needs to compare across studies. For the virtual-cell agenda spatial data are the modality that most current single-cell foundation models do not handle, so a usable cross-platform dataset registry is a precondition for the next generation of spatial-aware models. The open question is how SpatialDB keeps up with platform churn — Xenium and CosMx generate data faster than older curation pipelines were designed for — and whether maintenance keeps pace with the deposition rate over the next few years.'
- id: cz-virtual-cells-platform
  kind: tool
  name: CZ Virtual Cells Platform
  url: https://virtualcellmodels.cziscience.com/quickstart
  topics:
  - single-cell
  why: Free hosted environment with Colab tutorials for scGPT, rBio, TranscriptFormer, and scGenePT.
  description: 'The CZI Virtual Cells Platform is a free hosted Colab environment with tutorials for scGPT, rBio, TranscriptFormer, and scGenePT, designed to lower the entry cost for researchers who want to try recent single-cell foundation models without setting up GPU infrastructure. As infrastructure rather than a model, its significance is community-building: CZI is using the platform to make a specific set of models the practical default by being the easiest to get running, which shapes which methods get cited and extended. That role is interesting in light of the 2025 reckoning, because the platform''s curated model list is a soft endorsement of which scLLMs CZI thinks are worth surfacing, and the choices skew toward the foundation-model side of the debate. For a researcher new to the area it is the right starting point. The open question is which models the platform highlights once post-reckoning benchmarks settle.'
