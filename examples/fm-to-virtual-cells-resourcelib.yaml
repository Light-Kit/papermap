  venue: PNAS
  year: 2025
  url: https://www.pnas.org/doi/10.1073/pnas.2506316122
  topics:
  - interpretability
  - protein
  status: published
  org_type: academic
  region: US
  why: Protein-FM SAE paper that started the biology-FM interpretability wave.
  papermap_category: interp
  description: 'A 2025 PNAS paper applying sparse autoencoders to a protein foundation model, identifying interpretable concept directions in the model''s hidden states. Its importance is being the spark of the biology-FM interpretability wave: SAE work in language models had been accelerating since 2023, and Adams et al. is the citation that ports the technique into biology and demonstrates it yields biologically nameable features rather than noise. Subsequent SAE work on sc-FMs and pathology FMs in 2025-2026 explicitly chains off this result. Open: whether the protein-FM SAE features survive across model versions and training seeds (the stability question that has dogged language-model SAEs), and whether biology-specific evaluation criteria for SAE faithfulness can be agreed on by the interpretability and structural-biology communities together.'
- id: simon-zou-2026
  kind: paper
  name: SAEs reveal organized biology but minimal regulatory logic
  authors: Simon & Zou
  venue: arXiv
  year: 2026
  url: https://arxiv.org/abs/2603.02952
  topics:
  - interpretability
  - single-cell
  - foundation-model
  status: preprint
  org_type: academic
  region: US
  why: Mechanistic explanation of the reckoning, on Geneformer + scGPT.
  papermap_category: interp
  description: 'A 2026 preprint from Simon and Zou providing a mechanistic explanation of why Geneformer and scGPT underperform on perturbation and similar tasks — opening the FM internals rather than just running another benchmark. Its importance is being the first credible attempt to answer ''why'' rather than ''whether'' for the reckoning: it moves the conversation from ''sc-FMs match baselines'' to ''here is what is happening inside the model that produces that pattern''. Pairing the empirical reckoning literature with a mechanistic account changes how subsequent designs can be iterated: you can target the specific pathology rather than scaling blindly. Open: whether the mechanistic account generalises to the other sc-FMs in the field (scFoundation, UCE, CellPLM) or is specific to the two analysed, which determines how prescriptive the diagnosis can be.'
- id: sae-scgpt-2025
  kind: paper
  name: SAEs reveal interpretable features in single-cell FMs
  venue: bioRxiv
  year: 2025
  url: https://www.biorxiv.org/content/10.1101/2025.10.22.681631v2
  topics:
  - interpretability
  - single-cell
  status: preprint
  org_type: academic
  region: global
  why: Independent confirmation on scGPT.
  papermap_category: interp
  description: 'An independent 2025 preprint applying sparse autoencoders to scGPT, confirming on a single-cell foundation model the kind of interpretable feature decomposition Adams et al. demonstrated on protein FMs. Its importance is replication: a single SAE result on one model family can be a quirk, but parallel results on protein and single-cell FMs make a much stronger case that the technique transfers across biology-FM families. It is also one of the few interpretability papers that engages with the specific failure modes the reckoning literature surfaced, asking whether the learned features explain the gap to baselines. Open: how stable the scGPT SAE features are across reruns and how cleanly they map to known gene programmes, since SAE feature instability has been a recurring concern in the language-model literature.'
- id: hibou-lp-sae-2024
  kind: paper
  name: Hibou-LP SAE
  venue: arXiv
  year: 2024
  url: https://arxiv.org/abs/2407.10785
  topics:
  - interpretability
  - pathology
  status: preprint
  org_type: biotech
  region: US
  why: First pathology-FM sparse autoencoder.
  description: 'A 2024 preprint from a US biotech reporting the first sparse-autoencoder analysis of a pathology foundation model, the Hibou family. Its importance is extending the SAE wave to the image side of biology FMs, where interpretability has lagged behind the language-model-style analyses dominant in protein and single-cell work, and where the visual nature of the features changes how interpretability has to be evaluated. Pathology is also the biology-FM area with the most direct clinical deployment pressure, so understanding what concepts a pathology FM represents internally has near-term regulatory and safety implications, not just scientific ones, and the appetite for interpretability tooling is correspondingly stronger there than in basic-science sc-FM work. Open: whether biotech-authored SAE work establishes a precedent for industry interpretability releases in pathology, which has historically been an area where commercial models ship with much less transparency than academic ones.'
- id: sae-synthesis-2026
  kind: paper
  name: What do biological foundation models compute?
  venue: bioRxiv
  year: 2026
  url: https://www.biorxiv.org/content/10.64898/2026.03.04.709491v1
  topics:
  - interpretability
  - foundation-model
  status: preprint
  org_type: academic
  region: global
  why: Synthesis across families — the wave's summary read.
  papermap_category: interp
  description: 'A 2026 preprint synthesising sparse-autoencoder results across biology-FM families — protein, single-cell, pathology — into a single comparative read of the interpretability wave. Its importance is being the one-stop summary for someone catching up on the SAE-on-biology-FM literature without reading Adams 2025, hibou-lp-sae 2024, sae-scgpt 2025 and the others one by one, which is the actual time budget most readers have. The cross-family framing also surfaces which findings are general (sparse features exist, some are biologically nameable) and which are family-specific (feature stability, programme coverage, evaluation protocol), separating the universal lessons from the artefacts of any one model class. Open: whether the synthesis converges on a recommended methodology — corpus, dictionary size, evaluation — that becomes the default protocol for new biology-FM SAE work, since the methodological variance across the included papers is currently large enough to complicate direct comparisons.'
- id: rbio-2025
  kind: tool
