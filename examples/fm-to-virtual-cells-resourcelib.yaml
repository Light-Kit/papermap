    did: 'scDiffusion is a preprint diffusion model for single-cell expression generation, framing single-cell RNA-seq as a target for the same generative machinery that has worked on images, proteins, and molecules. It provides a sampler producing realistic synthetic single cells conditioned on cell type, perturbation, or other covariates for downstream use.'
