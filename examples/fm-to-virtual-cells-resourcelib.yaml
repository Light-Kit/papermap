  papermap_category: other_fm
  description: Evo2 is the only genomic foundation model to date with demonstrated in-context learning, the property that lets language models adapt to new tasks from a few examples in-prompt without weight updates. The model carries a 1M-token context window, was trained for roughly $5M, and is the direct successor to Evo-v1. It sits at the largest end of the academic genomic-FM compute spectrum, behind only AlphaGenome in raw variant-effect benchmarks but ahead of it on generative and in-context capabilities. Arc Institute, its host, is the largest non-DeepMind biology-AI compute (~2,048 × H100) and also produced STATE and Tahoe-100M. The open question for 2026 is whether ICL on genomic sequence translates into usable downstream prediction without per-task fine-tuning, especially against AlphaGenome's supervised track-prediction lead.
  qa:
    did: 'Evo2 is the only genomic foundation model with demonstrated in-context learning, the property that lets language models adapt to new tasks from a few in-prompt examples without weight updates. It carries a 1-million-token context window, cost roughly $5M to train, and is the direct successor to Evo-v1 from Arc Institute.'
    purpose: 'The aim was to bring in-context learning — the headline capability that made LLMs general-purpose — into genomic sequence modelling. If ICL transfers, downstream users can adapt the model to new variant-prediction or regulatory tasks by prompting alone, sidestepping the per-task fine-tuning that dominates the rest of the genomic-FM stack.'
    method: 'The model is a large autoregressive sequence model with a 1-million-token context window trained on roughly $5M of compute, sitting at the largest end of the academic genomic-FM compute spectrum. Arc Institute provided the training infrastructure of approximately 2,048 H100 GPUs, the largest non-DeepMind biology-AI compute.'
    result: 'Evo2 sits behind AlphaGenome on raw variant-effect benchmarks but ahead of it on generative and in-context capabilities, becoming the only genomic FM with demonstrated ICL. The 2026 question is whether ICL on genomic sequence translates into usable downstream prediction without per-task fine-tuning against AlphaGenome''s supervised lead.'
