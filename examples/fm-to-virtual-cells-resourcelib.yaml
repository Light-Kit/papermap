  description: 'VCWorld is a 2025 arXiv preprint from a Chinese academic group describing a white-box LLM-driven cell simulator that runs stepwise mechanistic reasoning, treating each prediction as a chain of biologically interpretable operations rather than a single embedding lookup. The authors report SOTA on drug-perturbation benchmarks despite the white-box constraint, which is the substantive claim: that an agentic LLM scaffold over mechanistic knowledge can match or beat tokenised single-cell foundation models on the same tasks. That positions it as the anti-black-box alternative in the virtual-cell debate, alongside CausCell and the linear-baseline critiques, all pulling against scale-only approaches. As a preprint with no peer review yet, the benchmarks deserve scrutiny, particularly the choice of baselines and metrics given the 2025-2026 critiques of perturbation evaluation. Whether the stepwise reasoning is verifiably mechanistic or post-hoc rationalisation is the obvious open question.'
