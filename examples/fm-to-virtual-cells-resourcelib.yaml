  topics:
  - single-cell
  - perturbation-prediction
  status: published
  org_type: academic
  region: UK
  why: Policy-based perturbation prediction; the scArches lineage.
  description: 'A policy-based perturbation-prediction tool from the scArches lineage out of the Theis group (UK/EU axis), framing perturbation response as a learned mapping conditioned on context cells. scPoli predates the wave of large sc-FMs and represents a different bet: rather than train one giant cell model and zero-shot perturbations, build a smaller, conditional model that integrates explicit prior structure from scArches reference mapping. That puts it in the methodological tradition that the 2025 reckoning vindicated — structured, smaller approaches matching or beating large FMs on perturbation tasks — and it remains one of the practical baselines the field tests against. Open questions: how scPoli adapts to the Tahoe-100M and Replogle-genome-wide datasets that have arrived since its release, and whether the scArches conditioning approach can be folded into FM-scale models or remains better suited to its current scale.'
  qa:
    did: 'Lotfollahi et al. built scPoli, a policy-based perturbation-prediction tool from the scArches lineage out of the Theis group. It frames perturbation response as a learned mapping conditioned on context cells, predating the wave of large sc-FMs and representing a different bet — structured smaller models with explicit prior structure rather than one giant cell backbone.'
    purpose: 'The aim was to build a conditional perturbation model that integrates explicit prior structure from scArches reference mapping rather than relying on a huge zero-shot sc-FM. That places scPoli in the methodological tradition the 2025 reckoning vindicated — structured, smaller approaches matching or beating large FMs on perturbation tasks.'
    method: 'scPoli learns a policy that maps unperturbed cell state plus perturbation identity to perturbed cell state, conditioning the mapping on context cells via scArches-style reference embeddings. The conditional design lets the model exploit nearest-neighbour structure in reference data rather than treating each query in isolation.'
    result: 'scPoli became one of the practical baselines the field tests perturbation models against and remains a useful checkpoint for the structured-prior approach. Open questions include how scPoli adapts to the Tahoe-100M and genome-wide Replogle datasets, and whether the scArches conditioning approach scales into FM-sized models or stays better suited to its current regime.'
