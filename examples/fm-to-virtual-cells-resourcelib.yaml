  description: 'CausCell is a 2025 Nature Communications paper combining a structural causal model with a diffusion backbone to learn interpretable single-cell representations that come with explicit causal directed acyclic graphs (cDAGs) over latent factors. The pitch is an explicit counter-position to black-box scLLMs: rather than scaling parameters, the authors fix the structural assumptions and let the diffusion model fill in the conditional densities, recovering representations whose factors can be inspected and intervened on. From a Chinese academic group, it is one of the most concrete causal-representation contributions in the single-cell space, sitting alongside iVAE and disentangled VAEs. For the virtual-cell agenda it offers a candidate substrate for principled in-silico perturbation: if the cDAG is right, intervening on a latent should propagate correctly. The open question is whether the recovered DAGs are stable across datasets or fit to study-specific batch structure.'
  qa:
    did: 'CausCell, in a 2025 Nature Communications paper, combined a structural causal model with a diffusion backbone to learn interpretable single-cell representations equipped with explicit causal directed acyclic graphs over latent factors. It was framed as an explicit counter-position to black-box scLLMs from a Chinese academic group.'
    purpose: 'The aim was to recover representations whose latent factors can be inspected and intervened on, rather than scaling parameters in a black-box transformer. If the cDAG is correct, intervening on a latent should propagate correctly, giving the virtual-cell agenda a principled substrate for in-silico perturbation rather than embedding-shift heuristics.'
    method: 'A structural causal model fixes the assumed dependency structure over latent factors as a directed acyclic graph, and a diffusion backbone learns the conditional densities consistent with that DAG. Training jointly recovers the cDAG and the conditional generative model, producing latents that admit interventional interpretation.'
    result: 'CausCell sits alongside iVAE and disentangled VAEs as one of the most concrete causal-representation contributions in the single-cell space. The open question is whether the recovered DAGs are stable across datasets or merely fit study-specific batch structure — a recurring failure mode for causal discovery in genomics.'
