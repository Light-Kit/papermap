  - eval
  status: preprint
  org_type: academic
  region: US
  why: Agentic environment / benchmark for training and evaluating medical AI agents.
  description: Preprint from a US academic group framing an agentic environment and benchmark for medical AI agents, covering clinical reasoning tasks against simulated patients, electronic records, and decision-support workflows. It sits inside the broader move to evaluate medical LLMs as agents rather than as one-shot Q&A systems, where the metric stops being USMLE accuracy and starts being whether the agent can plan, retrieve, and revise across a multi-step workup. The gym framing matters because it makes training and evaluation share infrastructure, which is how reinforcement-learning improvements get measured in this field. Whether the simulated environments are faithful enough to catch the failure modes that show up in real deployments is the open question; like all clinical-agent benchmarks it has to earn trust from clinicians as well as ML reviewers.
- id: pathchat-dx
  kind: tool
  name: PathChat-DX
  venue: Mahmood Lab
  year: 2025
  topics:
  - pathology
