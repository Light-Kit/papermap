  status: published
  org_type: foundation
  region: US
  why: Only genomic FM with demonstrated in-context learning; 1M-token context, ~$5M training.
  papermap_category: other_fm
  description: Evo2 is the only genomic foundation model to date with demonstrated in-context learning, the property that lets language models adapt to new tasks from a few examples in-prompt without weight updates. The model carries a 1M-token context window, was trained for roughly $5M, and is the direct successor to Evo-v1. It sits at the largest end of the academic genomic-FM compute spectrum, behind only AlphaGenome in raw variant-effect benchmarks but ahead of it on generative and in-context capabilities. Arc Institute, its host, is the largest non-DeepMind biology-AI compute (~2,048 × H100) and also produced STATE and Tahoe-100M. The open question for 2026 is whether ICL on genomic sequence translates into usable downstream prediction without per-task fine-tuning, especially against AlphaGenome's supervised track-prediction lead.
  starred: true
- id: nt-instadeep
  kind: tool
  name: Nucleotide Transformer
  venue: InstaDeep
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: biotech
  region: EU
  why: Early DNA FM pretrained across many genomes for variant and regulatory tasks.
  description: Nucleotide Transformer, an early DNA foundation model from the European biotech InstaDeep, pretrained across many genomes and evaluated on variant-effect and regulatory-element tasks. It was one of the first serious attempts to scale a masked-language-model recipe to DNA in the way ESM had scaled it to proteins, and it provided a reusable encoder for groups that wanted DNA embeddings without training their own model. Within the genomic-FM lineage it sits upstream of architectures that traded transformer attention for state-space models to push context length, and downstream of the original DNABERT line. The cross-genome pretraining strategy was also a deliberate bet that variation across species would teach the model regulatory grammar that single-genome models miss. With AlphaGenome and the long-context state-space family now dominating leaderboards, NT's main role is as a well-documented baseline and as an open-weights option for tasks where 1-Mb context is overkill.
- id: dnabert-2
  kind: tool
  name: DNABERT-2
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: BPE-tokenised DNA FM; efficiency-focused DNABERT successor.
  description: BPE-tokenised successor to DNABERT, from a US academic group, pitched as the efficiency-focused next step in the DNABERT line. Replacing the original k-mer tokenisation with byte-pair encoding lets the model handle longer sequences with smaller vocabularies and was shown to improve both throughput and performance on the standard genomic-classification battery. It is one of the easier on-ramps into DNA language modelling because the weights are open and the model is small enough to fine-tune on a single GPU, which makes it a common choice for course projects and method-development prototypes. The tokenisation change also makes the model interoperable with mainstream NLP tooling in a way the k-mer original was not. As the field has moved to state-space backbones for long context and to AlphaGenome-class models for variant effects, DNABERT-2's niche is shorter-context tasks where a lightweight, well-understood encoder is preferable to a heavyweight foundation model.
- id: hyenadna
  kind: tool
  name: HyenaDNA
  topics:
  - genomic
  - foundation-model
  - state-space
  status: published
  org_type: academic
  region: US
  why: State-space (non-transformer) genomic FM for very long context at single-nucleotide resolution.
  description: Genomic foundation model from a US academic group that swaps transformer attention for a Hyena state-space backbone, letting it run at single-nucleotide resolution over very long contexts that attention-based DNA models cannot reach. The point was to demonstrate that you do not need attention to do sequence modelling on DNA, and that the inductive biases of state-space models map naturally onto regulatory elements that span tens or hundreds of kilobases. The compute profile is also more favourable than transformer attention at the same context, which matters for academic labs without industry-scale clusters. It became the architectural template for the next wave of long-context DNA models, including the reverse-complement-equivariant Caduceus, and helped popularise state-space methods inside genomics more broadly. Whether single-nucleotide context at this scale actually translates into better variant-effect prediction relative to AlphaGenome's 1-Mb attention stack is still being worked out in head-to-head benchmarks.
- id: caduceus
  kind: tool
  name: Caduceus
  topics:
  - genomic
  - foundation-model
  - state-space
  status: published
  org_type: academic
  region: US
  why: Bidirectional, reverse-complement-equivariant state-space DNA FM.
  description: Bidirectional, reverse-complement-equivariant state-space DNA foundation model from a US academic group, built in the lineage of HyenaDNA. The key design choice is hard-coding the reverse-complement symmetry of DNA into the architecture itself rather than relying on the model to learn it from data augmentation, which is a clean way to bake in biology that we already know to be true. It keeps the long-context advantages of state-space models while making the embeddings strand-invariant by construction, which matters for many regulatory and variant-effect tasks where the strand label is essentially arbitrary. The bidirectional design also addresses one of the limitations of the original HyenaDNA, which was unidirectional. Whether the equivariance buys enough on downstream benchmarks to displace simpler long-context backbones, and how it compares to AlphaGenome on variant effects, remain open questions for groups choosing between genomic FMs.
- id: borzoi
  kind: tool
  name: Borzoi
  venue: Calico
  topics:
  - genomic
  status: published
  org_type: industry
  region: US
  why: RNA-seq-coverage prediction model, Enformer successor — subsumed by AlphaGenome.
  description: Calico's Enformer successor focused on predicting RNA-seq coverage directly from sequence, extending the Enformer paradigm to a richer set of output tracks and longer contexts. For a window of about two years it was the model to beat for transcript-level regulatory predictions, and it found wide use in variant prioritisation pipelines that needed coverage-level granularity. With AlphaGenome's 2025 release reporting wins on essentially all of Borzoi's benchmark territory at 1-Mb context, Borzoi has been functionally subsumed for new work. It remains useful as a baseline and for groups whose pipelines are already built around its output format; the open question is how long the open-weights Borzoi ecosystem stays alive now that the SOTA has moved to a model with different access terms.
- id: esm2
  kind: tool
  name: ESM-2 / ESMFold
  venue: Science
  year: 2023
  topics:
  - protein
  - foundation-model
  status: published
  org_type: industry
  region: US
  why: Open protein LM; UCE's cross-species bridge; still the academic workhorse.
  papermap_category: other_fm
  description: Meta FAIR's open protein language model, published in 2023 and still the academic workhorse of the protein-FM era. ESM-2 produces residue-level embeddings that have been wired into structure prediction, function annotation, mutation-effect scoring, and as the cross-species bridge inside single-cell models like UCE that need a way to align gene vocabularies across organisms. Its enduring value is permissive licensing and a model-size ladder from a few million parameters up to 15B, which lets groups pick the trade-off they can afford and reproduce results without paying for compute they cannot recover. It also functions as the de facto benchmark embedding against which any new protein representation is measured. ESM-3 has taken the SOTA crown for multimodal and generative tasks, but ESM-2 remains the default choice when the requirement is a frozen embedding backbone with predictable behaviour and open weights.
- id: esm3
  kind: tool
  name: ESM-3
  authors: Hayes et al. (EvolutionaryScale)
  venue: Science
  year: 2025
  topics:
  - protein
  - foundation-model
  - multimodal
  - generative
  status: published
  org_type: biotech
  region: US
  why: 98B-param multimodal protein FM; generated esmGFP de novo; cleanest compute disclosure.
  papermap_category: other_fm
  description: 'EvolutionaryScale''s 98B-parameter multimodal protein foundation model, published in 2025, which extended the ESM line from sequence-only masked language modelling to a model that reasons jointly over sequence, structure, and function tokens. The headline result was the de novo generation of esmGFP, a fluorescent protein with no close homolog in nature, demonstrated experimentally and held up as evidence that the model is doing more than interpolation. ESM-3 also stood out at release for unusually clean compute disclosure, which made it one of the few large protein FMs whose training-cost claims could be independently sanity-checked rather than taken on faith. The launch marked the moment when the protein-FM frontier moved from FAIR''s research line into a venture-funded company building specifically around scaled protein generation. The open issues are the usual ones at this scale: licensing terms, what fraction of generated proteins actually fold and function in the wet lab, and whether the multimodal gains transfer to the standard zero-shot benchmarks ESM-2 still anchors.'
  starred: true
- id: alphafold3
  kind: tool
  name: AlphaFold 3
  venue: Nature
  year: 2024
  topics:
  - protein
  - generative
  - drug-design
  status: published
  org_type: industry
  region: UK
  why: Structure prediction extended to complexes (proteins + nucleic acids + ions + ligands).
  papermap_category: other_fm
  description: AlphaFold3 extends structure prediction from single proteins (the AlphaFold2 breakthrough) to full biomolecular complexes — proteins with nucleic acids, ions, and ligands. This makes the model directly useful for drug-design pipelines that need protein-ligand and protein-DNA pose prediction, not just monomer folds. The 2024 release shipped through DeepMind's Isomorphic Labs commercial arm with closed weights and a hosted API, which sets a precedent the field has been pushing back on (the academic preference is open weights, see ESM-3, RFDiffusion). Together with RFDiffusion (de novo design) and ESM-3 (98B-param multimodal generation), AF3 is one corner of the 2024–2025 protein-design trio that pharma drug-discovery groups now treat as table stakes rather than research novelty.
  starred: true
- id: proteina-complexa
  kind: tool
  name: Proteina / Proteina Complexa
  topics:
  - protein
  - generative
  - drug-design
  status: preprint
  org_type: industry
  region: US
  why: Generative protein-design FMs; Complexa reports 63.5% wet-lab hit on PDGFR binders.
  description: Generative protein-design foundation models from a US biotech lineage, with the Complexa variant reporting a 63.5% wet-lab hit rate on PDGFR binders in its preprint. That hit rate is the metric drug-design teams actually care about and is unusually high for de novo binder design, where double-digit success rates have been considered strong outcomes in recent literature. The work sits inside the broader shift from sequence-only generative protein models toward systems that condition on a target structure and propose binders end to end, competing with RFdiffusion-style pipelines on the same downstream task. It is also part of the wave of industry-led protein-design models whose validation story is wet-lab experiments rather than computational benchmarks, which is the higher bar the field is moving toward. As a preprint the result needs reproduction by independent groups, and the open questions are how well the hit rate generalises beyond PDGFR-class targets and what the model's behaviour looks like on harder undruggable surfaces.
- id: uni
  kind: tool
  name: UNI
  venue: Nature Medicine
  year: 2024
  topics:
  - pathology
  - foundation-model
  - multimodal
  status: published
  org_type: academic
  region: US
  why: Original Mahmood-lab pathology tile encoder.
  papermap_category: other_fm
  description: The original Mahmood-lab pathology tile encoder, published in 2024, which established the recipe later refined into UNI2-h and the rest of the Mahmood pathology stack. It was trained as a self-supervised vision transformer on a large corpus of histopathology tiles and demonstrated that a single encoder could carry strong performance across many downstream pathology tasks without per-task retraining. Within the pathology-FM landscape UNI marked the moment when the academic side caught up to the early industry tile encoders and forced the field to standardise on shared embedding benchmarks. It has now been superseded by UNI2-h on most leaderboards but remains widely cited as the reference for the Mahmood lineage and as a baseline that newer encoders are expected to clear.
- id: uni2-h
  kind: tool
  name: UNI2-h
  venue: Mahmood Lab
  year: 2025
  topics:
  - pathology
  - foundation-model
  status: launched
  org_type: academic
  region: US
  why: Mahmood-stack flagship tile encoder (681M); HF-gated since Jan 2025.
  description: Flagship tile encoder in the Mahmood pathology stack, a 681M-parameter vision transformer launched in 2025 and gated on Hugging Face since January of that year. It is the immediate successor to UNI and the encoder that the lab's slide-level model TITAN sits on top of, making it the load-bearing module for the whole Mahmood pathology pipeline and indirectly for the PathChat assistant family that runs on the same representations. The 681M scale puts it solidly in the modern pathology-FM bracket alongside Virchow2, with the trade-off that gated access slows reproduction and complicates use by groups that need fully open weights for downstream commercial work. The gating itself is part of the broader pattern in pathology FMs where strong academic models ship under research-only terms. The open question for users is how much real-world clinical performance UNI2-h adds over UNI versus how much the gains come from downstream slide-level training, and how the access policy will evolve.
- id: virchow2
  kind: tool
  name: Virchow2 / Virchow2G
  authors: Zimmermann et al. (Paige + MSK)
  venue: arXiv
  year: 2024
  url: https://arxiv.org/abs/2408.00738
  topics:
  - pathology
  - foundation-model
  status: published
  org_type: biotech
  region: US
  why: Current pathology-FM SOTA and most hardware-transparent; 632M ViT-H/14 on ~2B tiles / ~225k patients.
  papermap_category: other_fm
  description: 'Paige''s pathology foundation model, current SOTA for tile-level pathology and the most hardware-transparent of the major pathology FMs. The 632M-parameter ViT-H/14 was trained on roughly 2 billion tiles drawn from about 225,000 patients, with unusually thorough disclosure of the training infrastructure and patient-level corpus statistics. That disclosure matters because the pathology-FM space is otherwise opaque on data provenance and compute, and Virchow2 has become the model groups cite when they want to argue that a published pathology FM can be evaluated like a normal piece of computational science rather than a press release. Its scale also puts it in direct head-to-head territory with the Mahmood UNI2-h, which makes the two the natural comparators for any new pathology encoder. Open issues are the standard ones: licensing for clinical use, generalisation across scanners and stains in real hospital networks, and how it compares to the Mahmood stack on slide-level tasks rather than tile-level ones.'
- id: chief
  kind: tool
  name: CHIEF
  topics:
  - pathology
  - foundation-model
  - clinical
  status: published
  org_type: academic
  region: US
  why: Pathology FM for cancer detection and prognosis across tissue types.
  description: 'Pathology foundation model from a US academic group aimed at cancer detection and prognosis across multiple tissue types, sitting in the same bracket as the Mahmood stack and Virchow as a clinically motivated histology FM. The pitch is generality across cancer types from a single encoder, which matters because most tissue-specific pathology models do not transfer well outside their training tissue. It has shown strong performance on outcome-prediction tasks, which is a harder target than tile classification because it requires the model to capture morphology that correlates with patient trajectories. The open questions for CHIEF are the ones common to all pathology FMs being marketed for clinical use: prospective validation, scanner generalisation, and how performance holds up on the long tail of rare cancers under-represented in any training corpus.'
- id: prov-gigapath
