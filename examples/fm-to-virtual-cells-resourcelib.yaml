  description: 'Pertpy is the scverse-blessed perturbation-analysis toolbox, formalised in a 2025 Nature Methods paper from European academic groups, that aggregates distances, perturbation-space embeddings, harmonisation utilities, and standardised loaders for Perturb-seq style data into a single Python package. It has become the canonical analysis layer that downstream models and benchmarks plug into, much as scanpy is the canonical layer for general scRNA-seq. The practical effect is to lower the cost of running fair comparisons: a method developer can lean on pertpy''s distance implementations and dataset adapters rather than reimplementing them, which makes critical benchmarks like Kernfeld and Wong-Dilworth easier to reproduce. As a living tool inside scverse, it will absorb whatever new evaluation protocols emerge from the metric debates. The open question is whether the API stabilises fast enough for downstream models to commit.'
