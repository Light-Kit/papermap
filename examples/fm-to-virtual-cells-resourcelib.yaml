  description: 'PhysiCell is an agent-based modelling framework for multicellular simulations introduced in PLOS Computational Biology in 2018 that uses explicit physical and biochemical equations rather than learned representations. Each cell is an agent with mechanical properties, signalling state, and rules for division, death, and migration, and tissues emerge from the rules. Within the virtual-cell library it occupies a distinct niche as the only truly mechanistic approach to virtual tumours and other multicellular systems: nothing in the deep-learning stack currently produces simulations that obey physics at this level of explicit constraint. The trade-off is parameterisation, since the rules and constants have to be supplied. For a working researcher PhysiCell is the right tool when the question requires mechanistic interpretation rather than statistical prediction. The open question is whether hybrid systems — learned components inside an agent-based scaffold — become the dominant integration pattern, and whether PhysiCell or a successor framework hosts them.'
  qa:
    did: 'PhysiCell, introduced in PLOS Computational Biology 2018, is an agent-based modelling framework for multicellular simulations that uses explicit physical and biochemical equations rather than learned representations. Each cell is an agent with mechanical properties, signalling state, and rules for division, death, and migration, with tissues emerging from those rules.'
    purpose: 'The aim was to provide a mechanistic substrate for virtual tumours and other multicellular systems where physics-obeying simulation matters more than statistical prediction. Nothing in the deep-learning stack currently produces simulations constrained at this level of explicit physics, so PhysiCell fills a niche the learned-representation methods structurally cannot occupy.'
    method: 'Cells are represented as agents with mechanical, signalling, and behavioural state, governed by explicit rules for division, death, migration, and intercellular interaction. The simulator integrates physical and biochemical equations across the agent population, so tissue-scale dynamics emerge bottom-up from rule-level mechanics rather than being fitted to data.'
    result: 'PhysiCell is the right tool when a question requires mechanistic interpretation rather than statistical prediction, particularly for virtual tumours and multicellular systems. The open question is whether hybrid systems — learned components inside an agent-based scaffold — become the dominant integration pattern, and whether PhysiCell or a successor hosts them.'
