  why: NOT trained sc-FMs — frozen LLM embeddings of gene names + LR head (~$200) matching scGPT zero-shot.
  description: 'Not sc-FMs at all but two demonstrations — GenePT and scELMo — that frozen LLM embeddings of gene names plus a logistic-regression head, costing on the order of $200 to train, can match scGPT in zero-shot cell-typing. Their importance is rhetorical and economic: they are the single strongest piece of evidence in the reckoning case that the sc-FM pretraining objective itself adds little over what an off-the-shelf text model already encodes about genes. This is the result that makes funders and reviewers pause before signing off on another atlas-scale pretraining run. Open: whether these baselines remain competitive once the task moves from cell-typing to perturbation or dynamics, where text-derived gene priors are intuitively weaker — but they currently anchor the lower end of the cost-effectiveness frontier.'
  qa:
    did: 'GenePT and scELMo demonstrated that frozen LLM embeddings of gene names plus a logistic-regression head, costing on the order of $200 to train, can match scGPT on zero-shot cell-typing. The two papers together are the single strongest piece of evidence in the reckoning case that the sc-FM pretraining objective adds little over off-the-shelf text-derived gene priors.'
    purpose: 'The argument is rhetorical and economic — if a $200 LLM-embeddings-plus-linear-head pipeline ties a $100k pretraining run on zero-shot cell-typing, funders and reviewers should pause before signing off on another atlas-scale sc-FM. The work is meant as a cost-effectiveness lower bound rather than as a new sc-FM design.'
    method: 'Gene names are fed through a frozen general-purpose LLM, the resulting embeddings are averaged or pooled into a per-cell representation weighted by expression, and a logistic-regression classifier is trained on top for cell-type annotation. No sc-FM pretraining, no fine-tuning of the LLM, and total training cost on the order of $200 in compute.'
    result: 'Both pipelines match scGPT on zero-shot cell-typing across the standard benchmarks at a fraction of the cost, anchoring the lower end of the sc-FM cost-effectiveness frontier alongside the parameter-free-2026 result. Whether the baseline holds for perturbation and dynamics — where text-derived gene priors are intuitively weaker — is the open follow-up.'
