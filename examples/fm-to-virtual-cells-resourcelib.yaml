  description: scVI is a VAE-based generative model for single-cell RNA-seq introduced in Nature Methods in 2018 that sidesteps the tokenisation problem entirely by treating gene-expression vectors as continuous observations with a negative-binomial likelihood. It became the practical workhorse for batch integration and the foundation of the scvi-tools ecosystem, which now hosts totalVI for CITE-seq, scANVI for label transfer, and a long tail of related models. For the virtual-cell conversation it matters as the baseline that transformer-based scLLMs must beat to justify their parameter counts, and through 2024-2025 a non-trivial fraction of comparisons have shown scVI or its variants holding their own on integration and label transfer. Maintained by the scverse community, it remains under active development. The open question is whether the next generation of VAE variants, particularly those with structured priors or causal layers, will continue to keep pace with attention-based alternatives.
  qa:
    did: 'scVI introduced a VAE-based generative model for single-cell RNA-seq in Nature Methods 2018 that sidesteps the tokenisation problem entirely by treating gene-expression vectors as continuous observations with a negative-binomial likelihood. It became the foundation of the scvi-tools ecosystem hosting totalVI, scANVI, and many extensions.'
    purpose: 'The aim was to fit a principled probabilistic model to scRNA-seq counts with explicit noise modelling, supporting batch integration, denoising, and downstream label transfer from one architecture. The continuous-vector framing avoids the discretisation choices that later transformer-based scLLMs would have to make, keeping the modality assumption close to the underlying biology.'
    method: 'A variational autoencoder encodes scRNA-seq count vectors into a latent space and decodes them under a negative-binomial likelihood that captures count overdispersion. Batch covariates are injected as conditional inputs, and the same backbone supports CITE-seq through totalVI and label transfer through scANVI without architectural rewrites.'
    result: 'scVI became the practical workhorse for batch integration and the foundation of the scvi-tools ecosystem. Through 2024-2025, a non-trivial fraction of comparisons showed scVI or its variants holding their own on integration and label transfer, serving as the baseline transformer-based scLLMs must beat to justify their parameter counts.'
