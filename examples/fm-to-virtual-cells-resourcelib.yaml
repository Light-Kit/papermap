    result: 'scPRINT reports zero-shot GRN-inference numbers that hold up across datasets, supporting the case that objective design rather than raw scale drives downstream regulatory performance. Whether zero-shot GRN inference from scRNA-seq alone is achievable at meaningful resolution, or whether the assay fundamentally underdetermines regulatory structure, is the open question.'
