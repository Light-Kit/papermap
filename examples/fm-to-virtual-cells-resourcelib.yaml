  org_type: biotech
  region: US
  why: Digital pathology platform.
  description: US digital-pathology platform company that has historically focused on the infrastructure layer such as slide management, workflow, and vendor-neutral viewers, rather than building proprietary algorithms. That positioning matters in the current pathology-FM moment because it makes Proscia a candidate distribution channel for third-party foundation models rather than a model developer itself. The pathology-FM stack now consolidating around UNI, Virchow, CONCH, PathChat, and TITAN needs an integration layer to reach pathologists, and platform vendors are the obvious place that lives. Open question is whether platform companies stay neutral and integrate multiple FM backends or pick a single stack, and how the AstraZeneca-Modella acquisition changes the calculus for vendors that previously assumed they could buy or partner with FM teams. Useful as the workflow-layer comparison point for any pathology-FM deployment claim.
- id: modella-ai
