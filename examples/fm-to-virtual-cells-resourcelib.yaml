  why: H&E → 40-protein spatial proteomics; +22% prognostic, +24-39% immunotherapy-response prediction across 2298 NSCLC patients.
  description: 'Hex is the headline 2026 clinical proof-of-concept for the multimodal pathology-FM thread. The model maps H&E whole-slide images directly to 40-protein spatial proteomics, then uses those inferred proteomic profiles for downstream prediction. On a 2298-patient NSCLC cohort it delivered +22% prognostic accuracy and +24-39% immunotherapy-response prediction over single-modality baselines. The result validates two bets at once: that pathology FMs can substitute expensive spatial-proteomics assays at inference time, and that multimodal fusion produces clinically-meaningful lift rather than marketing-only lift. Published in Nature Medicine, it is the strongest single peer-reviewed clinical result the FM-to-virtual-cells corpus has seen, and a likely template for the next wave of image-omics fusion papers targeting other tumour types and treatment decisions.'
  qa:
    did: 'Hex introduced a model that maps H&E whole-slide images directly to 40-protein spatial proteomics, then uses the inferred proteomic profiles for downstream clinical prediction. Published in Nature Medicine 2026, it tested both prognostic and immunotherapy-response prediction across a 2298-patient NSCLC cohort.'
    purpose: 'The aim was to show that pathology foundation models can substitute expensive spatial-proteomics assays at inference time, and that multimodal H&E-plus-proteomics fusion produces clinically meaningful lift rather than marketing-only lift. NSCLC immunotherapy response was the high-stakes test case where current single-modality predictors leave the most accuracy on the table.'
    method: 'An image encoder is trained to predict 40-protein spatial proteomic profiles from H&E whole-slide images, producing virtual proteomics at inference time. The predicted protein channels then feed downstream prognostic and immunotherapy-response classifiers, so the model effectively performs image-to-omics translation as a clinical-prediction substrate.'
    result: 'On a 2298-patient NSCLC cohort, Hex delivered +22% prognostic accuracy and +24-39% improvement on immunotherapy-response prediction over single-modality baselines. It stands as the strongest single peer-reviewed clinical result in the FM-to-virtual-cells corpus and a likely template for image-omics fusion in other tumour types.'
