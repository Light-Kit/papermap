  why: Variant-effect SOTA; replaces Enformer + Borzoi; 25/26 wins at 1-Mb context.
  papermap_category: other_fm
  description: 'DeepMind''s 2025 successor to Enformer and Borzoi, published as the new state of the art on variant-effect prediction. It extends the sequence-to-function paradigm to roughly 1-Mb context and reportedly wins 25 of 26 benchmark comparisons against the prior generation. The practical consequence is that two previously distinct models with different output tracks collapse into one stack, which simplifies downstream variant-interpretation pipelines and pushes more of the noncoding-variant burden onto a single foundation model. Open questions are the usual ones for industrial sequence FMs: how much of the gain is from architecture versus data and compute, how it handles cell types underrepresented in training, and what the licensing and access story looks like for academic use of the weights versus the API.'
  qa:
    did: 'AlphaGenome is DeepMind''s 2025 successor to Enformer and Borzoi, published as the new state of the art on variant-effect prediction. It extends the sequence-to-function paradigm to roughly 1-megabase context and reportedly wins 25 of 26 benchmark comparisons against the prior generation of sequence-to-function models.'
    purpose: 'The aim was to collapse two previously distinct sequence-to-function stacks — Enformer for expression and Borzoi for RNA-seq coverage — into one model and simultaneously push the context window an order of magnitude. The downstream payoff is simpler variant-interpretation pipelines anchored on a single foundation model.'
    method: 'The model extends transformer-based sequence-to-function modelling to a 1-megabase input window and unifies the output tracks that previously required separate Enformer and Borzoi stacks. It is shipped through DeepMind''s commercial channels with a defined access story for academic versus hosted use of the weights.'
    result: 'AlphaGenome reported wins on 25 of 26 benchmark comparisons against Enformer and Borzoi, pushing more of the noncoding-variant burden onto a single foundation model. Open questions are how much gain came from architecture versus data and compute, performance on underrepresented cell types, and academic-access terms for the weights.'
