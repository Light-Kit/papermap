  description: DrugCLIP is a 2023 NeurIPS paper from a Chinese academic group that ports the CLIP contrastive-learning recipe to protein-molecule retrieval, providing a zero-shot virtual-screening baseline by embedding proteins and small molecules into a shared space. The contribution was less about beating docking on accuracy and more about establishing that pretraining-then-retrieve is a viable alternative to scoring-function-based virtual screens, and the embeddings have since been reused by DrugReflector and other successor systems. Within the foundation-model-for-drug-discovery lineage it sits between the early EquiBind/DiffDock geometric approaches and the current generation of agentic screening pipelines. For this library it is mostly relevant as a baseline citation rather than an active production tool. The open question, three years on, is how well CLIP-style retrieval competes with structure-aware methods on prospective benchmarks where the test set is genuinely unseen.
