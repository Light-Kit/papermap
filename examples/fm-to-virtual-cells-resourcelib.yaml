  description: 'The 2021 DeepMind paper that crossed the threshold to near-experimental accuracy on protein-structure prediction, published in Nature. AlphaFold2 is the foundational result that the entire current protein-modelling wave builds on: every subsequent protein FM, every diffusion-based de novo design pipeline, and every structure-conditioned drug-design model implicitly assumes a world in which predicted structures for arbitrary sequences are cheap. It also redefined what counted as a deep-learning result in biology, because the validation came from CASP rather than from internal benchmarks. Open questions in 2026 are no longer about whether the model works but about where the residual errors live, how the multimer and dynamic-conformation successors handle disorder and assembly, and how much of the residual gap to experiment can be closed by data versus by architecture.'
  qa:
    did: 'AlphaFold2 is the 2021 DeepMind paper that crossed the threshold to near-experimental accuracy on protein-structure prediction, published in Nature. It is the foundational result every subsequent protein FM, every diffusion-based de novo design pipeline, and every structure-conditioned drug-design model implicitly assumes, redefining what counted as a deep-learning result in biology.'
    purpose: 'The aim was to predict three-dimensional protein structure from sequence at experimental accuracy. Validation came from CASP rather than internal benchmarks, which is what made the result land as a deep-learning breakthrough — the field could not dismiss the numbers as benchmark gaming because CASP organisers controlled the held-out evaluation.'
    method: 'The architecture combines evolutionary information from multiple sequence alignments with attention-based geometric reasoning over residue pairs, iteratively refining a predicted structure. The training pipeline integrates supervised learning on the PDB with the MSA-based input representation, producing per-residue confidence estimates alongside the predicted coordinates.'
    result: 'AlphaFold2 reached near-experimental accuracy at CASP14, making predicted structures for arbitrary sequences cheap and unlocking the protein-modelling wave that followed. By 2026 the residual questions are no longer whether the model works but where errors live, how multimer and dynamic-conformation successors handle disorder and assembly, and the data-versus-architecture gap to experiment.'
