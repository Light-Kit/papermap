  description: 'scPRINT, a 50M-cell pretrained sc-FM developed in Europe and aimed specifically at robust zero-shot gene-regulatory-network inference, rather than the cell-typing task most of its peers chase. Its importance is the task choice: GRN inference is the downstream the virtual-cell programme actually needs and the one most sc-FMs do not explicitly optimise for, so scPRINT is one of the cleaner tests of whether atlas-scale pretraining buys anything for regulatory biology specifically rather than for representation quality in general. The 50M-cell scale sits comfortably in the upper-middle of the sc-FM range, deliberately not chasing the largest atlases, which makes the result more about objective design than about brute scale. Open: whether zero-shot GRN inference from scRNA-seq alone is achievable at meaningful resolution, or whether the assay itself fundamentally underdetermines regulatory structure no matter how big the pretraining corpus.'
