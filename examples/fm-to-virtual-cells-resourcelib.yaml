    purpose: 'The aim was to take a task choice the virtual-cell programme actually needs — zero-shot GRN inference — and ask whether atlas-scale pretraining buys anything for regulatory biology specifically. Most sc-FMs optimise representation quality for cell-typing and report GRN numbers as an afterthought, leaving the regulatory-inference question untested.'
