    did: 'Nicheformer introduced a spatial-omics single-cell foundation model with a niche-aware pretraining objective. Published in Nature Methods in 2025 from the Theis lab, it is one of the first credible attempts to fold spatial information directly into sc-FM pretraining rather than bolting spatial reasoning onto a dissociated-cell model after the fact.'
    purpose: 'The goal was to make cell representations niche-aware from the start, so that tissue-level behaviour — which is mostly niche-dependent — could be predicted by a single substrate. Any virtual-cell programme with clinical ambitions has to handle spatial context, and folding it into pretraining is more principled than bolting it on downstream.'
    method: 'Cells are pretrained with an objective that conditions each cell''s representation on its local tissue neighbours from spatial-omics measurements, rather than treating each cell as independent. The transformer backbone is otherwise standard, and downstream heads can be attached for cell-typing, niche-state prediction, and other tissue-context-sensitive tasks.'
    result: 'Nicheformer reports competitive performance on niche-prediction and spatial-context tasks at release and slots into the post-reckoning architectural-response wave alongside TxPert and xVERSE. Whether the niche objective survives the leakage-controlled spatial benchmarks the field is still building remains open, since spatial evaluation infrastructure lags behind dissociated scRNA-seq.'
