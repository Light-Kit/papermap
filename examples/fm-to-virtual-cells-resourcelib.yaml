  description: 'An AI-proteomics challenge organised out of Westlake University in Hangzhou that pairs mass-spectrometry data with foundation-model-style evaluation. The format matters because proteomics has lagged single-cell and pathology in benchmark-driven FM development, partly because raw MS spectra are awkward inputs and ground truth peptide assignments are noisier than image labels. By staging a competition with shared eval infrastructure, the AIPC team is doing for proteomics what the CZI Virtual Cell Challenge did for perturbation prediction: forcing a common scoreboard. It also sits at an interesting bridge between AIVC and mass-spec ML — virtual cells will eventually need proteomic readouts, not just transcriptomic ones. The contest''s open question is whether current protein FMs (ESM, AlphaFold-derived embeddings) actually help on spectrum-to-peptide tasks or whether MS-native architectures still win.'
- id: czi-vci-2025-event
  kind: event
  name: Virtual Cell Challenge 2025 — first round
  venue: CZI / Biohub
  year: 2025
  topics:
  - virtual-cell
  - eval
  - competition
  status: launched
  org_type: foundation
  region: US
  why: The annual benchmark cycle whose 2025 launch crystallised the field.
  description: 'The 2025 launch event for the Chan Zuckerberg Initiative''s Virtual Cell Challenge, the first annual benchmark cycle tied to the CZI Virtual Cells Initiative. Its significance is structural: before VCC, the sc-FM community had no agreed leaderboard for perturbation prediction, and every group reported on private splits of GEARS, Norman, or Replogle data. A funded, annual competition with a held-out test set forced model builders into apples-to-apples comparison, and the resulting scoreboard is what made the 2025 reckoning around scGPT and Geneformer legible to people outside the niche. The event also anchored CZI''s funding agenda for the next cycle of grants. Open questions: whether subsequent VCC rounds expand beyond Perturb-seq into spatial or multimodal tasks, and how the benchmark resists the usual Goodhart drift once compute-rich teams target it directly.'
- id: cao-virtual-embryos-2026
  kind: paper
  name: Towards predictive virtual embryos
  authors: Cao, Lu & Qiu
  venue: Nature Methods
  year: 2026
  url: https://www.nature.com/articles/s41592-026-03055-4
  topics:
  - virtual-cell
  - spatial
  - lineage
  status: published
  org_type: academic
  region: US
  why: Virtual-embryo extension — integrating single-cell and spatial data into a developmental simulator.
  description: 'A 2026 Nature Methods paper from the Cao lab extending the virtual-cell agenda into virtual embryos by integrating single-cell transcriptomics with spatial and lineage information into a developmental simulator. The contribution matters because most sc-FM work has been static — snapshots of cell state — while embryogenesis is intrinsically a trajectory problem requiring lineage trees, spatial context, and time. Folding all three into one model is a step toward the kind of organ-scale generative biology that CZI and Arc have flagged as the five-year goal. It also gives the field something to compare against the digital-twin and virtual-organ camps coming from clinical modelling. Open questions: whether the embryo simulator generalises across species, how it handles rare cell states in the lineage, and whether the integration is genuinely joint or sequential.'
- id: zhou-virtual-lungs-2026
  kind: paper
  name: Digital twins of ex vivo human lungs for personalised therapeutic-efficacy evaluation
  authors: Zhou et al.
  venue: Nature Biotechnology
  year: 2026
  url: https://doi.org/10.1038/s41587-026-03121-4
  topics:
  - digital-twin
  - clinical
  - virtual-cell
  status: published
  org_type: academic
  region: US
  why: Virtual-organ agenda — personalised organ-scale simulation on real lungs.
  description: 'A 2026 Nature Biotechnology paper from the Zhou group presenting a personalised, organ-scale simulator built on real lung data — a virtual-organ entry in the broader virtual-cell-to-virtual-patient arc. The work matters because it pushes the AIVC agenda out of the single-cell snapshot regime and into a clinical digital-twin frame where the simulation is tied to a specific patient''s anatomy and physiology. That positions it alongside efforts like Insitro and the CZI virtual cells programme but on the organ rather than the cell scale. The lung is a useful target because of strong existing imaging-plus-omics integration. The open question is calibration: personalised organ simulators only earn their keep if they predict intervention response on the same patient, and the paper''s evaluation design will set the template for the next wave of organ-scale models.'
- id: mstar
  kind: tool
  name: mSTAR — multimodal spatial-transcriptomics aggregation FM
  authors: Xu et al.
  venue: Nature Communications
  year: 2025
  url: https://www.nature.com/articles/s41467-025-66220-x
  topics:
  - pathology
  - spatial
  - multimodal
  - foundation-model
  status: published
  org_type: academic
  region: CN
  why: Spatial pathology FM aggregating ST + WSI signals.
  description: 'A 2025 Nature Communications paper introducing mSTAR, a spatial pathology foundation model that fuses spatial transcriptomics with whole-slide histology images. The design is the interesting bit: rather than treat ST and WSI as separate modalities, mSTAR aligns them in a shared embedding so that a model trained on either can be queried with the other. That matters because ST data is small and expensive while WSI is huge and cheap, so an aligned representation lets the field amortise scarce ST signal across the much larger WSI corpus. It sits in the same Chinese pathology-FM wave as PathOrchestra and GPFM and gives the spatial-omics community a credible pathology anchor. Open questions: how well the spatial alignment holds across tissue types not seen in pretraining, and whether downstream clinical tasks actually benefit from the ST channel versus image-only baselines.'
- id: gpfm-2026
  kind: tool
  name: GPFM — Gigapixel Pathology Foundation Model
  authors: Ma et al.
  venue: Nature Biomedical Engineering
  year: 2026
  url: https://www.nature.com/articles/s41551-025-01488-4
  topics:
  - pathology
  - foundation-model
  status: published
  org_type: academic
  region: CN
  why: Large-scale gigapixel pathology FM.
  description: A 2026 Nature Biomedical Engineering paper presenting GPFM, a large-scale gigapixel pathology foundation model trained directly at whole-slide-image resolution rather than on tile-level patches. The shift to gigapixel-native pretraining matters because the dominant pathology FM family — UNI, Virchow, CONCH — operates on small patches and aggregates afterwards, which limits the model's ability to learn long-range tissue architecture that pathologists actually use when reading slides. GPFM is one of several Chinese-led entries in the 2026 pathology wave (alongside mSTAR and PathOrchestra) competing with the US/EU axis of Mahmood, Paige and Owkin, and its scale claims place it among the larger models in the field. The open question is whether gigapixel context actually translates to better clinical task performance, or whether patch-plus-aggregation models — which are cheaper to train and easier to fine-tune — remain the practical default outside of the biggest, best-resourced deployments.
- id: pathpt-2026
  kind: tool
  name: PathPT — pathology transformer
  venue: Nature Communications
  year: 2026
  url: https://www.nature.com/articles/s41467-026-71715-2
  topics:
  - pathology
  - foundation-model
  status: published
  org_type: academic
  region: global
  why: Pathology FM variant in the 2026 wave.
  description: 'A 2026 Nature Communications entry in the now-crowded pathology foundation-model field, sitting alongside UNI/Virchow/CONCH and the Chinese wave of mSTAR, GPFM, and PathOrchestra. As one of several 2026 pathology FMs to land in Nature-family journals, PathPT is best read as evidence that pathology has now fully entered its post-ImageNet phase: foundation-model architecture and self-supervised pretraining on slide corpora are the default, and the differentiation is in training data scale, multimodality, and clinical evaluation rather than in the core recipe. Whether PathPT establishes a distinctive niche — clinical task focus, particular cancer type, deployment claim — would change its standing in the landscape. The open question is whether the field will consolidate around two or three models or continue to fragment as each major lab and consortium ships its own.'
- id: pathorchestra
  kind: tool
  name: PathOrchestra — ensemble pathology FM
  authors: Yan et al.
  venue: npj Digital Medicine
  year: 2025
  url: https://www.nature.com/articles/s41746-025-02027-w
  topics:
  - pathology
  - foundation-model
  status: published
  org_type: academic
  region: CN
  why: Ensemble approach across pathology FMs.
  description: 'A 2025 npj Digital Medicine paper introducing PathOrchestra, which takes an ensemble approach across multiple pathology foundation models rather than pushing a single bigger model. The framing is useful: by 2025 the pathology-FM field had enough credible candidates (UNI, Virchow, CONCH, Phikon, GPFM) that combining their complementary inductive biases became a tractable engineering question. PathOrchestra is one of the Chinese-led entries in the 2025–2026 wave and is interesting precisely because it concedes that no single FM dominates across tasks. That''s a reasonable empirical stance given the inconsistent benchmark behaviour documented in Campanella''s pathology benchmark and similar evaluations. Open questions: whether ensembling holds up clinically once deployment latency and certification matter, and whether the combined model leaks any single-FM weaknesses that would have been masked by a stronger backbone.'
- id: pathchat-2-2026
  kind: tool
  name: PathChat-2
  venue: Mahmood Lab
  year: 2026
  topics:
  - pathology
  - multimodal
  - agents
  status: launched
  org_type: academic
  region: US
  why: Successor instruction-tuned pathology assistant (>1M pairs).
  description: 'The 2026 successor to PathChat from the Mahmood lab, an instruction-tuned conversational pathology assistant trained on more than one million pathology image-text pairs. PathChat-2 sits at the agentic end of the pathology stack — not just an image encoder like UNI or a multimodal embedder like CONCH but a model designed to answer pathologist-style questions about a slide. The scale-up to over a million instruction pairs is the main delta from PathChat-1 and places it in the same instruction-tuning regime that powered the general-LLM jump from base to chat models. It also slots cleanly into Mahmood''s full pathology vertical (UNI, TITAN, CONCH, PathChat, PathChat-DX). The open question is clinical: whether instruction-tuned outputs are trustworthy enough for diagnostic workflows, given PathChat-DX''s FDA Breakthrough status implies the lab is steering toward regulated deployment.'
- id: janowczyk-uni-egfr-2025
  kind: paper
  name: UNI for EGFR mutation detection in clinical trial
  authors: Janowczyk et al.
  venue: Nature Medicine
  year: 2025
  url: https://www.nature.com/articles/s41591-025-03780-x
  topics:
  - pathology
  - clinical
  status: published
  org_type: academic
  region: US
  why: First deployment-grade clinical FM paper (197 patients, 43% testing avoidance).
  description: 'A 2025 Nature Medicine paper from the Janowczyk group using the UNI pathology foundation model for EGFR mutation prediction in a 197-patient cohort, with the headline result that the model could avoid roughly 43% of confirmatory molecular tests. The contribution matters because it''s one of the first papers to frame a pathology FM result in deployment-grade terms — not AUC on a held-out split but tests-avoided, the metric a hospital actually budgets against. That shifts the conversation from method papers to operations papers and gives clinical labs a concrete number to plug into business cases for FM-based triage. Open questions are familiar from any model-deployment study at this size: how the 43% holds up on external cohorts, whether the avoidance rate trades off against false-negative cost in EGFR-positive patients, and how regulators will treat an FM whose weights they cannot inspect.'
- id: campanella-pathology-bench-2025
  kind: benchmark
  name: Campanella et al. clinical-grade pathology panel
  authors: Campanella et al.
  venue: Nature Communications
  year: 2025
  url: https://www.nature.com/articles/s41467-025-58245-z
  topics:
  - pathology
  - eval
  - benchmark
  - clinical
  status: published
  org_type: academic
  region: US
  why: Multi-task pathology benchmark for FM evaluation.
  description: 'A 2025 Nature Communications benchmark from Campanella and colleagues evaluating pathology foundation models across multiple clinical and research tasks. The work matters because it puts UNI, Virchow, CONCH, Phikon and the rest on a shared scoreboard at a moment when each lab was reporting on private internal splits, mirroring the role that the CZI Virtual Cell Challenge plays for sc-FMs. The benchmark covers a breadth of cancer-type and prediction tasks that exposes where current pathology FMs generalise and where they don''t, which has been the source of the discrepancy between vendor benchmarks and independent replications. Open questions: whether the benchmark tasks are stable enough to resist Goodhart pressure as the next generation of FMs is explicitly tuned for them, and how it will integrate the gigapixel-native entries like GPFM that don''t fit the patch-based evaluation harness.'
- id: evo-v1
  kind: tool
  name: Evo (v1)
  authors: Nguyen et al.
  venue: Science
  year: 2024
  url: https://www.science.org/doi/10.1126/science.ado9336
  topics:
  - genomic
  - foundation-model
  - generative
  status: published
  org_type: foundation
  region: US
  why: First genomic FM with demonstrated in-context learning (Evo2 successor).
  description: 'A 2024 Science paper from the Arc Institute introducing Evo, the first genomic foundation model to demonstrate meaningful in-context learning at long DNA context lengths, and the precursor to Evo2. Evo matters because it was the first credible demonstration that the FM recipe — transformer-style architectures, self-supervised pretraining, scale — actually transfers to nucleotide sequences in a way DNABERT and earlier attempts had not. The model handles context lengths well beyond what BERT-style genomic models managed and supports generative tasks like prokaryotic genome design. Its release also positioned Arc Institute as a serious non-DeepMind, non-EvolutionaryScale compute player in biology FMs. Open questions: whether Evo-style long-context modelling scales to eukaryotic genomes with their regulatory complexity, and whether downstream users actually exercise the in-context learning behaviour versus treating Evo as a frozen embedder.'
- id: dnabert-v1
  kind: tool
  name: DNABERT
  authors: Ji et al.
  venue: Bioinformatics
  year: 2021
  url: https://doi.org/10.1093/bioinformatics/btab083
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: Original BERT-style genomic FM.
  description: 'The 2021 Bioinformatics paper introducing DNABERT, the original BERT-style genomic foundation model that ported the masked-language-modelling recipe from NLP to DNA k-mers. Its historical role is the main reason it still appears in the catalogue: DNABERT showed that self-supervised pretraining on raw nucleotide sequence could yield useful representations for downstream tasks like promoter prediction and splice-site detection, opening the door to the wave of genomic FMs that includes Nucleotide Transformer, HyenaDNA, Evo, AlphaGenome and others. Its limits are now obvious — short context, k-mer tokenisation, no in-context behaviour — but it set the template that later models iterated on. Open question: in 2026 DNABERT is essentially a teaching example, but it remains a useful baseline for evaluating whether newer genomic FMs deliver gains commensurate with their much larger compute budgets.'
- id: omnicell-spatial
  kind: paper
  name: OmniCell — multimodal spatial FM
  venue: bioRxiv
  year: 2025
  url: https://www.biorxiv.org/content/10.64898/2025.12.29.696804v1
  topics:
  - spatial
  - multimodal
  - single-cell
  - foundation-model
  status: preprint
  org_type: academic
  region: global
  why: Multimodal spatial-transcriptomics FM.
  description: 'A 2025 bioRxiv preprint introducing OmniCell-Spatial, a multimodal spatial-transcriptomics foundation model that fuses single-cell transcriptomic state with spatial context. The model sits in the narrow band of work trying to extend the sc-FM recipe — which by default treats cells as bag-of-genes vectors — into the spatial regime where neighbour identity carries real information. That gap matters because most existing spatial methods are either non-foundation-model graph approaches or sc-FMs with spatial coordinates bolted on after the fact. The contribution is in the joint pretraining over both modalities. Open questions are typical of preprint-stage spatial FMs: how it benchmarks against scGPT-spatial and the various spatial-native models like Nicheformer, whether the spatial context actually helps perturbation tasks or only annotation, and how data scale will need to grow before the spatial channel pays for itself in pretraining.'
- id: spatialfusion
  kind: paper
  name: SpatialFusion — fusion of spatial data modalities
  venue: bioRxiv
  year: 2026
  url: https://www.biorxiv.org/content/10.64898/2026.03.16.712056v1
  topics:
  - spatial
  - multimodal
  status: preprint
  org_type: academic
  region: global
  why: Multimodal spatial-transcriptomics integration FM.
  description: 'A 2026 bioRxiv preprint presenting SpatialFusion, a multimodal spatial-transcriptomics integration model that aims to combine data across spatial platforms (Visium, Xenium, MERFISH and friends) into a shared representation. The integration angle is the load-bearing part: spatial transcriptomics has a deeper platform-effect problem than single-cell because each technology samples a different gene panel at a different resolution, which makes cross-dataset pretraining genuinely hard. SpatialFusion sits alongside OmniCell-Spatial and CLM-X in the 2025-2026 wave of preprints treating spatial as a first-class FM target rather than a downstream application of sc-FMs. Open questions: whether the integration is robust across the very different sparsity profiles of imaging-based versus sequencing-based spatial assays, and whether the model delivers gains on spatial-native tasks like niche identification or remains primarily a unification layer.'
- id: clm-x
  kind: paper
  name: CLM-X — spatial-temporal cell-language model
  venue: bioRxiv
  year: 2026
  url: https://www.biorxiv.org/content/10.64898/2026.02.17.704943v1
  topics:
  - spatial
  - single-cell
  - foundation-model
  status: preprint
  org_type: academic
  region: global
  why: Spatial + temporal context for cell language modelling.
  description: 'A 2026 bioRxiv preprint introducing CLM-X, a cell language model that extends the sc-FM recipe by folding in spatial and temporal context — cells are modelled not just as gene-expression vectors but as states embedded in tissue neighbourhoods and developmental trajectories. The motivation is direct: scGPT, Geneformer, and UCE treat each cell as independent, which throws away the structure that biology actually cares about. CLM-X is one of several 2026 responses to the 2025 reckoning, where simple linear baselines matched or beat sc-FMs on perturbation tasks; the bet here is that spatial-temporal grounding will give the architectural complexity something genuine to learn. Open questions: whether the model actually benefits on perturbation or annotation benchmarks against the new linear-baseline floor, and how it handles the asymmetry between spatial datasets (small, dense) and dissociated single-cell datasets (large, context-free).'
- id: cellama
  kind: paper
  name: CELLama — cell language model
  venue: Advanced Science
  year: 2026
  url: https://advanced.onlinelibrary.wiley.com/doi/10.1002/advs.202513210
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: CN
  why: Alternative transformer-based cell FM.
  description: 'A 2026 Advanced Science paper introducing CeLLaMA, a transformer-based single-cell foundation model from a Chinese academic group. CeLLaMA is one of several 2026 alternative cell FM architectures appearing after the 2025 reckoning, where the dominant first-wave models (scGPT, Geneformer) were shown to underperform simple baselines on key tasks. The contribution sits in the architectural details — token design, attention pattern, pretraining objective — rather than in claiming a wholly new paradigm. As a Chinese entry into a previously US/EU-led model class, it also marks the broadening of the sc-FM ecosystem beyond the early CZI-and-Mahmood-lab axis. Open questions: how CeLLaMA''s perturbation and annotation results compare against the linear baselines that have become the de facto floor, and whether its architecture choices actually move the field or land in the long tail of incremental FM variants.'
- id: cancerfoundation
  kind: paper
  name: CancerFoundation
  venue: bioRxiv
  year: 2024
  url: https://www.biorxiv.org/content/10.1101/2024.11.01.621087v1
  topics:
  - single-cell
  - foundation-model
  - clinical
  status: preprint
  org_type: academic
  region: global
  why: Cancer-domain-specific single-cell FM.
  description: 'A 2024 bioRxiv preprint introducing CancerFoundation, a domain-specific single-cell foundation model pretrained on tumour-derived data rather than the pan-tissue CELLxGENE corpus that anchors scGPT and Geneformer. The bet is that domain narrowing helps: cancer cells live in a smaller, more relevant region of expression space, and a model that doesn''t burn capacity on healthy reference tissue might do better on oncology-specific tasks like subtype prediction or therapy response. That puts it in the same conceptual bucket as the various organ-specific FMs that have started to appear (brain, kidney, immune) and pushes back on the implicit pan-cell assumption behind the 2024 sc-FM wave. Open questions: whether the cancer-only corpus is large and diverse enough to support meaningful pretraining at competitive scale, and whether the resulting model actually beats general sc-FMs once fine-tuned on the same cancer tasks.'
- id: langstem-langcell
  kind: tool
  name: LangCell / LangStem
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: CN
  why: LLM-based cell annotation tool.
  description: 'An LLM-based cell annotation tool from a Chinese academic group that treats single-cell annotation as a language task — feeding expression-derived features into a language model and reading out cell type as natural-language output. The approach sits in a small but growing band of work that bypasses the sc-FM pretraining tradition entirely and rides the general-LLM curve instead, on the thesis that scaling pressure outside biology will deliver better representations than domain-specific pretraining can. That makes it a useful counterfactual to scGPT and Geneformer: if a vanilla LLM prompt yields competitive annotation accuracy, the case for billion-token cell-token pretraining weakens. Open questions: how the tool handles novel cell types not described in its training text, whether expression features are passed in a lossless form, and how it compares against linear baselines on the same datasets.'
- id: get-toolkit
  kind: tool
  name: GET — gene expression toolkit
  topics:
  - single-cell
  - foundation-model
  status: launched
  org_type: academic
  region: global
  why: sc-FM-based gene-expression analysis toolkit.
  description: 'A toolkit built on top of single-cell foundation models for gene-expression analysis tasks — embedding extraction, similarity search, cell-type annotation and the like. The role of GET-style toolkits in the ecosystem is to translate FM checkpoints (scGPT, Geneformer, UCE, TranscriptFormer) into something a bench biologist can actually use without writing PyTorch. That maps onto the same layer that scvi-tools and scverse occupy for classical methods, and its existence is a leading indicator that sc-FMs have moved from research artefact toward routine analysis tool. Open questions: how GET handles the model-zoo problem now that there are a dozen credible sc-FMs with incompatible APIs, and whether its abstractions hold up as the field shifts toward agentic and compositional FMs where a single forward pass is no longer the right unit of work.'
- id: cytoverse-browser
  kind: tool
  name: CytoVerse — browser-native sc-FM via ONNX
  venue: bioRxiv
  year: 2026
  url: https://www.biorxiv.org/content/10.64898/2026.01.29.702554v1
  topics:
  - single-cell
  - foundation-model
  status: preprint
  org_type: academic
  region: US
  why: In-browser sc-FM inference; pushes inference to where the data is.
  description: 'A 2026 bioRxiv preprint introducing an in-browser inference layer for single-cell foundation models — pushing sc-FM forward passes onto the user''s laptop via WebGPU rather than centralising them on a GPU cluster. The infrastructure angle matters more than the model novelty: sc-FMs only become routine analysis tools if the inference cost is bearable for individual labs, and a browser-resident model lets a biologist annotate or embed a dataset without uploading it to someone else''s servers. That has obvious privacy implications for clinical data and is one of the few moves in the ecosystem treating data sovereignty as a first-order constraint. Open questions: what model sizes are practically deployable in-browser given current WebGPU limits, whether quantisation or distillation are required, and how the approach handles the larger 2026-vintage models that no longer comfortably fit consumer hardware.'
- id: cradle-vae
  kind: tool
  name: CRADLE-VAE — compositional active learning
  authors: Bunne et al.
  topics:
  - perturbation-prediction
  - generative
  - virtual-cell
  status: preprint
  org_type: academic
  region: US
  why: Closed-loop virtual-cell active learning prototype.
  description: 'A preprint prototype of a closed-loop active-learning system for virtual-cell perturbation prediction, combining a variational autoencoder for perturbation-response generation with an acquisition strategy that selects next experiments. The framing is the interesting part: most VC work to date has been offline prediction on fixed datasets, while Cradle-VAE explicitly closes the loop between model and wet-lab experiment selection. That''s the architecture the CZI Virtual Cells Initiative and Arc Institute have flagged as the actual long-term goal — models that decide what to measure next, not just models that retrodict held-out Perturb-seq splits. The open questions are practical: how the selection policy holds up against the strong baseline of random or diversity-based sampling, what the wet-lab partner profile looks like, and whether the VAE generative head is competitive with more recent diffusion-based perturbation models.'
- id: scpoli
  kind: tool
  name: scPoli — single-cell policy learning
  authors: Lotfollahi et al.
  topics:
  - single-cell
  - perturbation-prediction
  status: published
  org_type: academic
  region: UK
  why: Policy-based perturbation prediction; the scArches lineage.
  description: 'A policy-based perturbation-prediction tool from the scArches lineage out of the Theis group (UK/EU axis), framing perturbation response as a learned mapping conditioned on context cells. scPoli predates the wave of large sc-FMs and represents a different bet: rather than train one giant cell model and zero-shot perturbations, build a smaller, conditional model that integrates explicit prior structure from scArches reference mapping. That puts it in the methodological tradition that the 2025 reckoning vindicated — structured, smaller approaches matching or beating large FMs on perturbation tasks — and it remains one of the practical baselines the field tests against. Open questions: how scPoli adapts to the Tahoe-100M and Replogle-genome-wide datasets that have arrived since its release, and whether the scArches conditioning approach can be folded into FM-scale models or remains better suited to its current scale.'
- id: scvi-tools
  kind: tool
  name: scvi-tools
  venue: Theis Lab
  url: https://scvi-tools.org/
  topics:
  - single-cell
  status: launched
  org_type: academic
  region: EU
  why: Single-cell methodology reference framework underpinning much of the field.
  description: 'The reference Python framework for probabilistic single-cell methods — scVI, scANVI, totalVI, the scArches ecosystem and so on — maintained out of the Yosef and Lopez groups with broad EU/US community involvement. scvi-tools is the load-bearing substrate for most of the field''s classical machinery and remains the default integration and batch-correction stack against which any new sc-FM has to justify itself. Its continued relevance after the 2025 reckoning is itself the point: many of the simple baselines that matched or beat scGPT on perturbation tasks were scvi-tools-grounded variational models, suggesting that the framework''s probabilistic priors are doing more work than the FM wave assumed. Open questions: how scvi-tools and its scverse neighbours absorb foundation-model checkpoints as one component in a larger pipeline rather than as wholesale replacements.'
- id: scverse
  kind: tool
  name: scverse ecosystem (Scanpy / AnnData / squidpy / scvi-tools)
  topics:
  - single-cell
  - spatial
  status: launched
  org_type: consortium
  region: global
  why: Community standards for single-cell Python tools.
  description: 'A community-governed consortium of Python tools for single-cell and spatial omics, anchored by AnnData, Scanpy, scvi-tools, SpatialData and a wider ecosystem of compatible packages. scverse is the de facto standards body for the field''s open-source stack: format conventions, API expectations, and the basic data classes that almost every sc-FM and downstream tool actually reads and writes. Its role in the FM-to-virtual-cells landscape is infrastructural — without scverse interoperability, the model zoo would have fragmented into incompatible silos the way deep-learning research often does. The community is broad, with strong EU (Helmholtz, EMBL) and US participation. Open questions: how scverse will evolve formats for the spatial-multimodal and trajectory-aware data that the 2026 wave of models is starting to demand, and how governance scales as adoption widens into industry.'
- id: signifinder
  kind: tool
  name: signifinder — sc-FM wrapper for Bioconductor
  venue: Calura lab, U Padua
  topics:
  - single-cell
  - foundation-model
  status: launched
  org_type: academic
  region: EU
  why: Bioconductor interface to sc-FMs.
  description: 'A Bioconductor package providing an R-side interface to single-cell foundation models, letting researchers pull FM-derived embeddings and signatures into the standard Bioconductor analysis flow. Its existence is a small but telling signal: the sc-FM ecosystem is Python-native (PyTorch, scverse, AnnData), and Bioconductor users have largely been outside the conversation. A package that bridges the two communities makes FM outputs available to the large body of bulk and single-cell analysis that still runs in R, including a lot of clinical and translational work. The trade-off is the usual wrapper-package one: feature coverage tends to lag the Python side, and version drift becomes a maintenance burden. Open questions: whether signifinder keeps up with the rapid model zoo expansion, and whether the bridging strategy generalises beyond the few FMs it currently wraps.'
- id: mia-tools
  kind: tool
  name: mia / miaTime / miaViz
  venue: Borman, U Turku
  topics:
  - single-cell
  - spatial
  status: launched
  org_type: academic
  region: EU
  why: Scverse-adjacent tools for single-cell analysis.
  description: 'A set of scverse-adjacent tools for single-cell and spatial analysis maintained by an EU academic group, sitting in the wider ecosystem of compatible packages that surround Scanpy, AnnData and SpatialData. Tools in this layer typically fill specific analysis gaps — a particular clustering method, a spatial registration helper, a specialised QC step — rather than competing with the core scverse packages. Their role in the broader FM-to-virtual-cells landscape is to keep the surrounding analysis pipeline credible: an sc-FM is only as useful as the preprocessing and downstream interpretation around it, and the scverse-adjacent ecosystem is where most of that practical tooling lives. Open question: how packages at this layer stabilise as the field''s data formats shift toward spatial-multimodal and the dominant analysis target moves from atlas construction toward perturbation modelling.'
- id: spatialdata
  kind: tool
  name: SpatialData — unified spatial-omics data framework
  authors: Marconato, Palla et al. (Theis + Stegle)
  topics:
  - spatial
  - single-cell
  status: launched
  org_type: academic
  region: EU
  why: Standard for spatial transcriptomics data representation.
  description: 'An EU-led standard for representing spatial transcriptomics data inside the scverse ecosystem, providing a common container for the heterogeneous outputs of Visium, Xenium, MERFISH, CODEX and related platforms. SpatialData matters because spatial omics has the same fragmentation problem AnnData solved for dissociated single-cell data a decade ago: each vendor ships its own file layout, coordinate convention, and image format, which makes cross-dataset pretraining and downstream integration genuinely painful. A common representation is a precondition for the spatial foundation models like OmniCell-Spatial, SpatialFusion and CLM-X that are now appearing, since they all need to ingest data across platforms during pretraining rather than treating each assay as its own silo. Open questions: how SpatialData handles the very large image side-channels of imaging-based platforms without forcing in-memory loads, and how it integrates with the gigapixel WSI tooling that the pathology FMs already rely on.'
- id: txgnn-2024
  kind: paper
  name: TxGNN — knowledge-graph FM for therapeutics
  authors: Zitnik et al.
  venue: Nature Medicine
  year: 2024
  url: https://www.nature.com/articles/s41591-024-03233-x
  topics:
  - drug-design
  - foundation-model
  - perturbation-prediction
  status: published
  org_type: academic
  region: US
  why: Graph FM bridging gene-level and patient-level AI.
  description: 'A 2024 Nature Medicine paper introducing TxGNN, a graph-based foundation model that links gene-level molecular data with patient-level clinical and drug data for drug-repurposing and indication-discovery tasks. The contribution sits in the bridge: most biology FMs operate at one biological scale — protein, cell, or patient — and TxGNN explicitly trains across them, using a graph spanning genes, diseases, drugs and phenotypes. That framing matters for the FM-to-virtual-cells agenda because any plausible virtual-patient stack needs the gene-to-clinical translation layer that pure sc-FMs don''t provide. TxGNN sits alongside knowledge-graph-style approaches like Harmonized Knowledge Graphs and PrimeKG. Open questions: how the graph-FM approach holds up against the LLM-over-clinical-text camp that has moved aggressively into drug repurposing, and how well TxGNN generalises beyond its training-time disease coverage.'
- id: arc-institute
  kind: org
  name: Arc Institute
  authors: Patrick Hsu & Hani Goodarzi
  url: https://arcinstitute.org/
  topics:
  - virtual-cell
  - foundation-model
  - genomic
  status: launched
  org_type: foundation
  region: US
  why: Largest non-DeepMind compute (~2,048× H100); built STATE, Evo2, Tahoe-100M.
  description: 'A US non-profit research organisation that has emerged as the largest non-DeepMind compute platform in biology FMs, with a roughly 2,048-H100 cluster and the model line of STATE, Evo2, and the Tahoe-100M dataset. Arc matters because it is the only credible academic-style player operating at hyperscaler compute scale outside the for-profit AI labs, which lets it train models that university groups cannot match and ship them open-weight in a way the hyperscalers will not. Its presence has restructured the field: genomic FMs (Evo, Evo2), perturbation models (STATE), and large perturbation datasets (Tahoe-100M) now all flow from one institution. Open questions: how Arc balances its compute privilege against the rest of academia, and whether its funding model — long-term private philanthropy — survives the next funding cycle.'
- id: cz-biohub
  kind: org
  name: CZ Biohub
  authors: Theofanis Karaletsos, Steve Quake, Angela Pisco
  url: https://chanzuckerberg.com/science/programs-resources/virtual-cells-initiative/
  topics:
  - virtual-cell
  - foundation-model
  - single-cell
  status: launched
  org_type: foundation
  region: US
  why: Substrate + model shipper (TranscriptFormer, rBio); breaks substrate-only stereotype.
  description: 'The Chan Zuckerberg Biohub Network, the wet-lab and computational arm of CZI''s virtual-cells investment, anchored by the CELLxGENE data substrate but also shipping in-house models like TranscriptFormer and rBio. Biohub matters because it breaks the easy stereotype that CZI is only a substrate funder: by training and releasing its own sc-FMs, it competes directly with Arc, Mahmood, and the various academic FM groups it also funds. That dual role — substrate provider and model shipper — gives Biohub leverage over how the field''s benchmarks are structured, since the same organisation runs the Virtual Cell Challenge and the underlying data. Open questions: how the substrate-versus-model balance evolves as the model-shipping arm matures, and whether Biohub''s open-data commitments survive the increasing commercial pressure on cell-atlas-grade datasets.'
- id: mahmood-lab
  kind: org
  name: Mahmood Lab (Harvard / BWH / MGB)
  authors: Faisal Mahmood
  url: https://faisal.ai/
  topics:
  - pathology
  - multimodal
  - foundation-model
  status: launched
  org_type: academic
  region: US
  why: 'Full pathology vertical stack: UNI → TITAN → CONCH → PathChat; PathChat-DX FDA Breakthrough.'
  description: 'The Mahmood lab at Brigham and Women''s / Harvard Medical School, the dominant academic pathology-FM group with a full vertical stack — UNI for image embedding, TITAN for slide-level representation, CONCH for image-text alignment, PathChat for instruction-following — capped by PathChat-DX, which carries an FDA Breakthrough Device designation. The lab''s position is unusual in academic biology FMs because it owns the entire encoder-to-deployment pipeline rather than handing off at the checkpoint, which lets it iterate the stack in a way most academic groups can''t. Its closest analogues are industrial (Paige, Owkin), not academic. Open questions: how the lab navigates the tension between Harvard-affiliated academic publication norms and the proprietary requirements of an FDA-track diagnostic product, and how PathChat-DX deployment shapes the next generation of the stack.'
- id: theodoris-lab
  kind: org
  name: Theodoris Lab (Gladstone / UCSF)
  authors: Christina Theodoris
  url: https://www.theodorislab.gladstone.org/
  topics:
  - single-cell
  - foundation-model
  status: launched
  org_type: academic
  region: US
  why: Only sc-FM lab with full compute disclosure (NVIDIA BioNeMo).
  description: 'The Theodoris lab at Gladstone Institutes / UCSF, the group behind Geneformer and one of the few sc-FM efforts with full compute disclosure — partly because the training was done on NVIDIA''s BioNeMo infrastructure with a clear paper trail. The transparency matters in a field that has otherwise been opaque about training cost: it makes Geneformer the reference data point against which other sc-FMs'' compute claims can be sanity-checked. The lab also occupies an unusual ecosystem position as the most explicit NVIDIA partner among major academic sc-FM groups. Open questions: how the lab responds to the 2025 reckoning that put Geneformer''s perturbation-prediction performance under serious pressure from simpler baselines, and whether the next generation of Geneformer absorbs the compositional and agentic moves the field is making in 2026.'
- id: bo-wang-lab
  kind: org
  name: Bo Wang Lab (U. Toronto / Vector / UHN)
  authors: Bo Wang
  url: https://wanglab.ai/
  topics:
  - single-cell
  - foundation-model
  - perturbation-prediction
  status: launched
  org_type: academic
  region: US
  why: Defined the sc-FM category (scGPT); agentic-AI pivot 2026 (X-Cell).
  description: 'The Bo Wang lab at the Vector Institute / University of Toronto, which defined the sc-FM category with scGPT in 2023 and has been the central reference point for transformer-style cell models ever since. The lab''s 2026 pivot to agentic AI with X-Cell is the more interesting current move: rather than scaling scGPT further, it bets that the next gain comes from wrapping models in tool-using agents that orchestrate analysis end-to-end. That tracks the broader shift in biology FMs away from monolithic checkpoints toward compositional and agentic stacks, and it puts Wang''s group in the same conceptual territory as the agentic-pathology and agentic-clinical work emerging elsewhere. Open questions: whether X-Cell-style agents actually deliver on tasks where scGPT-style FMs underperformed in the 2025 reckoning, and how the lab balances method publication with platform building.'
- id: leskovec-quake
  kind: org
  name: Leskovec + Quake (Stanford / SNAP)
  authors: Jure Leskovec & Steve Quake
  url: https://snap.stanford.edu/
  topics:
  - single-cell
  - foundation-model
  status: launched
  org_type: academic
  region: US
  why: Cross-species sc-FM (UCE) — 8 species via ESM2 bridge.
  description: 'A joint reference to Jure Leskovec (SNAP, Stanford CS) and Stephen Quake (Stanford bioengineering / CZ Biohub) as the groups behind UCE, the Universal Cell Embedding model that covers eight species by routing through ESM-2 protein embeddings as a cross-species bridge. The pairing is characteristic of how Stanford has structured its sc-FM work — graph/ML methodology from Leskovec, single-cell biology and compute from Quake — and UCE is the most concrete output. The cross-species framing matters because it directly attacks the human-only assumption baked into scGPT and Geneformer, which limits their use in model-organism and comparative biology settings. Open questions: how UCE-style ESM-bridged species transfer holds up on perturbation rather than annotation tasks, and whether the architecture extends gracefully to the non-vertebrate species the original release skipped.'
- id: deepmind-isomorphic
  kind: org
  name: Google DeepMind
  url: https://deepmind.google/
  topics:
  - genomic
  - protein
  - foundation-model
  status: launched
  org_type: industry
  region: UK
  why: TPU-scale; closed weights + hosted API; Isomorphic Labs is the commercial arm.
  description: 'Google DeepMind plus its commercial drug-discovery spinout Isomorphic Labs, the most compute-rich and most closed of the biology-FM organisations. The pairing matters because DeepMind ships the underlying models (AlphaFold, AlphaMissense, AlphaProteo, AlphaGenome) and Isomorphic monetises them via drug-discovery partnerships, with weights and training detail almost always held back. That closed posture is the structural alternative to the Arc Institute / EvolutionaryScale open-weight model and is one of the central tensions in the field''s governance debate. The TPU compute base is qualitatively different from the H100 fleets that everyone else runs on. Open questions: whether DeepMind''s hosted-API strategy holds up as competitors close the capability gap with open weights, and how Isomorphic''s clinical-stage assets perform when their model claims face actual trial readouts.'
- id: evolutionaryscale
  kind: org
  name: EvolutionaryScale (ex-Meta FAIR)
  authors: Alex Rives, Tom Sercu, Thomas Hayes
  url: https://www.evolutionaryscale.ai/
  topics:
  - protein
  - foundation-model
  status: launched
  org_type: biotech
  region: US
  why: ESM-3 with the cleanest compute disclosure (10²⁴ FLOPs) in biology FMs.
  description: 'EvolutionaryScale, the US biotech spun out of Meta''s protein-language-model team, which ships the ESM-3 family of protein foundation models. The organisation matters in the FM-to-virtual-cells landscape for two reasons: ESM-3 is the most credible non-AlphaFold protein FM on the market and has been released with one of the cleanest compute disclosures in biology AI, in the 10²⁴ FLOPs range. That transparency is rare — DeepMind, Recursion, and most pathology vendors do not disclose training cost — and it makes ESM-3 the calibration point against which other protein-FM compute claims can be sanity-checked. The company also occupies the open-weight side of the field''s open-versus-closed split. Open questions: how the commercial model holds up given the open-weight release, and whether ESM-style protein representations remain competitive against AlphaFold-derived embeddings on the tasks users actually care about.'
- id: paige-ai
  kind: org
  name: Paige.AI + MSK
  authors: Thomas Fuchs
  url: https://paige.ai/
  topics:
  - pathology
  - foundation-model
  - clinical
  status: launched
  org_type: biotech
  region: US
  why: First FDA 510(k)-cleared general-purpose pathology AI (Jan 2025); Virchow line.
  description: 'Paige.AI, the New York-headquartered pathology AI company that received the first FDA 510(k) clearance for a general-purpose pathology foundation model in January 2025, with the Virchow model family as its technical backbone. Paige matters in the landscape because it crossed the regulatory boundary before the academic FM groups did — even Mahmood''s PathChat-DX is still at Breakthrough Device status — and it is currently the closest the field has to a deployment template for FM-based diagnostic tools. The Virchow line itself has been a serious benchmark contender against the academic UNI/CONCH models. Open questions: how the 510(k) precedent shapes regulatory treatment of subsequent pathology FMs (does each new model need its own clearance?), and whether Paige''s closed-weight posture becomes a competitive disadvantage as open alternatives like Phikon mature.'
- id: owkin
  kind: org
  name: Owkin (Paris / NYC)
  url: https://owkin.com/
  topics:
  - pathology
  - clinical
  - foundation-model
  status: launched
  org_type: biotech
  region: EU
  why: Only major industrial pathology player shipping open weights (Phikon, Apache-2.0).
  description: 'Owkin, a French/US biotech and the only major industrial pathology player consistently shipping open weights, anchored by the Phikon model family released under Apache-2.0. Owkin''s position is structurally unusual: pathology FMs from Paige, Mahmood, and the various Chinese groups are either commercial products or academic with restrictive licenses, and Owkin''s open-weight commitment makes Phikon a default baseline for researchers without access to gated models. The company''s wider business — federated learning across hospital networks and clinical biomarker discovery — gives it a different data moat than the slide-corpus-scale story that other pathology FMs lean on. Open questions: how the open-weight strategy interacts with the federated-data business model, and whether Phikon''s iteration cadence keeps pace with the closed-weight competitors that don''t need to coordinate releases publicly.'
- id: nvidia-bionemo
  kind: tool
  name: NVIDIA BioNeMo Framework
  url: https://github.com/NVIDIA/bionemo-framework
  topics:
  - foundation-model
  - scaling-laws
  status: launched
  org_type: industry
  region: US
  why: Sets compute-disclosure norm; co-marketed with Geneformer V2.
  description: 'NVIDIA''s BioNeMo framework, the company''s bid to become the default platform layer for biology foundation models — a stack covering pretraining, fine-tuning, and inference for protein, molecule, and cell models on NVIDIA hardware. BioNeMo matters in the landscape less as a model than as a norm-setter: it has been co-marketed with Geneformer V2 from the Theodoris lab and has set the de facto standard for compute disclosure in academic-industry sc-FM partnerships, simply because NVIDIA''s marketing material publishes the GPU-hour numbers that publications often elide. That makes BioNeMo a useful transparency anchor in a field where most groups do not disclose training cost. Open questions: how BioNeMo''s framework-level abstractions hold up against the PyTorch-plus-scverse stack the open community defaults to, and whether the NVIDIA platform play translates into actual lock-in.'
- id: ahlmann-huber-lab
  kind: org
  name: Ahlmann-Eltze / Huber (EMBL Heidelberg)
  url: https://const-ae.name/
  topics:
  - eval
  - single-cell
  status: launched
  org_type: academic
  region: EU
  why: Authored the 2025 reckoning paper; Ahlmann-Eltze now at Isomorphic Labs.
  description: 'The joint Ahlmann-Eltze and Huber group at EMBL Heidelberg, authors of the 2025 evaluation paper that became the central reckoning for single-cell foundation models — showing that simple linear baselines matched or beat scGPT and Geneformer on perturbation-prediction tasks. The paper is the most consequential evaluation work in the field''s recent history and rewired both the benchmark conversation and the case for scaling cell FMs. Ahlmann-Eltze has since moved to Isomorphic Labs, which is itself a load-bearing signal: the field''s sharpest sc-FM critic is now inside DeepMind''s commercial drug-discovery arm. Open questions: how the 2025 results hold up against the next generation of sc-FMs explicitly designed to address them, and how the lab''s continuing benchmark work shapes the CZI Virtual Cell Challenge evaluation criteria in the rounds after launch.'
- id: theis-lab-helmholtz
  kind: org
  name: Theis Lab (Helmholtz Munich)
  authors: Fabian Theis
  url: https://www.helmholtz-munich.de/en/icb/pi/fabian-theis
  topics:
  - single-cell
  - foundation-model
  - spatial
  status: launched
  org_type: academic
  region: EU
  why: Methodological reference class; author of 2026 compositional-FM perspective.
  description: 'The Fabian Theis lab at Helmholtz Munich, the methodological reference class for single-cell and spatial computational biology — author of scVI, scArches, scPoli, the human cell atlas integration tooling, and a long string of methods that scverse rests on. The lab''s 2026 perspective paper on compositional foundation models is the current intellectual anchor for the post-monolithic-FM turn the field is taking, arguing that the right unit is not a single giant cell model but a composable stack of specialised modules. That framing matters because it gives the 2025 reckoning a constructive exit: rather than abandon FMs, restructure them. Open questions: how the compositional vision interacts with agentic frameworks like Bo Wang''s X-Cell, and whether the Theis lab''s own next-generation models implement the compositional thesis or whether it lands as a perspective piece without a flagship implementation.'
- id: biomap-mbzuai
  kind: org
  name: BioMap Research + MBZUAI
  authors: Le Song & Eric Xing
  topics:
  - virtual-cell
  - foundation-model
  - agents
  status: launched
  org_type: industry
  region: CN
  why: China/Middle-East virtual-cell competitor (VCHarness, xTrimo).
  description: 'BioMap together with MBZUAI, the joint China / Middle East axis competing in the virtual-cells and biology-FM space with the VCHarness benchmark harness and the xTrimo protein/cell model series. The pairing matters because it represents the first credible non-Western coalition organised around the same agenda as Arc Institute and the CZI Virtual Cells Initiative — training large biology FMs and shipping benchmarking infrastructure to support them. VCHarness in particular slots into the same evaluation-layer role that the CZI Virtual Cell Challenge plays, with different governance and a different scoreboard. Open questions: how interoperable the BioMap models are with the Western FM stack (CELLxGENE, scverse, BioNeMo), how the agentic agenda flagged in the topic tags actually surfaces in the model line, and whether the consortium''s compute base scales to compete with Arc''s H100 fleet over the next cycle.'
- id: isomorphic-labs
  kind: org
  name: Isomorphic Labs
  topics:
  - drug-design
  - protein
  - foundation-model
  status: launched
  org_type: industry
  region: UK
  why: DeepMind's commercial drug-discovery arm; bought Ahlmann-Eltze.
  description: 'Isomorphic Labs, the UK-based commercial drug-discovery spinout from DeepMind, which inherits the AlphaFold / AlphaProteo / AlphaMissense model stack and partners with pharma on lead-discovery programmes. Its position in the FM-to-virtual-cells landscape has sharpened with the recent hire of Constantin Ahlmann-Eltze — author of the 2025 sc-FM reckoning paper — which signals that Isomorphic intends to build internal evaluation capacity at the level of the field''s sharpest critic. The closed-weight, hosted-API posture inherited from DeepMind is the structural opposite of the Arc Institute / EvolutionaryScale open model. Open questions: how the partnership pipeline performs as the early AlphaFold-enabled drug candidates reach clinical readouts, and whether the company expands beyond protein-structure-driven targets into the cell-state and perturbation-prediction territory that the rest of the FM landscape is moving toward.'
- id: recursion
  kind: org
  name: Recursion Pharmaceuticals
  url: https://www.recursion.com
  topics:
  - imaging
  - drug-design
  - foundation-model
  status: launched
  org_type: biotech
  region: US
  why: AI-native biotech using FMs for drug discovery.
  description: 'Recursion Pharmaceuticals, a US AI-native biotech using foundation models on its in-house phenomics platform — large-scale cell-painting imaging across compound and genetic perturbations — to drive drug discovery. Recursion''s data moat is the imaging side rather than the model side: it operates one of the largest perturbation-imaging datasets in industry, and its FMs are trained against that proprietary substrate. That makes the company an instructive case for the image-modality slice of the virtual-cell agenda, complementary to the transcriptomics-heavy work coming out of CZI and Arc. The 2023 NVIDIA partnership and the BioHive-2 cluster put Recursion among the better-compute-resourced industrial players. Open questions: how Recursion''s image-derived embeddings transfer to the transcriptomic perturbation tasks that dominate the public benchmarks, and how the company''s model output translates into clinical pipeline progression.'
- id: insitro
  kind: org
  name: Insitro
  authors: Daphne Koller
  url: https://insitro.com
  topics:
  - drug-design
  - virtual-cell
  status: launched
  org_type: biotech
  region: US
  why: Applied virtual-cell case study in drug discovery.
  description: 'Insitro, a US biotech founded by Daphne Koller applying ML to drug discovery, and one of the more concrete industrial case studies for the virtual-cell thesis: it generates large in-house perturbation and disease-model datasets and uses learned cell-state models to drive target selection. The company has been deliberately quiet about model-architecture detail, which makes it less visible than the academic sc-FM groups but more load-bearing as a market signal — its existence and continued funding say something about whether pharma actually buys the virtual-cell agenda. Insitro sits alongside Recursion on the industrial side of the field, with a different data emphasis (disease-relevant in vitro systems versus phenomic imaging at scale). Open questions: which targets in its disclosed pipeline trace back specifically to model-driven selection, and how its internal sc-FM-or-equivalent compares against the open academic stack.'
- id: latent-labs
  kind: org
  name: Latent Labs
  authors: Simon Kohl + DeepMind alumni
  url: https://latentlabs.com
  topics:
  - virtual-cell
  - foundation-model
  status: launched
  org_type: biotech
  region: UK
  why: DeepMind-alumni virtual-cell startup.
  description: 'Latent Labs, a UK biotech founded by DeepMind alumni building virtual-cell foundation models for biology applications. Its main interest in the landscape is provenance: it is one of the first identifiable spinouts taking the DeepMind protein-FM playbook and applying it to cell-scale rather than protein-scale problems. That puts Latent Labs in the same competitive neighbourhood as Arc Institute (non-profit), Isomorphic (DeepMind''s other spinout, drug-focused), and the various academic sc-FM groups, but with a startup commercialisation vector that none of those have. The company is still early and the public detail on its model line is thin. Open questions: which dataset substrate Latent Labs builds on (CELLxGENE, proprietary, or partnered), how it positions against Arc''s open-weight STATE family, and whether its team lineage actually transfers — protein-FM and cell-FM are structurally different problems, despite the shared vocabulary.'
- id: vevo-arc-startup
  kind: org
  name: Vevo / Arc
  topics:
  - virtual-cell
  - perturb-seq
  status: launched
  org_type: biotech
  region: US
  why: Tahoe-100M producer — virtual-cell modelling platform.
  description: 'US biotech building a virtual-cell modelling platform, best known publicly as the producer of the Tahoe-100M perturbational single-cell dataset. The bet is that scaling perturb-seq into the tens of millions of cell-by-compound observations gives you enough signal to train models that actually predict response rather than just embed transcriptomes. That matters because the 2025 sc-FM reckoning landed largely on the data side: existing atlases were observational, so even well-engineered models could not beat linear baselines on perturbation tasks. A platform built around in-house perturbation data is a direct response to that critique. Open questions: whether Tahoe-100M generalises beyond the cancer lines it was generated in, whether the modelling layer ships externally or remains internal IP, and how the company positions against Arc STATE and CZI virtual-cells program now competing for the same evaluation oxygen.'
- id: cellarity
  kind: org
  name: Cellarity
  topics:
  - drug-design
  - single-cell
  status: launched
  org_type: biotech
  region: US
  why: Cell-state engineering company.
  description: US biotech operating on the premise that drug discovery should target cell states rather than single proteins, using single-cell transcriptomics as the substrate for both target definition and compound screening. Founded out of Flagship Pioneering, it predates the current foundation-model wave but sits squarely in the same conceptual lane as the virtual-cell programs now organised by CZI and Arc. The pitch is that high-dimensional cell-state readouts let you find leads for indications that lack clean molecular targets, especially in metabolic and inflammatory disease. What is open is whether a cell-state-first pipeline delivers clinical assets at a tempo competitive with target-based discovery, and how the company integrates or competes with the public sc-FM stack now maturing around it. Worth tracking as a reference point for cell-state pharmacology distinct from the academic FM narrative.
- id: benchsci
  kind: tool
  name: BenchSci
  topics:
  - agents
  status: launched
  org_type: biotech
  region: US
  why: Life-science research platform — biology-paper search agent.
  description: 'Life-sciences search and reasoning platform that surfaces biological evidence from the published literature and preprints, increasingly framed as an agentic research assistant rather than a static search index. The relevance to the FM-to-virtual-cells map is twofold: it is one of the few production agents that scientists in pharma actually use day-to-day, and it sits in the workflow layer where LLM-driven retrieval has to confront messy biomedical entity resolution, antibody validation, and protocol-grade context. That layer is the same one Owkin, FutureHouse, and the new Claude-skills crop are converging on. Open question is whether the value moves toward the underlying FMs and embeddings or stays with the curation pipeline and pharma-grade integrations that BenchSci has spent years building. Useful as a baseline for what a deployed bio-research agent looks like today.'
- id: pathai
  kind: org
  name: PathAI
  url: https://www.pathai.com/news
  topics:
  - pathology
  - clinical
  status: launched
  org_type: biotech
  region: US
  why: Clinical-AI vendor for pathology.
  description: 'US clinical-AI vendor focused on computational pathology, one of the older players in the space and a useful reference point for what AI pathology looked like before the foundation-model wave reframed the field around general-purpose visual encoders like UNI, Virchow, and TITAN. The company built around algorithm-as-medical-device deployments and pharma partnerships for biomarker discovery on whole-slide images. Its current positioning sits between two pressures: traditional task-specific models, which it has shipped at scale, and the new pathology-FM stack from Mahmood group, Modella, and others now being acquired into pharma. Open question is whether established clinical-AI vendors retool around third-party FMs or develop their own, and how the FDA Breakthrough pathway shifts to accommodate generative tools like PathChat-Dx. Useful as the incumbent comparator for any pathology-FM claim.'
- id: tempus-ai
  kind: org
  name: Tempus AI
  topics:
  - multimodal
  - clinical
  status: launched
  org_type: biotech
  region: US
  why: Multimodal clinical AI; IPO June 2024.
  description: US clinical-AI company built on multimodal patient data (genomic, imaging, clinical notes, outcomes), notable for its June 2024 IPO, which made it one of the first large-scale clinical-AI listings and provided the public-market reference point for valuing this category. The relevance to the FM landscape is that Tempus owns one of the largest paired multimodal clinical-genomic corpora outside of national biobanks, which is exactly the substrate that healthcare-FM efforts now need. The strategic question is whether Tempus becomes a data layer that third-party FM developers build on, an FM developer itself, or primarily a services and diagnostics business. The IPO also set a public-comparable price for what a multimodal clinical-AI franchise is worth, which matters for how subsequent pharma-AI deals like Lilly-Nvidia and AstraZeneca-Modella get framed.
- id: aignostics
  kind: org
  name: Aignostics
  topics:
  - pathology
  - clinical
  status: launched
  org_type: biotech
  region: EU
  why: AI pathology vendor.
  description: 'EU-based AI pathology vendor spun out of Charite Berlin, building digital-pathology models for clinical and pharma use. Sits in the same competitive frame as PathAI, Proscia, and now Modella, but on the European regulatory and reimbursement side, which has its own pace and procurement dynamics. Relevant to this map as part of the broader pathology-FM consolidation story: the pathology vertical is the first place where a foundation-model approach has met a clear clinical pathway, with FDA Breakthrough for PathChat-Dx and the AstraZeneca-Modella acquisition, and European vendors are choosing whether to compete with their own FMs or integrate the academic stack from Mahmood, Owkin, and others. Open question is how Aignostics positions against the rising US pathology-FM consolidation and whether EU clinical workflows pull from a different model stack than US ones.'
- id: proscia
  kind: org
  name: Proscia
  topics:
  - pathology
  - clinical
  status: launched
  org_type: biotech
  region: US
  why: Digital pathology platform.
