  why: Open protein LM; UCE's cross-species bridge; still the academic workhorse.
  papermap_category: other_fm
  description: Meta FAIR's open protein language model, published in 2023 and still the academic workhorse of the protein-FM era. ESM-2 produces residue-level embeddings that have been wired into structure prediction, function annotation, mutation-effect scoring, and as the cross-species bridge inside single-cell models like UCE that need a way to align gene vocabularies across organisms. Its enduring value is permissive licensing and a model-size ladder from a few million parameters up to 15B, which lets groups pick the trade-off they can afford and reproduce results without paying for compute they cannot recover. It also functions as the de facto benchmark embedding against which any new protein representation is measured. ESM-3 has taken the SOTA crown for multimodal and generative tasks, but ESM-2 remains the default choice when the requirement is a frozen embedding backbone with predictable behaviour and open weights.
  qa:
    did: 'ESM-2 is Meta FAIR''s open protein language model, published in 2023 and still the academic workhorse of the protein-FM era. It produces residue-level embeddings wired into structure prediction, function annotation, mutation-effect scoring, and as the cross-species bridge inside single-cell models like UCE that align gene vocabularies across organisms.'
    purpose: 'The purpose was to release a permissively-licensed protein encoder at a range of scales so that downstream groups could build on a reproducible backbone without paying for compute they cannot recover. ESM-2 also functions as the de facto benchmark embedding against which any new protein representation is measured.'
    method: 'The model is a transformer encoder trained with a masked-language-model objective on a large protein-sequence corpus. The release ships a size ladder from a few million parameters up to 15B, letting groups pick the trade-off they can afford while keeping architectural and tokenisation choices consistent across the ladder.'
    result: 'ESM-2 produces residue-level embeddings widely adopted across structure prediction, function annotation, mutation-effect scoring, and cross-species alignment in single-cell models like UCE. ESM-3 has taken the SOTA crown for multimodal and generative tasks, but ESM-2 remains the default when a frozen embedding backbone with open weights is required.'
