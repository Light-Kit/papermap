  source: _Temp/new_paper.md
  description: A 2026 preprint reframing single-cell perturbation prediction as an optimal-transport problem between unperturbed and perturbed cell-state distributions, at atlas scale. The conditional-transport framing predicts where each unperturbed cell would land under a perturbation rather than predicting bulk-level shifts, which is the right object if downstream use cases are heterogeneous-response or rare-subpopulation. Sits in the same lineage as CellOT and the broader Schiebinger-style trajectory-OT literature, but scaled to perturbation atlases that did not exist when those methods were written. The open question is whether endpoint-OT objectives recover the same information as next-state-conditional models when the underlying dynamics are smooth — and whether they degrade more gracefully on the compositional held-outs that have become the de facto stress test for perturbation FMs.
  qa:
    did: 'SCALE is a 2026 preprint reframing single-cell perturbation prediction as a conditional optimal-transport problem between unperturbed and perturbed cell-state distributions at atlas scale, predicting where each unperturbed cell would land under a perturbation rather than bulk-level shifts. It scales endpoint-OT to perturbation atlases unavailable when CellOT was written.'
    purpose: 'The motivating ask is heterogeneous-response and rare-subpopulation use cases — applications where a population-mean shift is the wrong target and per-cell endpoint mapping is required. Endpoint OT gives a principled per-cell prediction without the parametric assumptions of regression baselines or the next-state instability of autoregressive perturbation models.'
    method: 'SCALE trains a conditional optimal-transport map between paired unperturbed and perturbed cell-state distributions, conditioned on perturbation identity, scaled up from the original CellOT formulation to atlas-sized perturb-seq corpora. The map gives a per-cell endpoint prediction rather than a population shift, with conditional structure shared across perturbations.'
    result: 'Reported gains over baseline perturbation regressors on atlas-scale held-outs in the preprint. Open question — whether endpoint-OT recovers the same information as next-state-conditional models when underlying dynamics are smooth, and whether it degrades more gracefully on compositional held-outs that have become the perturbation-FM stress test.'
