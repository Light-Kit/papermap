- id: cradle-vae
  kind: tool
  modality: single-cell-rna
  name: CRADLE-VAE — compositional active learning
  authors: Bunne et al.
  topics:
  - perturbation-prediction
  - generative
  - virtual-cell
  status: preprint
  org_type: academic
  region: US
  why: Closed-loop virtual-cell active learning prototype.
  description: 'A preprint prototype of a closed-loop active-learning system for virtual-cell perturbation prediction, combining a variational autoencoder for perturbation-response generation with an acquisition strategy that selects next experiments. The framing is the interesting part: most VC work to date has been offline prediction on fixed datasets, while Cradle-VAE explicitly closes the loop between model and wet-lab experiment selection. That''s the architecture the CZI Virtual Cells Initiative and Arc Institute have flagged as the actual long-term goal — models that decide what to measure next, not just models that retrodict held-out Perturb-seq splits. The open questions are practical: how the selection policy holds up against the strong baseline of random or diversity-based sampling, what the wet-lab partner profile looks like, and whether the VAE generative head is competitive with more recent diffusion-based perturbation models.'
  qa:
    did: 'Cradle-VAE from the Bunne group is a closed-loop active-learning prototype for virtual-cell perturbation prediction, combining a variational autoencoder for perturbation-response generation with an acquisition strategy that selects the next experiments to run. Most VC work is offline prediction on fixed datasets — Cradle-VAE explicitly closes the loop with wet-lab selection.'
    purpose: 'The framing matches the long-term goal that CZI''s Virtual Cells Initiative and Arc Institute flag as the actual prize — models that decide what to measure next, not just models that retrodict held-out Perturb-seq splits. Cradle-VAE prototypes that architecture and tests whether learned acquisition outperforms random or diversity-based sampling baselines.'
    method: 'A variational autoencoder learns a generative model of perturbation responses across cell states, and an acquisition policy on top of that latent space scores candidate experiments by expected information gain. The selected experiments are then run wet-lab and fed back into training, closing the model-to-experiment loop iteratively.'
    result: 'The preprint demonstrates the closed-loop pipeline end-to-end as a prototype for active virtual-cell experimentation. Open questions are practical — how the selection policy holds up against strong random or diversity-sampling baselines, what the wet-lab partner profile looks like at scale, and whether the VAE generative head competes with more recent diffusion-based perturbation models.'
- id: scpoli
