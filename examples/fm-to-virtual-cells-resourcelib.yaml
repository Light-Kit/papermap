  region: US
  why: Whole-slide pathology FM trained on real-world clinical slides.
  description: Whole-slide pathology foundation model from a US industry group, trained on real-world clinical slides rather than the curated public datasets that anchor many academic pathology FMs. Real-world training data is a meaningful design choice because it forces the model to handle scanner heterogeneity, staining drift, and the messy artefacts that show up in routine practice but get filtered out of benchmark corpora. The architecture extends standard tile encoders to whole-slide reasoning, which is where the clinically relevant signal often lives. Open questions are how much of the performance advantage comes from the clinical data versus the slide-level architecture, what the access and licensing terms look like for academic comparison, and how it performs head-to-head with the Mahmood TITAN stack on slide-level tasks.
- id: phikon
  kind: tool
  name: Phikon / Phikon-v2
  venue: Owkin
  topics:
  - pathology
  - foundation-model
  status: launched
  org_type: biotech
  region: EU
  why: Owkin's pathology FMs; notable as Apache-2.0 exceptions in a license-restrictive family.
  description: Owkin's family of pathology foundation models, notable in the pathology-FM landscape as a permissively-licensed exception in a category where most weights ship under restrictive research-only terms. The Apache-2.0 release matters because it lets downstream developers, including biotech and tooling startups, integrate the encoder into commercial pipelines without negotiating bespoke licenses, which is a real practical bottleneck for the rest of the pathology-FM field. Owkin maintains the model as part of a broader biomarker-discovery stack, so the encoder has been pressure-tested on the kind of translational use cases the field is supposed to enable. The open question is whether the open-license advantage holds as the next generation of pathology FMs are released and whether Phikon's accuracy stays competitive with the gated state of the art.
- id: h-optimus-0
  kind: tool
  name: H-optimus-0
  venue: Bioptimus
  topics:
  - pathology
  - foundation-model
  status: launched
  org_type: biotech
  region: EU
  why: Open-weights pathology tile encoder; permissive-license exception.
  description: 'Open-weights pathology tile encoder from a European biotech, distributed under a permissive license and therefore one of the few production-grade pathology FMs that downstream commercial users can adopt without bespoke licensing. It sits in a small club with Phikon and Hibou as the licensing exceptions in a field where most of the high-scoring tile encoders are gated or research-only. For groups building pathology tooling that needs to ship to customers, this matters more than benchmark deltas of a few points. The open question is the same as for the other open-licensed pathology FMs: whether release cadence keeps up with the closed competitors, whether subsequent versions stay open, and how it compares head-to-head with Virchow2 and UNI2-h on clinically relevant slide-level tasks rather than tile-level leaderboards.'
- id: hibou
  kind: tool
  name: Hibou
  topics:
  - pathology
  - foundation-model
  status: launched
  org_type: biotech
  region: US
  why: Open pathology FM (Apache-2.0).
  description: Open pathology foundation model released under Apache-2.0 from a US biotech, joining Phikon and H-Optimus-0 as one of the few permissively-licensed entries in the otherwise gated pathology-FM landscape. The licensing choice is the most important fact about it for users building downstream tools, because most production pathology applications cannot adopt research-only weights without legal review. As a tile encoder it competes with the Mahmood and Paige stacks on standard pathology benchmarks, with the practical trade-off that open-license models often lag the gated SOTA by a generation. The open question is whether the open-license cluster continues to grow or whether the next jump in pathology-FM performance happens entirely behind access gates, in which case Hibou's role becomes more about ecosystem support than absolute accuracy.
- id: conch
  kind: tool
  name: CONCH
  venue: Mahmood Lab
  topics:
  - pathology
  - multimodal
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: Contrastive vision-language pathology FM.
  description: Contrastive vision-language pathology foundation model from a US academic group, trained to align histology image patches with corresponding text descriptions in the style of CLIP applied to the medical domain. The vision-language framing is what distinguishes it from the tile-only encoders in the Mahmood stack, because it produces embeddings that can be queried with natural-language prompts and supports zero-shot classification without per-task fine-tuning. That makes CONCH a natural backbone for downstream vision-language pathology assistants and search interfaces over slide archives, and it has been used as the perception side of several pathology-LLM systems. It also helped establish that contrastive pretraining on biomedical figure-caption pairs transfers usefully to histology specifically. The open questions are how much of the zero-shot capability actually transfers to clinically meaningful tasks, how brittle the text-side performance is to prompt phrasing, and how CONCH compares to the newer multimodal pathology models that have followed in the same line.
- id: titan
  kind: tool
  name: TITAN
  venue: Mahmood Lab
  topics:
  - pathology
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: Slide-level model on top of the UNI2-h tile encoder.
  description: 'Slide-level pathology model from the Mahmood lab built on top of the UNI2-h tile encoder, completing the two-stage pipeline that most modern pathology FMs are converging on: a strong tile encoder plus a model that aggregates tile embeddings into slide-level predictions. TITAN''s role in the stack is to push the field beyond patch classification toward whole-slide reasoning that is closer to how pathologists actually work. Because it depends on UNI2-h, its access and licensing inherit the same constraints as the underlying encoder. Open questions are how well TITAN generalises to slide types and stains under-represented in its training corpus, how it compares on slide-level tasks to Prov-GigaPath''s whole-slide approach, and how downstream clinical evaluations of the combined UNI2-h plus TITAN pipeline play out.'
- id: pathchat
  kind: tool
  name: PathChat / PathChat-2 / PathChat-DX
  venue: Nature
  year: 2024
  topics:
  - pathology
  - agents
  - multimodal
  status: published
  org_type: academic
  region: US
  why: Mahmood vision-language pathology assistant; DX got FDA Breakthrough.
  papermap_category: other_fm
  description: 'Mahmood-lab vision-language pathology assistant published in 2024, combining the lab''s pathology image encoders with a language model to support natural-language interaction over slides. It is the research-grade predecessor of PathChat DX, the diagnostic variant that received FDA Breakthrough Device Designation in January 2025. As a research artefact it is one of the cleanest demonstrations of the assistant pattern in pathology: a clinician asks questions in natural language, the model retrieves and reasons over the relevant slide regions. It also functions as an existence proof that vision-language pathology models can move from publication to regulatory engagement. Open questions are how robust the natural-language interface is on long-tail diagnostic queries and how the research-grade PathChat differs in capability from the regulated DX variant.'
- id: biomedclip
  kind: tool
  name: BioMedCLIP
  topics:
  - multimodal
  - imaging
  - foundation-model
  status: published
  org_type: industry
  region: US
  why: Biomedical image–text contrastive model on large-scale figure–caption pairs.
  description: 'Microsoft''s biomedical image-text contrastive model, trained on a large corpus of figure-caption pairs scraped from biomedical literature. Adapting CLIP-style pretraining to the biomedical domain produces embeddings that perform well on zero-shot classification of medical images and that are widely used as a backbone for downstream multimodal medical tasks. Its main value is breadth: because the training data is literature-derived, the model has seen a much wider variety of imaging modalities than any single clinically-curated dataset would contain. The trade-off is that figure-caption noise is significant and the model''s performance on any specific clinical task is rarely SOTA. It is best understood as a general-purpose embedding model for the biomedical-imaging long tail rather than as a clinical decision tool, and it sits upstream of much of the Med-Gemini line.'
- id: med-gemini
  kind: tool
  name: Med-Gemini
  venue: Google
  topics:
  - multimodal
  - clinical
  - foundation-model
  status: published
  org_type: industry
  region: US
  why: Google's medical multimodal model family for clinical reasoning and image Q&A.
  description: Google's family of medical multimodal models adapted from the Gemini base, targeting clinical reasoning, radiology and pathology image interpretation, and medical Q&A in a single stack. The family-of-models framing matters because it lets Google ship variants tuned for different clinical contexts without retraining from scratch, and it puts Med-Gemini in direct competition with Microsoft's medical-multimodal line and with the open Med-PaLM-derived ecosystem. The technical interest is in how the Gemini-base multimodal capacity transfers to medical images that are very different from web imagery. Open questions are the access story for clinical and research use, how the models perform under prospective evaluation versus retrospective benchmarks, and what happens when they are stressed on the kinds of edge cases that drive real clinical risk.
- id: gen-virtual-cells-lewis-zueco-2026
  kind: paper
  name: Generative Virtual Cells
  authors: Lewis & Zueco
  venue: ICLR Gen²-workshop
  year: 2026
  topics:
  - virtual-cell
  - generative
  - foundation-model
  status: preprint
  org_type: academic
  region: US
  why: Workshop proof (<$250 compute) — joint planner + world model under validation gating.
  description: Workshop preprint from a US academic group demonstrating a generative virtual-cell pipeline trained under roughly $250 of compute, using a joint planner and world model coupled with a validation-gating step. The headline number matters because it pushes back on the assumption that virtual-cell work requires industrial compute budgets; it suggests that a careful architecture choice and a tight feedback loop can substitute for scale, at least at proof-of-concept resolution. The planner-plus-world-model formulation is the methodological interest, because it mirrors how generative agents are being built in other domains. As a workshop paper the results need stress-testing on larger and more clinically relevant settings before the cost claim transfers, and the open question is whether the same approach holds when the validation oracle is real wet-lab data rather than benchmark splits.
- id: flow-matching-morehead-2026
  kind: review
  name: Flow matching in computational biology
  authors: Morehead et al.
  venue: Nature Machine Intelligence
  year: 2026
  topics:
  - flow-matching
  - generative
  - virtual-cell
  status: published
  org_type: academic
  region: US
  why: The generative technique under generative virtual cells.
  description: Published review covering flow matching, the generative-modelling technique that sits underneath the current generation of generative virtual-cell work. Flow matching has become attractive in scientific-ML applications because it gives the sample quality of diffusion models with simpler training dynamics and faster inference, which matters when the generator has to run inside an active-learning loop. The review's value is in collecting the variants, training objectives, and conditioning recipes scattered across the recent literature into a single reference that virtual-cell and biology-AI groups can use as a starting point. As with any technique review in a fast-moving area, the open question is how quickly its taxonomy gets superseded; readers should treat it as a snapshot of where flow matching sat at publication rather than a permanent map.
- id: alphafold2
  kind: paper
  name: AlphaFold 2
  authors: Jumper et al.
  venue: Nature
  year: 2021
  url: https://doi.org/10.1038/s41586-021-03819-2
  topics:
  - protein
  - generative
  status: published
  org_type: industry
  region: UK
  why: Structure-prediction breakthrough the whole protein-modelling wave builds on.
  description: 'The 2021 DeepMind paper that crossed the threshold to near-experimental accuracy on protein-structure prediction, published in Nature. AlphaFold2 is the foundational result that the entire current protein-modelling wave builds on: every subsequent protein FM, every diffusion-based de novo design pipeline, and every structure-conditioned drug-design model implicitly assumes a world in which predicted structures for arbitrary sequences are cheap. It also redefined what counted as a deep-learning result in biology, because the validation came from CASP rather than from internal benchmarks. Open questions in 2026 are no longer about whether the model works but about where the residual errors live, how the multimer and dynamic-conformation successors handle disorder and assembly, and how much of the residual gap to experiment can be closed by data versus by architecture.'
- id: rfdiffusion
  kind: paper
  name: RFdiffusion
  authors: Watson et al.
  venue: Nature
  year: 2023
  url: https://doi.org/10.1038/s41586-023-06415-8
  topics:
  - protein
  - generative
  - diffusion
  - drug-design
  status: published
  org_type: academic
  region: US
  why: Diffusion-based de novo protein design exemplar.
  description: 'Diffusion-based de novo protein design model from the Baker lab, published in Nature in 2023, and the canonical example of taking diffusion machinery from image generation and porting it cleanly into structural biology. The model conditions on a target geometry or binder specification and generates protein backbones that downstream sequence-design tools then fill in. It rapidly became the default tool for de novo binder design and has been the substrate for a long string of wet-lab demonstrations from the Baker group and collaborators. Its impact is partly methodological and partly social: it normalised the idea that academic groups could compete with industrial protein-design pipelines using openly released models. Open questions are about success rates on hard target classes and about how it compares with newer flow-matching and protein-FM-based design approaches.'
- id: progen2
  kind: paper
  name: ProGen2
  authors: Madani et al.
  venue: Nature Biotechnology
  year: 2023
  url: https://doi.org/10.1038/s41587-022-01618-2
  topics:
  - protein
  - generative
  status: published
  org_type: industry
  region: US
  why: Generative protein-sequence modelling pre-ESM-3.
  description: Generative protein-sequence model from Salesforce Research, published in Nature Biotechnology in 2023, representing the pre-ESM-3 state of the art for autoregressive protein generation. ProGen2 trained a family of decoder-only language models on large protein-sequence corpora and showed that the resulting models could generate functional sequences for several enzyme classes, validated experimentally. Within the protein-FM lineage it occupies the slot between the original ESM masked-language-model line and the multimodal generative regime that ESM-3 opened in 2025; it established that pure sequence generation could yield functional proteins without explicit structural conditioning. Open questions in retrospect are about how its generation quality compares to the newer structure-aware and multimodal designers, and about how much of its functional-sequence success generalised beyond the enzyme families demonstrated in the paper.
- id: scdiffusion
  kind: tool
  name: scDiffusion
  topics:
  - single-cell
  - generative
  - diffusion
  status: preprint
  org_type: academic
  region: global
  why: Diffusion model for single-cell expression generation.
  description: Preprint diffusion model for single-cell expression generation, framing single-cell RNA-seq as a target for the same generative machinery that has worked on images, proteins, and molecules. The motivation is to provide a sampler that can produce realistic synthetic single cells conditioned on cell type, perturbation, or other covariates, which has downstream uses in augmentation, missing-data imputation, and counterfactual reasoning. Whether diffusion is the right inductive bias for expression vectors that are sparse, noisy, and discrete is one of the active methodological debates in the area, with flow matching and autoencoder-based alternatives competing for the same niche. As a preprint, the open questions are how well the generated cells preserve biological structure that downstream FMs care about and how the model performs against the autoencoder baselines that the recent reckoning literature uses.
- id: cpa-2023
  kind: tool
  name: CPA — Compositional Perturbation Autoencoder
  authors: Lotfollahi et al.
  venue: Nature Cell Biology
  year: 2023
  topics:
  - perturbation-prediction
  - generative
  status: published
  org_type: academic
  region: EU
  why: Autoencoder baseline the reckoning repeatedly tests FMs against.
  description: 'Compositional Perturbation Autoencoder from a European academic group, published in 2023 as an autoencoder baseline that learns disentangled representations of cell state and perturbation effect. CPA matters because it is the model the 2025-2026 reckoning literature on single-cell foundation models repeatedly tests them against, and on perturbation-prediction tasks the FMs often fail to clearly beat it. That makes CPA''s role somewhere between baseline and uncomfortable mirror: a relatively small, transparent autoencoder that captures enough of the structure of perturbation responses to set a hard floor for the more expensive sc-FMs. Open questions live in two directions: how far CPA-style architectures can be pushed with more data and better conditioning, and where exactly the gap is between CPA and FMs that justifies the much larger compute spend.'
- id: gears
  kind: tool
  name: GEARS
  authors: Roohani et al.
  venue: Nature Biotechnology
  year: 2024
  url: https://www.nature.com/articles/s41587-023-01905-6
  topics:
  - perturbation-prediction
  status: published
  org_type: academic
  region: US
  why: Graph-based perturbation-effect prediction with a gene-gene KG — the pre-FM SOTA.
  description: Graph-based perturbation-effect prediction model from a US academic group, published in Nature Biotechnology in 2024, and the pre-foundation-model state of the art on this task. GEARS conditions predictions on a gene-gene knowledge graph, letting it generalise to unseen perturbations by leveraging structural similarity to perturbations the model has seen. That inductive bias is exactly what single-cell foundation models are trying to learn implicitly from data, which is why GEARS keeps appearing in the reckoning papers as the bar to clear. Its performance on combinatorial perturbations made it the default baseline for compositional generalisation. The open question is how durable the graph-prior approach is as perturbation datasets scale; for now GEARS is a small, well-understood model that the much larger FMs struggle to consistently beat.
- id: perturbfate-2026
  kind: paper
  name: PerturbFate
  authors: Xu et al.
  venue: Nature
  year: 2026
  topics:
  - perturb-seq
  - drug-design
  - lineage
  status: published
  org_type: academic
  region: US
  why: Perturbation screening mapping convergent regulators of melanoma drug resistance.
  description: 'Published perturbation-screening study from a US academic group mapping convergent regulators of melanoma drug resistance. The work uses perturb-seq combined with lineage tracing to identify the regulatory programmes that drug-resistant subpopulations converge on, rather than treating resistance as a property of static cell states. That convergence framing matters because it suggests resistance can be targeted by a smaller set of upstream nodes than the heterogeneity of resistant cells would suggest. Within the larger landscape it is exactly the kind of mechanistic perturbation study that virtual-cell models will eventually have to predict in silico to claim relevance for drug design. Open questions follow from the mechanism: whether the convergent regulators replicate across patient samples, whether targeting them in combination with existing therapies works in vivo, and how the lineage signal generalises to other cancer types.'
- id: sc-fm-perturb-adapter
  kind: paper
  name: sc-FM Perturbation Adapter
  authors: Maleki et al.
  venue: ICLR LMRL workshop
  year: 2026
  topics:
  - perturbation-prediction
  - foundation-model
  - drug-design
  status: preprint
  org_type: academic
  region: US
  why: Drug-conditional adapter (<1% trainable params) on a frozen FM — generalises where CPA/GEARS/scGen don't.
  description: Preprint from a US academic group adding a drug-conditional adapter on top of a frozen single-cell foundation model, with under 1% of parameters trainable, to predict drug-perturbation responses. The headline claim is that this adapter generalises to held-out drugs in settings where CPA, GEARS, and scGen do not, which would be one of the cleaner positive results for sc-FMs in the post-reckoning literature where most comparisons have not favoured the FMs. The parameter-efficient adapter framing matters because it argues the FM's frozen representations contain the relevant generalisation signal, the adapter just has to surface it. As a preprint the result needs independent reproduction, and the open question is whether the drug-conditional generalisation holds across cell types and perturbation regimes, or whether it is sensitive to the specific FM and benchmark used.
- id: cinema-ot
  kind: tool
  name: CINEMA-OT
  topics:
  - perturbation-prediction
  - causal
  status: published
  org_type: academic
  region: US
  why: Optimal-transport perturbation-effect disentanglement.
  description: 'Optimal-transport-based perturbation-effect disentanglement method from a US academic group, separating treatment effect from confounders by matching cells across conditions using OT couplings. The causal-inference framing is what makes it interesting next to autoencoder approaches like CPA: rather than learning disentangled latents implicitly, it leverages the geometry of the data and an OT solver to estimate counterfactual cell states directly. That makes the estimates more interpretable and gives explicit handles for sensitivity analysis. Within the perturbation-modelling landscape it sits in the small but growing causal-methods cluster that the more recent work on causal pretraining objectives builds on. Open questions are scalability to very large screens, how the OT cost function should encode biological similarity, and how the method behaves when treatment-control overlap is poor.'
- id: lopez-hsu-causal-2025
  kind: paper
  name: Causal representation learning (Lopez/Hsu)
  venue: Nature Methods
  year: 2025
  topics:
  - causal
  - single-cell
  - perturbation-prediction
  status: published
  org_type: academic
  region: US
  why: Causal-rep exemplar for pretraining objectives that target causality.
  description: Published exemplar from a US academic group of pretraining objectives that explicitly target causal structure in single-cell data, rather than treating causality as a downstream concern. The paper is cited in discussions of where single-cell foundation models should go next, because the recent reckoning literature suggests that scaling masked-language-model recipes on expression data is hitting diminishing returns and that the next generation of objectives may need to encode causal assumptions directly. Within the broader causal-single-cell cluster it sits alongside methods like CINEMA-OT but at the pretraining-objective level rather than at inference time. The open question is whether causal objectives at pretraining give downstream perturbation models a real advantage on the harder out-of-distribution benchmarks, or whether the gains evaporate when the implicit assumptions are violated.
- id: replogle-2022
  kind: dataset
  name: Replogle whole-genome Perturb-seq
  authors: Replogle et al.
  venue: Cell
  year: 2022
  topics:
  - perturb-seq
  - perturbation-prediction
  status: published
  org_type: academic
  region: US
  why: Standard perturbation test set.
  description: Genome-scale Perturb-seq dataset from the Weissman group, published in 2022, and the standard test set for perturbation-prediction benchmarks. The dataset contains transcriptional responses to thousands of CRISPRi gene knockdowns at single-cell resolution in K562 and RPE1 backgrounds, which makes it large enough to serve both as training data and as a held-out evaluation substrate. Almost every paper claiming progress on single-cell perturbation modelling, including the post-2024 FM reckoning literature, reports numbers on some split of Replogle, which makes its splits and metrics load-bearing for the whole subfield. Its scale was also a key enabler for the first generation of perturbation-trained single-cell foundation models. Open questions are about how to define meaningful generalisation splits on this data, because trivial splits give optimistic numbers and adversarial splits drop most methods to near-zero; the field has not yet converged on a canonical evaluation protocol.
- id: norman-2019
  kind: dataset
  name: Norman combinatorial Perturb-seq
  authors: Norman et al.
  venue: Science
  year: 2019
  topics:
  - perturb-seq
  - perturbation-prediction
  status: published
  org_type: academic
  region: US
  why: Substrate for compositional-generalisation benchmarks.
  description: 'Combinatorial Perturb-seq dataset from the Norman et al. 2019 study, with transcriptional readouts for single and double CRISPRa perturbations across a panel of genes. Its enduring value is that the double perturbations provide a substrate for compositional-generalisation benchmarks: train on singles and a subset of pairs, test on held-out pairs, and measure how well models recover the combinatorial response. That setup has become the standard testbed for asking whether a perturbation model has actually learned mechanism or is interpolating, and most recent perturbation-prediction papers report Norman compositional metrics. The open questions live in evaluation rather than in the data itself: which compositional splits are biologically meaningful, and how much of the apparent compositional-generalisation gap reflects model failure versus measurement noise.'
- id: open-problems-v2
  kind: benchmark
  name: Open Problems v2
  url: https://openproblems.bio
  topics:
  - eval
  - single-cell
  - benchmark
  status: launched
  org_type: consortium
  region: global
  why: Community single-cell benchmark suite.
  description: Community-maintained single-cell benchmark suite from the Open Problems consortium, providing standardised tasks, datasets, and evaluation harnesses for single-cell analysis methods. The v2 release expanded the task coverage and overhauled the infrastructure so that submissions can be reproduced end to end rather than trusted on author-reported numbers. That reproducibility focus matters because the single-cell methods literature has historically had a hard time agreeing on what good performance even looks like, and Open Problems is the most credible attempt at a shared scoreboard. It now serves as one of the natural venues for evaluating single-cell foundation models, including in the post-reckoning literature. Open questions are about coverage of perturbation tasks, how quickly the suite can add new benchmarks as the field shifts, and how to keep submission incentives aligned with real scientific progress.
- id: perturbench-altos
  kind: benchmark
  name: PerturBench
  venue: Altos Labs
  url: https://github.com/altoslabs/perturbench
  topics:
  - eval
  - perturbation-prediction
  status: launched
  org_type: biotech
  region: UK
  why: Altos Labs perturbation-prediction benchmark.
  description: 'Perturbation-prediction benchmark released by Altos Labs, providing a standardised evaluation pipeline for methods that predict transcriptional responses to genetic and chemical perturbations. The Altos provenance matters because it is one of the few benchmarks coming from a deep-pocketed industry group with a stated interest in cellular reprogramming, which gives the benchmark a particular taste for clinically relevant generalisation splits. It overlaps with but is distinct from the academic scPerturBench and the Open Problems perturbation tasks, and the multiplicity of benchmarks is itself a signal that the field has not converged on a single canonical evaluation. Open questions are the usual benchmark-governance issues: how rapidly leaderboards update, how splits are versioned, and whether industry-released benchmarks attract enough academic participation to become the de facto standard.'
- id: scperturbench
  kind: benchmark
  name: scPerturBench
  venue: BM2-Lab
  url: https://bm2-lab.github.io/scPerturBench-reproducibility/
  topics:
  - eval
  - perturbation-prediction
  status: launched
  org_type: academic
  region: EU
  why: Benchmark with adversarial perturbation/cell-type splits.
  description: 'Perturbation-prediction benchmark from a European academic group, distinguished by its emphasis on adversarial perturbation and cell-type splits that stress out-of-distribution generalisation. The adversarial-split framing is the most important methodological choice: random splits make perturbation models look much better than they are, and scPerturBench is one of the benchmarks that the 2025-2026 reckoning literature uses to show that single-cell foundation models often do not beat much simpler baselines under stress. That makes it more diagnostic than the more permissive benchmarks. It coexists with PerturBench from Altos and the Open Problems perturbation tasks, with no single benchmark having displaced the others. Open questions concern how to define adversarial splits that remain biologically meaningful and how to interpret the headline gap between random-split and adversarial-split performance.'
- id: vcc-2025-portal
  kind: competition
  name: CZ Biohub Virtual Cell Challenge 2025
  url: https://virtualcellchallenge.org/
  topics:
  - virtual-cell
  - eval
  - perturbation-prediction
  status: launched
  org_type: foundation
  region: US
  why: First community virtual-cell benchmark, $50k prize.
  description: 'Portal for the Virtual Cell Challenge, a community competition framed as the first benchmark of its kind for virtual-cell models, run by the foundation backing the broader virtual-cell programme with a $50,000 prize. The competition matters as much for the social effect as for the metric: it gives the virtual-cell community a single public venue where models can be compared on a defined task with held-out evaluation, which is exactly the missing piece that has made it hard to talk about progress in this area without each lab citing its own internal benchmark. The prize is small relative to the compute many entrants will spend, but the leaderboard is the more durable artefact. Open questions are about how the task and the evaluation will evolve in future iterations and how representative the chosen benchmark is of what virtual cells are supposed to deliver.'
- id: tahoe-100m
  kind: dataset
  name: Tahoe-100M
  authors: Roohani, Hsu et al.
  year: 2025
  topics:
  - perturb-seq
  - virtual-cell
  status: launched
  org_type: biotech
  region: US
  why: First large-scale perturbation atlas framed as virtual-cell training data.
  description: 'Tahoe-100M is the first large-scale perturbation atlas explicitly framed as virtual-cell training data rather than as a standalone biology resource. Produced by Vevo, the Arc Institute, and the CZ Biohub, the 2025 release sits at the centre of the ''data is what the reckoning needs to overcome'' bet: if the contrarian Feb 2026 paper is right that current sc-FMs hit their ceiling because of data not architecture, Tahoe-100M is the dataset that will test the claim. The corpus carries the 2026 Tahoe-Arc-CZBiohub partnership announcement (the big three of US AIVC join up around the dataset). Pertpy (Nat Methods 2025) is the scverse-blessed analysis layer designed for atlases of this scale. The next round of perturbation-prediction benchmarks will be judged on how much Tahoe-100M-trained models close the gap to linear baselines.'
  starred: true
- id: tabula-sapiens
  kind: dataset
  name: Tabula Sapiens
  venue: Science
  year: 2022
  topics:
  - single-cell
  status: published
  org_type: consortium
  region: US
  why: Multi-organ human single-cell reference atlas.
  description: 'Multi-organ human single-cell reference atlas published in 2022 by the Tabula consortium, providing harmonised single-cell transcriptomic profiles across a wide range of human tissues from a small number of well-characterised donors. Its enduring value is as a within-donor multi-tissue reference, which is rare in the public single-cell ecosystem and which makes it useful for benchmarking cross-tissue annotation, cell-type mapping, and integration methods. It is a routine reference dataset for single-cell foundation models, both as training material and as a validation substrate for cell-type-transfer evaluations. Open questions concern coverage: the donor count is small, the demographic representation is limited, and the field is now generating much larger atlases that may eventually displace Tabula Sapiens for primary use while keeping it as a reference for harmonisation experiments.'
- id: cellxgene-census
  kind: dataset
  name: CELLxGENE Census
  topics:
  - single-cell
  - foundation-model
  status: launched
  org_type: foundation
  region: US
  why: Aggregated single-cell corpus most sc-FMs pretrain on.
  description: CZ CELLxGENE Census, the aggregated single-cell corpus that most modern single-cell foundation models train on, maintained by the Chan Zuckerberg Initiative. The Census harmonises tens of millions of cells from published datasets into a single queryable format with standardised metadata, which is the prerequisite for treating single-cell data as foundation-model training material rather than as a long tail of bespoke studies. Its existence is the reason scGPT, Geneformer, scFoundation, UCE, and the rest of the sc-FM ecosystem could be trained at all, and its growth rate and metadata-quality decisions feed directly into the capabilities of every subsequent model. Open questions are about provenance, bias from over-represented tissues and species, and how the Census governance handles the increasing pressure to include perturbation and disease data alongside healthy references.
- id: hubmap
  kind: dataset
  name: HuBMAP
  venue: Nature
  year: 2023
  topics:
  - spatial
  - imaging
  status: published
  org_type: consortium
  region: US
  why: Human tissue / spatial reference atlas.
  description: Human BioMolecular Atlas Program consortium dataset, published as a tissue and spatial reference atlas in 2023. HuBMAP's role in the landscape is to provide spatial and multimodal coverage of healthy human tissues at organ-system scale, which complements the dissociated single-cell atlases like Tabula Sapiens by preserving the spatial and architectural context that single-cell sequencing destroys. For groups building spatial-transcriptomics and pathology foundation models it functions as both training material and reference geometry, and it underlies the construction of organ-specific atlases that downstream tools assume. Open questions concern the rate at which the spatial-modality side of HuBMAP grows relative to the dissociated-sc side, how cross-laboratory harmonisation handles platform-specific artefacts, and how the consortium data interfaces with the newer spatial foundation models.
- id: hest-1k
  kind: dataset
  name: HEST-1k
  topics:
  - spatial
  - pathology
  - imaging
  status: launched
  org_type: academic
  region: US
  why: Histology-with-spatial-transcriptomics benchmark dataset.
  description: Histology-with-spatial-transcriptomics benchmark dataset from a US academic group, pairing H&E images with co-registered spatial transcriptomic profiles across a curated set of samples. The dataset matters because it is one of the cleaner public substrates for training and evaluating models that learn the mapping between histology image features and gene expression in spatial context, which is the obvious next step for pathology foundation models that currently see only the image side. It functions both as training material and as a benchmark for cross-modal generalisation. Open questions concern coverage across tissues and platforms, how representative the 1k scale is for downstream model training, and whether the field will converge on HEST-style paired datasets or on larger weakly-paired corpora as the standard for histology-to-expression models.
- id: casp-capri
  kind: benchmark
  name: CASP15 / CAPRI
  topics:
  - protein
  - eval
  status: launched
  org_type: consortium
  region: global
  why: Community structure- and complex-prediction assessments.
  description: A pair of long-running community assessments that have served as the de facto referee for protein structure and complex prediction since the early 1990s. CASP measures single-chain structure prediction in biennial blind trials and was the venue where AlphaFold 2 publicly outclassed every other approach in 2020; CAPRI runs the analogous experiment for protein-protein and protein-ligand assemblies, and now multimer and antibody-antigen rounds. For the FM era they remain the closest thing the field has to an independent referee — anything claiming to beat AlphaFold has to face a CASP target set rather than a curated paper-time benchmark. The catch is that targets leak slowly, evaluation cycles are slow, and the assessments still lean structural rather than functional, so they say little about whether a model captures binding, dynamics, or designability. Still the first place to look when a new protein FM publishes head-to-head numbers.
- id: proteingym
  kind: benchmark
  name: ProteinGym
  authors: Notin et al.
  venue: NeurIPS
  year: 2023
  topics:
  - protein
  - eval
  status: published
  org_type: academic
  region: US
  why: Protein variant-effect benchmark.
  description: 'A benchmark suite of deep mutational scanning datasets used to score how well protein language models predict variant effects without supervision. The 2023 release covers roughly 200 substitution assays and a smaller indel set across thousands of proteins, with standard splits and reference numbers for ESM, Tranception, EVE and the SaProt family. It has become the default leaderboard for zero-shot fitness prediction and the headline number new protein FMs report when they claim mutation-effect competence. Its limits are the usual ones for DMS-based eval: assays measure proxies (fluorescence, growth, binding to one target), the protein distribution skews toward what is experimentally tractable, and clinical-grade variant calls live in a different distribution. Worth tracking alongside ProteinGym''s clinical extensions and the newer indel and multi-residue tracks that are still maturing.'
- id: hetzel-2024
  kind: benchmark
  name: Compositional-generalisation benchmark (Hetzel et al.)
  venue: NeurIPS LMRL
  year: 2024
  topics:
  - eval
  - perturbation-prediction
  status: published
  org_type: academic
  region: EU
  why: Compositional generalisation benchmark referenced in supplementary §C.3.
  description: A 2024 benchmark probing whether single-cell perturbation models actually generalise to unseen combinations of perturbations, cell types or contexts, rather than interpolating within the training distribution. The setup constructs held-out compositional splits — e.g. drug A on cell type 1 and drug B on cell type 2 in train, with A on type 2 evaluated — and measures how badly current scFMs and perturbation predictors degrade. It became one of the references the 2025 reckoning literature cites when arguing that headline gains on standard splits do not survive distribution shift. Useful as a stress test even if its absolute numbers are small. The open question is whether the failure modes reflect a fundamentally compositional gap in current architectures, or whether richer perturbation atlases (Tahoe-100M, Perturb-seq follow-ups) close it without architectural changes.
- id: zheng-beyond-finetuning-2025
  kind: review
  name: Learning beyond fine-tuning
  authors: Zheng et al.
  venue: Nature Machine Intelligence
  year: 2025
  topics:
  - foundation-model
  status: published
  org_type: academic
  region: global
  why: Landscape of model-adaptation paradigms past fine-tuning.
  description: A 2025 review surveying ways to adapt foundation models that go past plain supervised fine-tuning — prompt tuning, adapters, LoRA and its variants, in-context conditioning, retrieval-augmentation, RLHF-style alignment, and the emerging space of test-time compute. It is useful as a map of which adaptation paradigms have actually shown up in biology so far (mostly LoRA and adapters on scFMs and protein LMs) versus the long tail still confined to NLP. For the virtual-cell agenda the review matters because the field is in the middle of deciding whether to fine-tune a generic scFM per assay, train task-specific heads, or pursue prompt-style conditioning on perturbation tokens. The contested point is which of these regimes survives once data scales another order of magnitude and the marginal value of pre-training itself comes into question.
- id: hossain-peft-lora-2024
  kind: paper
  name: PEFT / LoRA recipe for sc-FMs
  authors: Hossain et al.
  venue: arXiv 2412.13478
  year: 2024
  url: https://arxiv.org/abs/2412.13478
  topics:
  - single-cell
  - foundation-model
  status: preprint
  org_type: academic
  region: US
  why: Concrete PEFT recipe for single-cell FMs (Lane 2).
  description: A 2024 preprint giving a concrete parameter-efficient fine-tuning recipe for single-cell foundation models, using LoRA-style low-rank adapters on top of scGPT and related backbones. The paper benchmarks LoRA against full fine-tuning and frozen-encoder baselines across cell-type annotation, perturbation response and batch correction, reporting most of the headline accuracy at a small fraction of trainable parameters. For the talk it sits in Lane 2 — the pragmatic adapter path that lets a lab use a generic scFM without re-pretraining or paying full-tuning costs. The open question is whether LoRA's parameter savings translate to real downstream robustness once you push outside the pre-training distribution, which is exactly where Hetzel-style compositional splits show scFMs to be brittle. Pairs naturally with the broader Zheng adaptation review.
- id: chinchilla-2022
  kind: paper
  name: Chinchilla — compute-optimal scaling
  authors: Hoffmann et al.
  venue: arXiv
  year: 2022
  url: https://arxiv.org/abs/2203.15556
  topics:
  - scaling-laws
  status: preprint
  org_type: industry
  region: UK
  why: Compute-optimal scaling law behind every 'under/over-trained?' judgement.
  description: The 2022 DeepMind paper that re-derived compute-optimal scaling for language models and showed that Gopher-class systems were undertrained relative to their parameter count — for a fixed FLOP budget, tokens and parameters should scale roughly in tandem rather than scaling parameters alone. Chinchilla itself, with 70B parameters trained on 1.4T tokens, outperformed the 280B Gopher. The result reset what counts as a well-trained model and made it possible to ask, of any biology FM, whether its parameter-to-token ratio is close to compute-optimal or wildly off. Every later judgement that scGPT or Evo is undertrained, or that AlphaFold 3 over-spends parameters relative to PDB-sized data, traces back to this curve. The open caveat is that compute-optimality assumes a stationary loss landscape — for biology data with heavy assay-specific noise, the optimal point may sit elsewhere entirely.
- id: epoch-ai-training-compute
  kind: commentary
  name: Epoch AI — estimating training compute
  venue: Epoch AI blog
  url: https://epoch.ai/blog/estimating-training-compute
  topics:
  - scaling-laws
  - foundation-model
  status: published
  org_type: outlet
  region: global
  why: FLOPs ≈ 6 × params × tokens heuristic the talk's cost estimates use.
  description: A working blog post from Epoch AI laying out the back-of-envelope arithmetic for estimating training compute of a transformer model — chiefly the FLOPs ≈ 6 × params × tokens identity that underwrites almost every public cost estimate for frontier models. It is the reference the talk leans on when converting a stated parameter count and token budget into a dollar figure or an emissions number. Epoch maintains accompanying datasets and dashboards tracking model size, training compute, and dataset scale across the frontier, which is the only public source most biology audiences have when trying to put scGPT or Evo on the same axis as GPT-class systems. The contested bit is that the 6× constant elides activation recomputation, MoE sparsity, and mixed-precision savings, so any single number is best treated as an order-of-magnitude.
- id: cottier-frontier-costs-2024
  kind: paper
  name: The Rising Costs of Training Frontier AI Models
  authors: Cottier, Rahman et al.
  venue: arXiv
  year: 2024
  url: https://arxiv.org/abs/2405.21015
  topics:
  - scaling-laws
  - foundation-model
  status: preprint
  org_type: outlet
  region: global
  why: Economic backdrop for the compute-disclosure argument.
  description: 'A 2024 Epoch AI preprint quantifying the rising dollar cost of frontier model training, breaking out hardware, energy and staff, and projecting a trajectory in which leading runs cross the hundred-million and then billion-dollar marks within a few years. For the FM-to-virtual-cells argument it provides the economic backdrop that makes compute-disclosure a substantive demand rather than a hygiene gesture: if a Chinchilla-optimal cell FM costs eight figures to train, the question of who can afford to retrain when assays change is not academic. The contested point is methodological — the paper estimates fully-loaded costs from public proxies, and the labs running the actual jobs rarely confirm or deny. Useful as the citation behind any ''why does compute transparency matter'' framing in biology FM talks.'
- id: consens-genome-lm-2025
  kind: review
  name: Genome language models
  authors: Consens et al.
  venue: Nature Machine Intelligence
  year: 2025
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: academic
  region: global
  why: Review of transformer architectures for DNA.
  description: 'A 2025 review of transformer-based language models applied to DNA, covering the architectural lineage from DNABERT through Nucleotide Transformer to Evo and AlphaGenome-adjacent systems. It catalogues tokenisation strategies — k-mer, byte-pair, single-nucleotide — and the associated context-length and inductive-bias trade-offs, alongside pretraining objectives (masked, causal, span). Useful as an entry point for the gap between protein-LM and genome-LM design choices, since the latter has to confront much longer effective contexts and weaker functional supervision. The open thread the review highlights is evaluation: most genome LMs are still scored on a thin slate of regulatory and variant-effect tasks, and the field has not converged on a benchmark with the discriminative power of CASP or ProteinGym. Reads naturally alongside the state-space alternative literature.'
- id: tiezzi-transformers-state-space-2025
  kind: review
  name: Transformers vs state-space models
  authors: Tiezzi et al.
  venue: Nature Machine Intelligence
  year: 2025
  topics:
  - state-space
  - foundation-model
  status: published
  org_type: academic
  region: global
  why: Transformer / recurrent / state-space crossroads.
  description: A 2025 review situating transformers, modern RNNs and state-space models (Mamba, S4, RWKV and successors) as competing approaches to long-context sequence modelling, with a sober look at where each architecture currently has the edge. Relevant to biology because the question of whether to bet on quadratic-attention transformers or sub-quadratic state-space models is live for genome and long-protein FMs — Evo 2 and a wave of 2025 genomic SSMs have made the trade-off concrete. The review walks through expressivity results, hardware behaviour at long contexts, and the empirical wash on language benchmarks. The contested point is whether the gap closes or widens once context grows past the 100k-token range where transformer KV-cache costs become punishing — exactly the regime whole-chromosome and whole-cell modelling will need.
- id: hunklinger-ferruz-2026
  kind: review
  name: Protein-LM explainability
  authors: Hunklinger & Ferruz
  venue: Nature Machine Intelligence
  year: 2026
  topics:
  - interpretability
  - protein
  status: published
  org_type: academic
  region: EU
  why: Review of interpretability methods for protein FMs.
  description: 'A 2026 review of interpretability methods for protein foundation models from the Ferruz group, covering attention probing, mechanistic interpretability, sparse autoencoders, and structure-based attribution as applied to ESM, ProtT5, SaProt and design-oriented models like ProteinMPNN. Frames the question of whether a protein FM has learned biologically meaningful features — secondary structure, contacts, evolutionary constraints — versus statistical shortcuts. Sits alongside the AlphaFold interpretability subfield as the literature researchers cite when arguing that protein FMs are not pure black boxes. The contested bit is whether any of these methods generalise: sparse autoencoders on ESM have produced compelling per-feature stories, but it is not yet clear that the discovered features are stable across model scales or pretraining seeds. A useful starting point for anyone trying to build the same interpretability stack for single-cell FMs.'
- id: irm-arjovsky-2019
  kind: paper
  name: Invariant Risk Minimisation
  authors: Arjovsky et al.
  venue: arXiv
  year: 2019
  topics:
  - causal
  - foundation-model
  status: preprint
  org_type: industry
  region: US
  why: Causal-objective method cited as basis for counterfactual pretraining.
  description: 'The 2019 Invariant Risk Minimisation paper from FAIR (Arjovsky and colleagues) proposing a training objective that prefers representations whose optimal predictor is the same across environments, as a route around spurious correlations. IRM and its critics seeded a substantial line of out-of-distribution-generalisation work and is now cited as the conceptual basis for counterfactual or causal pretraining objectives in biology FMs — the argument being that scFMs which learn batch-confounded features will fail exactly the compositional splits Hetzel-style benchmarks expose. The contested status is well known: follow-up work showed IRM''s empirical claims do not hold in many settings and that ERM with strong regularisation is hard to beat. Still, it is the reference behind most current proposals for causal pretraining of cell foundation models, and worth reading before betting on that direction.'
- id: van-amersfoort-uq-2024
  kind: paper
  name: Deep deterministic UQ
  authors: van Amersfoort et al.
  year: 2024
  topics:
  - clinical
  - eval
  status: published
  org_type: academic
  region: UK
  why: Uncertainty-quantification method for the clinical-grade-FM track.
  description: A 2024 uncertainty-quantification method from the Oxford group, in the lineage of deep deterministic uncertainty and DUQ-style single-pass UQ — designed to give calibrated predictive uncertainty from a single forward pass without the cost of deep ensembles or full Bayesian inference. Relevant to the clinical-grade FM track because deployment in any decision-support setting requires per-prediction confidence with bounded latency, and Monte Carlo dropout or ensembling are awkward at FM scale. Pairs with the Angelopoulos-Bates conformal track as the two main UQ idioms biology FMs are likely to inherit. The open question is whether single-pass UQ remains calibrated under the distribution shift that defines clinical deployment — most published evaluations are in-distribution, and biology FMs are routinely asked to predict on tissues, assays or populations the pre-training set never saw.
- id: conformal-angelopoulos-bates-2023
  kind: paper
  name: Conformal prediction
  authors: Angelopoulos & Bates
  year: 2023
  topics:
  - eval
  - clinical
  status: published
  org_type: academic
  region: US
  why: Distribution-free uncertainty paired with the UQ track.
  description: 'The 2023 gentle introduction to conformal prediction by Angelopoulos and Bates, which has become the default reference for distribution-free uncertainty quantification in machine learning. Conformal prediction wraps any black-box model to produce prediction sets with finite-sample coverage guarantees, conditional only on exchangeability. For biology FMs the appeal is that the guarantee survives whether the underlying model is scGPT, AlphaFold or a tabular gradient-boosted predictor — useful when the deployment context is clinical and the regulator wants a calibration story. Sits naturally alongside the van Amersfoort single-pass UQ track as the second pillar of the clinical-grade FM UQ literature. The catch is the exchangeability assumption: conformal sets lose their guarantees under the kind of structural distribution shift that defines real clinical rollout, and the adaptive-conformal extensions that try to recover them are still actively contested.'
- id: schonhuth-2025
  kind: commentary
  name: From data chaos to precision medicine
  authors: Schönhuth
  venue: Nature Machine Intelligence
  year: 2025
  url: https://doi.org/10.1038/s42256-025-01015-9
  topics:
  - clinical
  - foundation-model
  status: published
  org_type: academic
  region: EU
  why: Short framing commentary on the data-to-clinic gap.
  description: 'A short 2025 commentary in Nature Machine Intelligence framing the gap between the kind of data biology FMs are trained on — public single-cell atlases, perturb-seq screens, structural databases — and the kind of evidence a clinical deployment actually requires. The argument is that the field''s progress metrics live on the wrong side of that gap and that closing it needs prospective clinical evaluations, not retrospective benchmark wins. Useful as a one-page citation when arguing that the data-to-clinic translation is the limiting reagent, not model capacity. The open thread is what an honest evaluation pipeline would even look like: who collects the cohorts, who pays for the prospective arm, and which regulator accepts a foundation model as a medical device. Worth reading next to the conformal and UQ literature it implicitly leans on.'
- id: x-cell-wang-2026
  kind: paper
  name: X-Cell — Scaling Causal Perturbation Prediction via Diffusion Language Models
  authors: Wang, Karimzadeh, Ravindra et al. (Bo Wang group)
  venue: bioRxiv 2026.03.18.712807
  year: 2026
  url: https://doi.org/10.64898/2026.03.18.712807
  topics:
  - perturbation-prediction
  - diffusion
  - foundation-model
  - causal
  status: preprint
  org_type: academic
  region: US
  why: Diffusion LM for perturbation — direct rival to State / scGPT-perturb framing.
  source: _Temp/new_paper.md
  description: A 2026 preprint introducing a diffusion-based language model for cellular perturbation prediction, positioned as a direct rival to Arc's State and the perturbation-focused fork of scGPT. The architectural pitch is that diffusion over expression vectors handles the heavy-tailed, sparse, count-valued structure of single-cell data better than autoregressive token prediction, and that conditioning on perturbation embeddings gives a cleaner counterfactual objective. The causal-pretraining angle ties it back to the IRM and invariance literature — the claim being that diffusion training implicitly enforces some of the same invariance constraints. The contested bit is whether the gains hold on the held-out compositional splits the Hetzel-style benchmarks expose, or whether they look like another in-distribution improvement that vanishes under combinatorial shift. The Tahoe-100M-scale follow-ups are the natural place to test that.
- id: cellfluxrl
  kind: paper
  name: CellFluxRL — Biologically-Constrained Virtual Cell Modeling via RL
  authors: Wu, Su, Zhang, Sui, Lundberg, Fox, Yeung-Levy
  venue: preprint
  year: 2026
  topics:
  - virtual-cell
  - RL
  - perturbation-prediction
  status: preprint
  org_type: academic
  region: US
  why: RL-driven virtual-cell modelling with biological constraints — Stanford/CZI/Lundberg axis.
  source: _Temp/new_paper.md
  description: A 2026 preprint applying reinforcement learning with explicit biological constraints to virtual-cell modelling, out of the Stanford / CZI / Lundberg axis that has driven much of the US AIVC programme. The framing treats cell-state evolution as a policy problem — an agent moves through expression space toward a target phenotype, with rewards shaped by pathway-consistency, conservation laws and perturbation responses. The interesting question for the field is whether RL gives a usable handle on the long-horizon trajectory problem that pure imitation-learning scFMs struggle with, or whether the constraint shaping is doing most of the work. Sits in the same conceptual neighbourhood as optimal-transport perturbation models but with a different inductive bias. The natural follow-up is CellFlux v2, listed separately as a name-only successor.
- id: lingshu-cell
  kind: paper
  name: Lingshu-Cell — generative cellular world model for transcriptome modelling
  authors: Han Zhang, Guo-Hua Yuan, Chaohao Yuan, Tingyang Xu, Tian Bian, Hong Cheng, Wenbing Huang, Deli Zhao, Yu Rong
  venue: preprint
  year: 2026
  topics:
  - virtual-cell
  - generative
  - foundation-model
  status: preprint
  org_type: industry
  region: CN
  why: Chinese-industry-led generative cellular world model for transcriptome.
  source: _Temp/new_paper.md
  description: A 2026 preprint from a Chinese industry group describing a generative cellular world model trained on transcriptomic data, positioned as the Chinese answer to the Arc / CZI / Genbio cluster of US virtual-cell FMs. The model targets the same use cases — perturbation response, cell-state interpolation, in-silico phenotyping — but is part of a parallel ecosystem that the English-language AIVC literature undercovers. Worth tracking because the Chinese AIVC scene (Tencent, Westlake, BGI-adjacent groups) is on a different release cadence and benchmark culture than the US one, and head-to-head comparisons are rare. The open question is whether Lingshu-class models close the loop with experimental validation programmes inside China, the way Arc and CZI have explicitly invested in coupling models to perturb-seq generation. Pairs with the AROMA-Tencent and Westlake AIVC entries.
- id: scale-conditional-transport
  kind: paper
  name: SCALE — Scalable Conditional Atlas-Level Endpoint transport for virtual-cell perturbation
  venue: preprint
  year: 2026
  topics:
  - virtual-cell
  - perturbation-prediction
  status: preprint
  org_type: academic
  region: global
  why: Optimal-transport / endpoint framing of perturbation prediction at atlas scale.
  source: _Temp/new_paper.md
  description: A 2026 preprint reframing single-cell perturbation prediction as an optimal-transport problem between unperturbed and perturbed cell-state distributions, at atlas scale. The conditional-transport framing predicts where each unperturbed cell would land under a perturbation rather than predicting bulk-level shifts, which is the right object if downstream use cases are heterogeneous-response or rare-subpopulation. Sits in the same lineage as CellOT and the broader Schiebinger-style trajectory-OT literature, but scaled to perturbation atlases that did not exist when those methods were written. The open question is whether endpoint-OT objectives recover the same information as next-state-conditional models when the underlying dynamics are smooth — and whether they degrade more gracefully on the compositional held-outs that have become the de facto stress test for perturbation FMs.
- id: vcbench-arxiv
  kind: benchmark
  name: VCBench
  venue: arXiv
  topics:
  - virtual-cell
  - eval
  - benchmark
  status: preprint
  org_type: academic
  region: global
  why: Named benchmark for virtual cells — details still being chased down.
  source: _Temp/new_paper.md
  description: 'A named virtual-cell benchmark surfacing in 2025-2026 preprints, intended to give the AIVC field its own equivalent of the protein and language-model leaderboards. The details — task slate, scoring, dataset composition, whether it covers perturbation, trajectory, multimodal integration or all three — are still being chased down, and the entry sits in the catalogue as a placeholder pending the full reference. Worth tracking because the absence of an agreed virtual-cell benchmark is precisely the gap the 2025 sc-FM reckoning identified: papers report incommensurable numbers on bespoke splits, and reproduction across labs is rare. The open question is whether VCBench (and the parallel CZI-led evaluation efforts) converges on a shared spec, or whether the field gets a fragmented benchmark landscape similar to early scRNA-seq integration evaluation.'
- id: czi-biohub-vbi
  kind: org
  name: CZI / Biohub / Virtual Biology Initiative
  authors: Priscilla Chan
  topics:
  - virtual-cell
  - foundation-model
  status: announced
  org_type: foundation
  region: US
  why: The single largest philanthropic backer of the virtual-cell vision.
  source: _Temp/new_paper.md
  description: The Chan Zuckerberg Initiative's Biohub network and its associated Virtual Biology Institute — the single largest philanthropic backer of the virtual-cell programme, funding the data generation (CELLxGENE atlas, perturb-seq at scale), the model training, and the evaluation infrastructure as an integrated stack. CZI's bet is that AIVC needs simultaneous investment in all three or none of it works, which differentiates it from purely model-funding or purely data-funding initiatives. The Biohub network spans San Francisco, Chicago and New York with dedicated AIVC-relevant programmes, and CZI has been the convenor behind the major virtual-cell workshops. The open question is the degree of coupling between CZI's funded outputs and the broader open ecosystem — how much of the data, model weights and benchmark infrastructure ends up genuinely open versus consortium-internal. So far the trend has been toward openness.
- id: jian-ma-vbc-cmu
  kind: org
  name: Jian Ma's Virtual Bio Center
  venue: Carnegie Mellon
  topics:
  - virtual-cell
  - single-cell
  status: announced
  org_type: academic
  region: US
  why: New CMU center anchored around Jian Ma's lab as a US academic hub for virtual biology.
  source: _Temp/new_paper.md
  description: A newly announced Carnegie Mellon centre for virtual biology anchored around Jian Ma's group, positioning CMU as a US academic hub for the AIVC programme alongside the CZI Biohubs, Stanford and the Broad. Ma's prior work on Hi-C, 3D genome organisation and single-cell methods makes the centre an interesting bet on multiscale modelling — explicitly trying to bridge the chromosomal and cellular scales rather than treating each as its own FM problem. Useful as a marker of how the academic landscape is reshuffling around the virtual-cell theme, with new institutional homes being stood up rather than the work staying within existing department structures. The open question is whether centres like this consolidate around a shared programme or end up running parallel efforts that recreate the fragmentation the field is trying to escape.
- id: proticelli-lundberg
  kind: tool
  name: ProtiCelli / ProtiCell
  authors: Emma Lundberg
  topics:
  - proteomics
  - virtual-cell
  status: name-only
  org_type: academic
  region: US
  why: Proteomics-anchored virtual-cell project from the Lundberg lab — mostly a slide-trail.
  source: _Temp/new_paper.md
  description: A proteomics-anchored virtual-cell project surfacing in slides from the Lundberg lab at Stanford / KTH, distinguished from the transcriptome-first AIVC mainstream by its insistence that protein abundance and localisation are the more decision-relevant cellular state. Mostly a slide-trail at this stage with no public preprint or release, so the catalogue entry is provisional. Worth tracking because the Human Protein Atlas / Cell Atlas pipeline the Lundberg group built is one of the few sources of cell-resolved proteomic data at the scale a useful FM would need, and the proteomics-first framing is a meaningful counterpoint to the transcriptome-as-cell-state assumption baked into scGPT-family models. The open question is when ProtiCelli moves from slide-trail to preprint and whether the underlying training corpus is something other labs can build on.
- id: compucell3d-workshop
  kind: event
  name: CompuCell3D Virtual Tissue Modeling Workshop & Hackathon
  topics:
  - virtual-cell
  - mech-modeling
  - 4d-modeling
  status: announced
  org_type: academic
  region: US
  why: The mech-modelling crowd's annual gathering — the parallel-universe to AIVC.
  source: _Temp/new_paper.md
  description: 'The annual workshop community around CompuCell3D, the long-running multi-cell mechanistic simulation framework developed at Indiana University. The workshops bring together the mechanistic-modelling crowd — cellular Potts model practitioners, tissue mechanics groups, developmental biology modellers — who built the prior generation of virtual cells before the FM wave arrived. Worth tracking as the parallel universe to the AIVC scene: the same use cases (in-silico perturbation, tissue dynamics, drug response) approached through hand-written physics rather than learned representations. The conceptual question for the field is whether the two universes converge — hybrid mech-plus-FM models like the UIUC 4D whole-cell work being the obvious bridge — or whether they remain parallel communities with different journals, different conferences, and different funders. The CompuCell3D workshop is where you go to see the mechanistic side without the AIVC marketing.'
- id: genbio-vcharness
  kind: tool
  name: VCHarness (GenBio AI)
  venue: GenBio AI
  topics:
  - agents
  - virtual-cell
  - foundation-model
  status: preprint
  org_type: biotech
