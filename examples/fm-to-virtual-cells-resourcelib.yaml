  description: 'The CZI Virtual Cells Platform is a free hosted Colab environment with tutorials for scGPT, rBio, TranscriptFormer, and scGenePT, designed to lower the entry cost for researchers who want to try recent single-cell foundation models without setting up GPU infrastructure. As infrastructure rather than a model, its significance is community-building: CZI is using the platform to make a specific set of models the practical default by being the easiest to get running, which shapes which methods get cited and extended. That role is interesting in light of the 2025 reckoning, because the platform''s curated model list is a soft endorsement of which scLLMs CZI thinks are worth surfacing, and the choices skew toward the foundation-model side of the debate. For a researcher new to the area it is the right starting point. The open question is which models the platform highlights once post-reckoning benchmarks settle.'
