  status: launched
  org_type: academic
  region: US
  why: First generative-AI pathology tool with FDA Breakthrough Designation (Jan 2025).
  description: PathChat DX is the diagnostic-grade variant of the Mahmood-lab pathology assistant, and as of January 2025 it became the first generative-AI pathology tool granted FDA Breakthrough Device Designation. The status is meaningful because most pathology foundation models still live in the discovery-research bucket; Breakthrough Designation acknowledges that the tool addresses an unmet diagnostic need and gets it a faster regulatory path. It signals that the slide-encoder plus vision-language stack the Mahmood group has been assembling can be productised in a clinic-facing form rather than only as a research artefact. The designation also affects the competitive landscape, because it puts an academically-developed pathology AI ahead of several industry-led pathology FMs in the regulatory queue. Whether DX clears the bar in pivotal studies, how it integrates with existing LIS and slide-scanner workflows, and how it handles the long tail of rare diagnoses are the next things to watch.
- id: enformer-2021
  kind: tool
  name: Enformer
  venue: Nature Methods
  year: 2021
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: industry
  region: UK
  why: Pre-FM-era gene-expression-from-sequence model.
  papermap_category: other_fm
  description: Pre-foundation-model-era gene-expression-from-sequence model from DeepMind, published in 2021. It used a transformer with long-range attention to predict cell-type-resolved expression and chromatin tracks directly from genomic DNA at roughly 100-kb context, and for several years it set the bar on variant-effect tasks that GWAS, eQTL, and rare-variant studies care about. Most of the genomic foundation models that followed Enformer either tried to scale its context window, swap in state-space architectures, or unify more output modalities under a single backbone. It is also notable as one of the cleanest examples of a sequence-to-function model whose embeddings turned out to be useful far outside the original task. It has now been largely subsumed by AlphaGenome at 1-Mb context but remains the natural baseline against which any new sequence-to-function model is measured, and a lot of downstream pipelines still ship with Enformer embeddings as features.
- id: alphagenome-2025
  kind: tool
  name: AlphaGenome
  authors: Avsec et al. (DeepMind)
  venue: Nature
  year: 2025
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: industry
  region: UK
  why: Variant-effect SOTA; replaces Enformer + Borzoi; 25/26 wins at 1-Mb context.
  papermap_category: other_fm
  description: 'DeepMind''s 2025 successor to Enformer and Borzoi, published as the new state of the art on variant-effect prediction. It extends the sequence-to-function paradigm to roughly 1-Mb context and reportedly wins 25 of 26 benchmark comparisons against the prior generation. The practical consequence is that two previously distinct models with different output tracks collapse into one stack, which simplifies downstream variant-interpretation pipelines and pushes more of the noncoding-variant burden onto a single foundation model. Open questions are the usual ones for industrial sequence FMs: how much of the gain is from architecture versus data and compute, how it handles cell types underrepresented in training, and what the licensing and access story looks like for academic use of the weights versus the API.'
  starred: true
- id: evo2-2026
  kind: tool
  name: Evo 2
  authors: Brixi et al. (Arc / NVIDIA / Stanford / UCB / UCSF)
  venue: Nature
  year: 2026
  topics:
