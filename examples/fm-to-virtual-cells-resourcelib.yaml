  description: 'Google DeepMind plus its commercial drug-discovery spinout Isomorphic Labs, the most compute-rich and most closed of the biology-FM organisations. The pairing matters because DeepMind ships the underlying models (AlphaFold, AlphaMissense, AlphaProteo, AlphaGenome) and Isomorphic monetises them via drug-discovery partnerships, with weights and training detail almost always held back. That closed posture is the structural alternative to the Arc Institute / EvolutionaryScale open-weight model and is one of the central tensions in the field''s governance debate. The TPU compute base is qualitatively different from the H100 fleets that everyone else runs on. Open questions: whether DeepMind''s hosted-API strategy holds up as competitors close the capability gap with open weights, and how Isomorphic''s clinical-stage assets perform when their model claims face actual trial readouts.'
- id: evolutionaryscale
  kind: org
  modality: other
  name: EvolutionaryScale (ex-Meta FAIR)
  authors: Alex Rives, Tom Sercu, Thomas Hayes
  url: https://www.evolutionaryscale.ai/
  topics:
  - protein
  - foundation-model
  status: launched
  org_type: biotech
  region: US
  why: ESM-3 with the cleanest compute disclosure (10²⁴ FLOPs) in biology FMs.
  description: 'EvolutionaryScale, the US biotech spun out of Meta''s protein-language-model team, which ships the ESM-3 family of protein foundation models. The organisation matters in the FM-to-virtual-cells landscape for two reasons: ESM-3 is the most credible non-AlphaFold protein FM on the market and has been released with one of the cleanest compute disclosures in biology AI, in the 10²⁴ FLOPs range. That transparency is rare — DeepMind, Recursion, and most pathology vendors do not disclose training cost — and it makes ESM-3 the calibration point against which other protein-FM compute claims can be sanity-checked. The company also occupies the open-weight side of the field''s open-versus-closed split. Open questions: how the commercial model holds up given the open-weight release, and whether ESM-style protein representations remain competitive against AlphaFold-derived embeddings on the tasks users actually care about.'
- id: paige-ai
  kind: org
  modality: other
  name: Paige.AI + MSK
  authors: Thomas Fuchs
  url: https://paige.ai/
  topics:
  - pathology
  - foundation-model
  - clinical
  status: launched
  org_type: biotech
  region: US
  why: First FDA 510(k)-cleared general-purpose pathology AI (Jan 2025); Virchow line.
  description: 'Paige.AI, the New York-headquartered pathology AI company that received the first FDA 510(k) clearance for a general-purpose pathology foundation model in January 2025, with the Virchow model family as its technical backbone. Paige matters in the landscape because it crossed the regulatory boundary before the academic FM groups did — even Mahmood''s PathChat-DX is still at Breakthrough Device status — and it is currently the closest the field has to a deployment template for FM-based diagnostic tools. The Virchow line itself has been a serious benchmark contender against the academic UNI/CONCH models. Open questions: how the 510(k) precedent shapes regulatory treatment of subsequent pathology FMs (does each new model need its own clearance?), and whether Paige''s closed-weight posture becomes a competitive disadvantage as open alternatives like Phikon mature.'
- id: owkin
  kind: org
  modality: other
  name: Owkin (Paris / NYC)
  url: https://owkin.com/
  topics:
  - pathology
  - clinical
  - foundation-model
  status: launched
  org_type: biotech
  region: EU
  why: Only major industrial pathology player shipping open weights (Phikon, Apache-2.0).
  description: 'Owkin, a French/US biotech and the only major industrial pathology player consistently shipping open weights, anchored by the Phikon model family released under Apache-2.0. Owkin''s position is structurally unusual: pathology FMs from Paige, Mahmood, and the various Chinese groups are either commercial products or academic with restrictive licenses, and Owkin''s open-weight commitment makes Phikon a default baseline for researchers without access to gated models. The company''s wider business — federated learning across hospital networks and clinical biomarker discovery — gives it a different data moat than the slide-corpus-scale story that other pathology FMs lean on. Open questions: how the open-weight strategy interacts with the federated-data business model, and whether Phikon''s iteration cadence keeps pace with the closed-weight competitors that don''t need to coordinate releases publicly.'
- id: nvidia-bionemo
  kind: tool
  modality: other
  name: NVIDIA BioNeMo Framework
  url: https://github.com/NVIDIA/bionemo-framework
  topics:
  - foundation-model
  - scaling-laws
  status: launched
  org_type: industry
  region: US
  why: Sets compute-disclosure norm; co-marketed with Geneformer V2.
  description: 'NVIDIA''s BioNeMo framework, the company''s bid to become the default platform layer for biology foundation models — a stack covering pretraining, fine-tuning, and inference for protein, molecule, and cell models on NVIDIA hardware. BioNeMo matters in the landscape less as a model than as a norm-setter: it has been co-marketed with Geneformer V2 from the Theodoris lab and has set the de facto standard for compute disclosure in academic-industry sc-FM partnerships, simply because NVIDIA''s marketing material publishes the GPU-hour numbers that publications often elide. That makes BioNeMo a useful transparency anchor in a field where most groups do not disclose training cost. Open questions: how BioNeMo''s framework-level abstractions hold up against the PyTorch-plus-scverse stack the open community defaults to, and whether the NVIDIA platform play translates into actual lock-in.'
- id: ahlmann-huber-lab
  kind: org
  modality: other
  name: Ahlmann-Eltze / Huber (EMBL Heidelberg)
  url: https://const-ae.name/
  topics:
  - eval
  - single-cell
  status: launched
  org_type: academic
  region: EU
  why: Authored the 2025 reckoning paper; Ahlmann-Eltze now at Isomorphic Labs.
  description: 'The joint Ahlmann-Eltze and Huber group at EMBL Heidelberg, authors of the 2025 evaluation paper that became the central reckoning for single-cell foundation models — showing that simple linear baselines matched or beat scGPT and Geneformer on perturbation-prediction tasks. The paper is the most consequential evaluation work in the field''s recent history and rewired both the benchmark conversation and the case for scaling cell FMs. Ahlmann-Eltze has since moved to Isomorphic Labs, which is itself a load-bearing signal: the field''s sharpest sc-FM critic is now inside DeepMind''s commercial drug-discovery arm. Open questions: how the 2025 results hold up against the next generation of sc-FMs explicitly designed to address them, and how the lab''s continuing benchmark work shapes the CZI Virtual Cell Challenge evaluation criteria in the rounds after launch.'
- id: theis-lab-helmholtz
  kind: org
  modality: other
  name: Theis Lab (Helmholtz Munich)
  authors: Fabian Theis
  url: https://www.helmholtz-munich.de/en/icb/pi/fabian-theis
  topics:
  - single-cell
  - foundation-model
  - spatial
  status: launched
  org_type: academic
  region: EU
  why: Methodological reference class; author of 2026 compositional-FM perspective.
  description: 'The Fabian Theis lab at Helmholtz Munich, the methodological reference class for single-cell and spatial computational biology — author of scVI, scArches, scPoli, the human cell atlas integration tooling, and a long string of methods that scverse rests on. The lab''s 2026 perspective paper on compositional foundation models is the current intellectual anchor for the post-monolithic-FM turn the field is taking, arguing that the right unit is not a single giant cell model but a composable stack of specialised modules. That framing matters because it gives the 2025 reckoning a constructive exit: rather than abandon FMs, restructure them. Open questions: how the compositional vision interacts with agentic frameworks like Bo Wang''s X-Cell, and whether the Theis lab''s own next-generation models implement the compositional thesis or whether it lands as a perspective piece without a flagship implementation.'
- id: biomap-mbzuai
  kind: org
  modality: other
  name: BioMap Research + MBZUAI
  authors: Le Song & Eric Xing
  topics:
  - virtual-cell
  - foundation-model
  - agents
  status: launched
  org_type: industry
  region: CN
  why: China/Middle-East virtual-cell competitor (VCHarness, xTrimo).
  description: 'BioMap together with MBZUAI, the joint China / Middle East axis competing in the virtual-cells and biology-FM space with the VCHarness benchmark harness and the xTrimo protein/cell model series. The pairing matters because it represents the first credible non-Western coalition organised around the same agenda as Arc Institute and the CZI Virtual Cells Initiative — training large biology FMs and shipping benchmarking infrastructure to support them. VCHarness in particular slots into the same evaluation-layer role that the CZI Virtual Cell Challenge plays, with different governance and a different scoreboard. Open questions: how interoperable the BioMap models are with the Western FM stack (CELLxGENE, scverse, BioNeMo), how the agentic agenda flagged in the topic tags actually surfaces in the model line, and whether the consortium''s compute base scales to compete with Arc''s H100 fleet over the next cycle.'
- id: isomorphic-labs
  kind: org
  modality: other
  name: Isomorphic Labs
  topics:
  - drug-design
  - protein
  - foundation-model
  status: launched
  org_type: industry
  region: UK
  why: DeepMind's commercial drug-discovery arm; bought Ahlmann-Eltze.
  description: 'Isomorphic Labs, the UK-based commercial drug-discovery spinout from DeepMind, which inherits the AlphaFold / AlphaProteo / AlphaMissense model stack and partners with pharma on lead-discovery programmes. Its position in the FM-to-virtual-cells landscape has sharpened with the recent hire of Constantin Ahlmann-Eltze — author of the 2025 sc-FM reckoning paper — which signals that Isomorphic intends to build internal evaluation capacity at the level of the field''s sharpest critic. The closed-weight, hosted-API posture inherited from DeepMind is the structural opposite of the Arc Institute / EvolutionaryScale open model. Open questions: how the partnership pipeline performs as the early AlphaFold-enabled drug candidates reach clinical readouts, and whether the company expands beyond protein-structure-driven targets into the cell-state and perturbation-prediction territory that the rest of the FM landscape is moving toward.'
- id: recursion
  kind: org
  modality: other
  name: Recursion Pharmaceuticals
  url: https://www.recursion.com
  topics:
  - imaging
  - drug-design
  - foundation-model
  status: launched
  org_type: biotech
  region: US
  why: AI-native biotech using FMs for drug discovery.
  description: 'Recursion Pharmaceuticals, a US AI-native biotech using foundation models on its in-house phenomics platform — large-scale cell-painting imaging across compound and genetic perturbations — to drive drug discovery. Recursion''s data moat is the imaging side rather than the model side: it operates one of the largest perturbation-imaging datasets in industry, and its FMs are trained against that proprietary substrate. That makes the company an instructive case for the image-modality slice of the virtual-cell agenda, complementary to the transcriptomics-heavy work coming out of CZI and Arc. The 2023 NVIDIA partnership and the BioHive-2 cluster put Recursion among the better-compute-resourced industrial players. Open questions: how Recursion''s image-derived embeddings transfer to the transcriptomic perturbation tasks that dominate the public benchmarks, and how the company''s model output translates into clinical pipeline progression.'
- id: insitro
  kind: org
  modality: other
  name: Insitro
  authors: Daphne Koller
  url: https://insitro.com
  topics:
  - drug-design
  - virtual-cell
  status: launched
  org_type: biotech
  region: US
  why: Applied virtual-cell case study in drug discovery.
  description: 'Insitro, a US biotech founded by Daphne Koller applying ML to drug discovery, and one of the more concrete industrial case studies for the virtual-cell thesis: it generates large in-house perturbation and disease-model datasets and uses learned cell-state models to drive target selection. The company has been deliberately quiet about model-architecture detail, which makes it less visible than the academic sc-FM groups but more load-bearing as a market signal — its existence and continued funding say something about whether pharma actually buys the virtual-cell agenda. Insitro sits alongside Recursion on the industrial side of the field, with a different data emphasis (disease-relevant in vitro systems versus phenomic imaging at scale). Open questions: which targets in its disclosed pipeline trace back specifically to model-driven selection, and how its internal sc-FM-or-equivalent compares against the open academic stack.'
- id: latent-labs
  kind: org
  modality: other
  name: Latent Labs
  authors: Simon Kohl + DeepMind alumni
  url: https://latentlabs.com
  topics:
  - virtual-cell
  - foundation-model
  status: launched
  org_type: biotech
  region: UK
  why: DeepMind-alumni virtual-cell startup.
  description: 'Latent Labs, a UK biotech founded by DeepMind alumni building virtual-cell foundation models for biology applications. Its main interest in the landscape is provenance: it is one of the first identifiable spinouts taking the DeepMind protein-FM playbook and applying it to cell-scale rather than protein-scale problems. That puts Latent Labs in the same competitive neighbourhood as Arc Institute (non-profit), Isomorphic (DeepMind''s other spinout, drug-focused), and the various academic sc-FM groups, but with a startup commercialisation vector that none of those have. The company is still early and the public detail on its model line is thin. Open questions: which dataset substrate Latent Labs builds on (CELLxGENE, proprietary, or partnered), how it positions against Arc''s open-weight STATE family, and whether its team lineage actually transfers — protein-FM and cell-FM are structurally different problems, despite the shared vocabulary.'
- id: vevo-arc-startup
  kind: org
  modality: single-cell-rna
  name: Vevo / Arc
  topics:
  - virtual-cell
  - perturb-seq
  status: launched
  org_type: biotech
  region: US
  why: Tahoe-100M producer — virtual-cell modelling platform.
  description: 'US biotech building a virtual-cell modelling platform, best known publicly as the producer of the Tahoe-100M perturbational single-cell dataset. The bet is that scaling perturb-seq into the tens of millions of cell-by-compound observations gives you enough signal to train models that actually predict response rather than just embed transcriptomes. That matters because the 2025 sc-FM reckoning landed largely on the data side: existing atlases were observational, so even well-engineered models could not beat linear baselines on perturbation tasks. A platform built around in-house perturbation data is a direct response to that critique. Open questions: whether Tahoe-100M generalises beyond the cancer lines it was generated in, whether the modelling layer ships externally or remains internal IP, and how the company positions against Arc STATE and CZI virtual-cells program now competing for the same evaluation oxygen.'
- id: cellarity
  kind: org
  modality: single-cell-rna
  name: Cellarity
  topics:
  - drug-design
  - single-cell
  status: launched
  org_type: biotech
  region: US
  why: Cell-state engineering company.
  description: US biotech operating on the premise that drug discovery should target cell states rather than single proteins, using single-cell transcriptomics as the substrate for both target definition and compound screening. Founded out of Flagship Pioneering, it predates the current foundation-model wave but sits squarely in the same conceptual lane as the virtual-cell programs now organised by CZI and Arc. The pitch is that high-dimensional cell-state readouts let you find leads for indications that lack clean molecular targets, especially in metabolic and inflammatory disease. What is open is whether a cell-state-first pipeline delivers clinical assets at a tempo competitive with target-based discovery, and how the company integrates or competes with the public sc-FM stack now maturing around it. Worth tracking as a reference point for cell-state pharmacology distinct from the academic FM narrative.
- id: benchsci
