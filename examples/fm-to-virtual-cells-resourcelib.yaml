  license: 'CC-BY-4.0'
  access: 'open'
  name: CELLxGENE Census
  topics:
  - single-cell
  - foundation-model
  status: launched
  org_type: foundation
  region: US
  why: Aggregated single-cell corpus most sc-FMs pretrain on.
  description: CZ CELLxGENE Census, the aggregated single-cell corpus that most modern single-cell foundation models train on, maintained by the Chan Zuckerberg Initiative. The Census harmonises tens of millions of cells from published datasets into a single queryable format with standardised metadata, which is the prerequisite for treating single-cell data as foundation-model training material rather than as a long tail of bespoke studies. Its existence is the reason scGPT, Geneformer, scFoundation, UCE, and the rest of the sc-FM ecosystem could be trained at all, and its growth rate and metadata-quality decisions feed directly into the capabilities of every subsequent model. Open questions are about provenance, bias from over-represented tissues and species, and how the Census governance handles the increasing pressure to include perturbation and disease data alongside healthy references.
- id: hubmap
  kind: dataset
  modality: spatial
  size: '4,221 datasets × 351 donors × 14+ organs'
  license: 'CC-BY-4.0'
  access: 'registered'
  name: HuBMAP
  venue: Nature
  year: 2023
  topics:
  - spatial
  - imaging
  status: published
  org_type: consortium
  region: US
  why: Human tissue / spatial reference atlas.
  description: Human BioMolecular Atlas Program consortium dataset, published as a tissue and spatial reference atlas in 2023. HuBMAP's role in the landscape is to provide spatial and multimodal coverage of healthy human tissues at organ-system scale, which complements the dissociated single-cell atlases like Tabula Sapiens by preserving the spatial and architectural context that single-cell sequencing destroys. For groups building spatial-transcriptomics and pathology foundation models it functions as both training material and reference geometry, and it underlies the construction of organ-specific atlases that downstream tools assume. Open questions concern the rate at which the spatial-modality side of HuBMAP grows relative to the dissociated-sc side, how cross-laboratory harmonisation handles platform-specific artefacts, and how the consortium data interfaces with the newer spatial foundation models.
- id: hest-1k
  kind: dataset
  modality: multimodal
  size: '1,276 ST profiles + WSIs, 1.5M expression/morphology pairs'
  license: 'custom'
  access: 'open'
  name: HEST-1k
  topics:
  - spatial
  - pathology
  - imaging
  status: launched
  org_type: academic
  region: US
  why: Histology-with-spatial-transcriptomics benchmark dataset.
  description: Histology-with-spatial-transcriptomics benchmark dataset from a US academic group, pairing H&E images with co-registered spatial transcriptomic profiles across a curated set of samples. The dataset matters because it is one of the cleaner public substrates for training and evaluating models that learn the mapping between histology image features and gene expression in spatial context, which is the obvious next step for pathology foundation models that currently see only the image side. It functions both as training material and as a benchmark for cross-modal generalisation. Open questions concern coverage across tissues and platforms, how representative the 1k scale is for downstream model training, and whether the field will converge on HEST-style paired datasets or on larger weakly-paired corpora as the standard for histology-to-expression models.
- id: casp-capri
  kind: benchmark
  modality: proteomic
  name: CASP15 / CAPRI
  topics:
  - protein
  - eval
  status: launched
  org_type: consortium
  region: global
  why: Community structure- and complex-prediction assessments.
  description: A pair of long-running community assessments that have served as the de facto referee for protein structure and complex prediction since the early 1990s. CASP measures single-chain structure prediction in biennial blind trials and was the venue where AlphaFold 2 publicly outclassed every other approach in 2020; CAPRI runs the analogous experiment for protein-protein and protein-ligand assemblies, and now multimer and antibody-antigen rounds. For the FM era they remain the closest thing the field has to an independent referee — anything claiming to beat AlphaFold has to face a CASP target set rather than a curated paper-time benchmark. The catch is that targets leak slowly, evaluation cycles are slow, and the assessments still lean structural rather than functional, so they say little about whether a model captures binding, dynamics, or designability. Still the first place to look when a new protein FM publishes head-to-head numbers.
- id: proteingym
  kind: benchmark
  modality: proteomic
  name: ProteinGym
  authors: Notin et al.
  venue: NeurIPS
  year: 2023
  topics:
  - protein
  - eval
  status: published
  org_type: academic
  region: US
  why: Protein variant-effect benchmark.
  description: 'A benchmark suite of deep mutational scanning datasets used to score how well protein language models predict variant effects without supervision. The 2023 release covers roughly 200 substitution assays and a smaller indel set across thousands of proteins, with standard splits and reference numbers for ESM, Tranception, EVE and the SaProt family. It has become the default leaderboard for zero-shot fitness prediction and the headline number new protein FMs report when they claim mutation-effect competence. Its limits are the usual ones for DMS-based eval: assays measure proxies (fluorescence, growth, binding to one target), the protein distribution skews toward what is experimentally tractable, and clinical-grade variant calls live in a different distribution. Worth tracking alongside ProteinGym''s clinical extensions and the newer indel and multi-residue tracks that are still maturing.'
  qa:
    did: 'ProteinGym assembled a benchmark suite of deep mutational scanning assays — roughly 200 substitution datasets plus a smaller indel set spanning thousands of proteins — and used it to score how well protein language models predict variant effects without supervision, providing reference numbers for ESM, Tranception, EVE and SaProt.'
    purpose: 'The aim was to give the protein-LM community a standardised, zero-shot fitness-prediction leaderboard so new foundation models could be compared on a shared slate rather than each picking its own DMS panel. It made variant-effect competence a headline number that any new protein FM has to report.'
    method: 'The benchmark stitches together public DMS assays under uniform splits and scoring conventions, then evaluates each model in a zero-shot setting — log-likelihoods or pseudo-likelihoods over mutated sequences against wild-type, with reference ESM, Tranception, EVE and SaProt baselines reported alongside.'
    result: 'Released at NeurIPS 2023 with reference numbers across ESM, Tranception, EVE and SaProt families, ProteinGym became the default zero-shot variant-effect leaderboard. Limits — proxy assays like fluorescence or growth, an experimentally-tractable protein skew, and a gap to clinical variant distributions — are well documented.'
- id: hetzel-2024
  kind: benchmark
  modality: single-cell-rna
  name: Compositional-generalisation benchmark (Hetzel et al.)
  venue: NeurIPS LMRL
  year: 2024
  topics:
  - eval
  - perturbation-prediction
  status: published
  org_type: academic
  region: EU
  why: Compositional generalisation benchmark referenced in supplementary §C.3.
  description: A 2024 benchmark probing whether single-cell perturbation models actually generalise to unseen combinations of perturbations, cell types or contexts, rather than interpolating within the training distribution. The setup constructs held-out compositional splits — e.g. drug A on cell type 1 and drug B on cell type 2 in train, with A on type 2 evaluated — and measures how badly current scFMs and perturbation predictors degrade. It became one of the references the 2025 reckoning literature cites when arguing that headline gains on standard splits do not survive distribution shift. Useful as a stress test even if its absolute numbers are small. The open question is whether the failure modes reflect a fundamentally compositional gap in current architectures, or whether richer perturbation atlases (Tahoe-100M, Perturb-seq follow-ups) close it without architectural changes.
  qa:
    did: 'Hetzel and colleagues built a 2024 NeurIPS-LMRL benchmark probing whether single-cell perturbation models actually generalise to unseen combinations of perturbation and cell-type context, rather than interpolating within training distribution. It stress-tested scFMs and dedicated perturbation predictors against compositional held-outs.'
    purpose: 'The point was to expose a gap the standard random-split evaluations hide — that headline gains on perturb-seq tasks reflect interpolation, not the compositional reasoning the virtual-cell agenda actually needs. The benchmark gives reviewers an explicit lever for asking whether a model survives distribution shift.'
    method: 'Splits hold out specific compositions — drug A on cell type 1 and drug B on cell type 2 in train, with A on type 2 evaluated — then measure degradation of leading scFMs and perturbation predictors against in-distribution baselines under the same architectures and training pipelines.'
    result: 'Reported substantial degradation across current scFMs and perturbation predictors on the compositional held-outs. The benchmark became a load-bearing reference in the 2025 reckoning literature — cited by Ahlmann-Eltze, Csendes and Wenkel as evidence that standard split gains do not survive structured distribution shift.'
- id: zheng-beyond-finetuning-2025
  kind: review
  modality: other
  name: Learning beyond fine-tuning
  authors: Zheng et al.
  venue: Nature Machine Intelligence
  year: 2025
  topics:
  - foundation-model
  status: published
  org_type: academic
  region: global
  why: Landscape of model-adaptation paradigms past fine-tuning.
  description: A 2025 review surveying ways to adapt foundation models that go past plain supervised fine-tuning — prompt tuning, adapters, LoRA and its variants, in-context conditioning, retrieval-augmentation, RLHF-style alignment, and the emerging space of test-time compute. It is useful as a map of which adaptation paradigms have actually shown up in biology so far (mostly LoRA and adapters on scFMs and protein LMs) versus the long tail still confined to NLP. For the virtual-cell agenda the review matters because the field is in the middle of deciding whether to fine-tune a generic scFM per assay, train task-specific heads, or pursue prompt-style conditioning on perturbation tokens. The contested point is which of these regimes survives once data scales another order of magnitude and the marginal value of pre-training itself comes into question.
- id: hossain-peft-lora-2024
  kind: paper
  modality: single-cell-rna
  name: PEFT / LoRA recipe for sc-FMs
  authors: Hossain et al.
  venue: arXiv 2412.13478
  year: 2024
  url: https://arxiv.org/abs/2412.13478
  topics:
  - single-cell
  - foundation-model
  status: preprint
  org_type: academic
  region: US
  why: Concrete PEFT recipe for single-cell FMs (Lane 2).
  description: A 2024 preprint giving a concrete parameter-efficient fine-tuning recipe for single-cell foundation models, using LoRA-style low-rank adapters on top of scGPT and related backbones. The paper benchmarks LoRA against full fine-tuning and frozen-encoder baselines across cell-type annotation, perturbation response and batch correction, reporting most of the headline accuracy at a small fraction of trainable parameters. For the talk it sits in Lane 2 — the pragmatic adapter path that lets a lab use a generic scFM without re-pretraining or paying full-tuning costs. The open question is whether LoRA's parameter savings translate to real downstream robustness once you push outside the pre-training distribution, which is exactly where Hetzel-style compositional splits show scFMs to be brittle. Pairs naturally with the broader Zheng adaptation review.
  qa:
    did: 'It introduced scDCA, a parameter-efficient way to fine-tune single-cell foundation models for predicting drug-induced gene-expression responses. The model combines a pre-trained single-cell model, mainly scGPT, with molecular embeddings, allowing prediction of how cells respond transcriptionally to unseen chemical perturbations.'
    purpose: 'The goal was to predict cellular responses to new drugs, especially when experimental perturbation data are scarce. The authors focused not only on unseen drugs, but also the harder problem of predicting drug responses in unseen cell lines, including zero-shot settings.'
    method: 'They froze most scGPT parameters and inserted drug-conditional adapter modules into transformer layers. Molecules were encoded using ChemBERTa from SMILES strings. Instead of fully fine-tuning scGPT, only small adapter layers were trained, using less than 1% of the original foundation model parameters.'
    result: 'scDCA outperformed naive fine-tuning and baselines such as ChemCPA, BioLORD, and SAMS-VAE across unseen drug, unseen drug–cell-line, few-shot cell-line, and zero-shot cell-line tasks. The advantage was strongest in difficult few-shot and zero-shot generalization, while being faster and more memory-efficient.'
- id: chinchilla-2022
  kind: paper
  modality: text
  name: Chinchilla — compute-optimal scaling
  authors: Hoffmann et al.
  venue: arXiv
  year: 2022
  url: https://arxiv.org/abs/2203.15556
  topics:
  - scaling-laws
  status: preprint
  org_type: industry
  region: UK
  why: Compute-optimal scaling law behind every 'under/over-trained?' judgement.
  description: The 2022 DeepMind paper that re-derived compute-optimal scaling for language models and showed that Gopher-class systems were undertrained relative to their parameter count — for a fixed FLOP budget, tokens and parameters should scale roughly in tandem rather than scaling parameters alone. Chinchilla itself, with 70B parameters trained on 1.4T tokens, outperformed the 280B Gopher. The result reset what counts as a well-trained model and made it possible to ask, of any biology FM, whether its parameter-to-token ratio is close to compute-optimal or wildly off. Every later judgement that scGPT or Evo is undertrained, or that AlphaFold 3 over-spends parameters relative to PDB-sized data, traces back to this curve. The open caveat is that compute-optimality assumes a stationary loss landscape — for biology data with heavy assay-specific noise, the optimal point may sit elsewhere entirely.
  qa:
    did: 'Hoffmann and colleagues re-derived compute-optimal scaling laws for transformer language models in 2022, showing that Gopher-class systems were undertrained relative to parameter count, and trained Chinchilla — 70B parameters on 1.4T tokens — which outperformed the 280B-parameter Gopher under the same compute budget.'
    purpose: 'DeepMind set out to fix a systematic error in the Kaplan-era scaling rules that biased the field toward over-parameterised, undertrained models. Getting the parameter-to-token ratio right mattered because it changed how every subsequent FM budget — including biology FMs like scGPT, Evo and AlphaFold 3 — should be allocated.'
    method: 'Three independent estimation strategies — IsoFLOP profiles, varying model size at fixed FLOPs, and parametric fits to training loss — were combined to recover the optimal scaling exponents. The team then ran the Chinchilla validation pretraining at 70B parameters and 1.4T tokens to test the predicted point.'
    result: 'Chinchilla outperformed Gopher across language benchmarks at a quarter of the parameter count, with the new scaling rule prescribing roughly tokens-and-parameters in tandem rather than parameters alone. The result reset what counts as well-trained and is now the curve behind every under-trained-or-not judgement on biology FMs.'
- id: epoch-ai-training-compute
  kind: commentary
  modality: other
  name: Epoch AI — estimating training compute
  venue: Epoch AI blog
  url: https://epoch.ai/blog/estimating-training-compute
  topics:
  - scaling-laws
  - foundation-model
  status: published
  org_type: outlet
  region: global
  why: FLOPs ≈ 6 × params × tokens heuristic the talk's cost estimates use.
  description: A working blog post from Epoch AI laying out the back-of-envelope arithmetic for estimating training compute of a transformer model — chiefly the FLOPs ≈ 6 × params × tokens identity that underwrites almost every public cost estimate for frontier models. It is the reference the talk leans on when converting a stated parameter count and token budget into a dollar figure or an emissions number. Epoch maintains accompanying datasets and dashboards tracking model size, training compute, and dataset scale across the frontier, which is the only public source most biology audiences have when trying to put scGPT or Evo on the same axis as GPT-class systems. The contested bit is that the 6× constant elides activation recomputation, MoE sparsity, and mixed-precision savings, so any single number is best treated as an order-of-magnitude.
- id: cottier-frontier-costs-2024
  kind: paper
  modality: other
  name: The Rising Costs of Training Frontier AI Models
  authors: Cottier, Rahman et al.
  venue: arXiv
  year: 2024
  url: https://arxiv.org/abs/2405.21015
  topics:
  - scaling-laws
  - foundation-model
  status: preprint
  org_type: outlet
  region: global
  why: Economic backdrop for the compute-disclosure argument.
  description: 'A 2024 Epoch AI preprint quantifying the rising dollar cost of frontier model training, breaking out hardware, energy and staff, and projecting a trajectory in which leading runs cross the hundred-million and then billion-dollar marks within a few years. For the FM-to-virtual-cells argument it provides the economic backdrop that makes compute-disclosure a substantive demand rather than a hygiene gesture: if a Chinchilla-optimal cell FM costs eight figures to train, the question of who can afford to retrain when assays change is not academic. The contested point is methodological — the paper estimates fully-loaded costs from public proxies, and the labs running the actual jobs rarely confirm or deny. Useful as the citation behind any ''why does compute transparency matter'' framing in biology FM talks.'
- id: consens-genome-lm-2025
  kind: review
  modality: dna-seq
  name: Genome language models
  authors: Consens et al.
  venue: Nature Machine Intelligence
  year: 2025
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: academic
  region: global
  why: Review of transformer architectures for DNA.
  description: 'A 2025 review of transformer-based language models applied to DNA, covering the architectural lineage from DNABERT through Nucleotide Transformer to Evo and AlphaGenome-adjacent systems. It catalogues tokenisation strategies — k-mer, byte-pair, single-nucleotide — and the associated context-length and inductive-bias trade-offs, alongside pretraining objectives (masked, causal, span). Useful as an entry point for the gap between protein-LM and genome-LM design choices, since the latter has to confront much longer effective contexts and weaker functional supervision. The open thread the review highlights is evaluation: most genome LMs are still scored on a thin slate of regulatory and variant-effect tasks, and the field has not converged on a benchmark with the discriminative power of CASP or ProteinGym. Reads naturally alongside the state-space alternative literature.'
- id: tiezzi-transformers-state-space-2025
  kind: review
  modality: other
  name: Transformers vs state-space models
  authors: Tiezzi et al.
  venue: Nature Machine Intelligence
  year: 2025
  topics:
  - state-space
  - foundation-model
  status: published
  org_type: academic
  region: global
  why: Transformer / recurrent / state-space crossroads.
  description: A 2025 review situating transformers, modern RNNs and state-space models (Mamba, S4, RWKV and successors) as competing approaches to long-context sequence modelling, with a sober look at where each architecture currently has the edge. Relevant to biology because the question of whether to bet on quadratic-attention transformers or sub-quadratic state-space models is live for genome and long-protein FMs — Evo 2 and a wave of 2025 genomic SSMs have made the trade-off concrete. The review walks through expressivity results, hardware behaviour at long contexts, and the empirical wash on language benchmarks. The contested point is whether the gap closes or widens once context grows past the 100k-token range where transformer KV-cache costs become punishing — exactly the regime whole-chromosome and whole-cell modelling will need.
- id: hunklinger-ferruz-2026
  kind: review
  modality: proteomic
  name: Protein-LM explainability
  authors: Hunklinger & Ferruz
  venue: Nature Machine Intelligence
  year: 2026
  topics:
  - interpretability
  - protein
  status: published
  org_type: academic
  region: EU
  why: Review of interpretability methods for protein FMs.
  description: 'A 2026 review of interpretability methods for protein foundation models from the Ferruz group, covering attention probing, mechanistic interpretability, sparse autoencoders, and structure-based attribution as applied to ESM, ProtT5, SaProt and design-oriented models like ProteinMPNN. Frames the question of whether a protein FM has learned biologically meaningful features — secondary structure, contacts, evolutionary constraints — versus statistical shortcuts. Sits alongside the AlphaFold interpretability subfield as the literature researchers cite when arguing that protein FMs are not pure black boxes. The contested bit is whether any of these methods generalise: sparse autoencoders on ESM have produced compelling per-feature stories, but it is not yet clear that the discovered features are stable across model scales or pretraining seeds. A useful starting point for anyone trying to build the same interpretability stack for single-cell FMs.'
- id: irm-arjovsky-2019
  kind: paper
  modality: other
  name: Invariant Risk Minimisation
  authors: Arjovsky et al.
  venue: arXiv
  year: 2019
  topics:
  - causal
  - foundation-model
  status: preprint
  org_type: industry
  region: US
  why: Causal-objective method cited as basis for counterfactual pretraining.
  description: 'The 2019 Invariant Risk Minimisation paper from FAIR (Arjovsky and colleagues) proposing a training objective that prefers representations whose optimal predictor is the same across environments, as a route around spurious correlations. IRM and its critics seeded a substantial line of out-of-distribution-generalisation work and is now cited as the conceptual basis for counterfactual or causal pretraining objectives in biology FMs — the argument being that scFMs which learn batch-confounded features will fail exactly the compositional splits Hetzel-style benchmarks expose. The contested status is well known: follow-up work showed IRM''s empirical claims do not hold in many settings and that ERM with strong regularisation is hard to beat. Still, it is the reference behind most current proposals for causal pretraining of cell foundation models, and worth reading before betting on that direction.'
  qa:
    did: 'Arjovsky and colleagues at FAIR introduced Invariant Risk Minimisation in 2019 — a training objective that prefers representations whose optimal predictor is the same across training environments — as a route around spurious correlations and a foundation for out-of-distribution generalisation work later cited by biology FM proposals.'
    purpose: 'The goal was to formalise when a model learns causal structure rather than environment-specific shortcuts. The biology stakes are direct — scFMs that absorb batch-confounded features fail exactly the compositional held-outs that Hetzel-style benchmarks expose, so the IRM framing is the conceptual backbone for counterfactual pretraining.'
    method: 'IRM adds a penalty to standard empirical-risk minimisation that forces the optimal classifier on each training environment to coincide, yielding a bi-level optimisation. The training procedure partitions data by environment label and penalises gradient discrepancy on the per-environment optimal predictors during joint training.'
    result: 'IRM became the canonical reference for invariance-based OOD generalisation, seeding a substantial follow-on literature. Critics later showed its empirical claims do not survive many settings and that ERM with strong regularisation is hard to beat — leaving IRM as a conceptually load-bearing but empirically contested foundation.'
- id: van-amersfoort-uq-2024
  kind: paper
  modality: other
  name: Deep deterministic UQ
  authors: van Amersfoort et al.
  year: 2024
  topics:
  - clinical
  - eval
  status: published
  org_type: academic
  region: UK
  why: Uncertainty-quantification method for the clinical-grade-FM track.
  description: A 2024 uncertainty-quantification method from the Oxford group, in the lineage of deep deterministic uncertainty and DUQ-style single-pass UQ — designed to give calibrated predictive uncertainty from a single forward pass without the cost of deep ensembles or full Bayesian inference. Relevant to the clinical-grade FM track because deployment in any decision-support setting requires per-prediction confidence with bounded latency, and Monte Carlo dropout or ensembling are awkward at FM scale. Pairs with the Angelopoulos-Bates conformal track as the two main UQ idioms biology FMs are likely to inherit. The open question is whether single-pass UQ remains calibrated under the distribution shift that defines clinical deployment — most published evaluations are in-distribution, and biology FMs are routinely asked to predict on tissues, assays or populations the pre-training set never saw.
  qa:
    did: 'The Oxford group around van Amersfoort published a 2024 deterministic uncertainty-quantification method, in the deep-deterministic-uncertainty and DUQ lineage, that delivers calibrated predictive uncertainty from a single forward pass — sidestepping the cost of deep ensembles or full Bayesian inference at foundation-model scale.'
    purpose: 'The motivating problem is clinical deployment — any decision-support setting needs per-prediction confidence with bounded latency, and Monte Carlo dropout or ensembling are awkward when the base model is a billion-parameter scFM or protein LM. Single-pass UQ is the only path that scales without inflating inference cost.'
    method: 'The approach learns a deterministic feature extractor with a centroid-based distance head, where distance to class centroids in feature space supplies the uncertainty signal at inference. A gradient-penalty regulariser keeps the feature map bi-Lipschitz so distances remain meaningful, all without sampling or ensembles.'
    result: 'The method achieves competitive calibration against ensemble baselines at a fraction of the inference compute and pairs naturally with the Angelopoulos-Bates conformal track as the two UQ idioms biology FMs are likely to inherit. Open question — whether single-pass calibration survives the distribution shift that defines real clinical deployment.'
- id: conformal-angelopoulos-bates-2023
  kind: paper
  modality: other
  name: Conformal prediction
  authors: Angelopoulos & Bates
  year: 2023
  topics:
  - eval
  - clinical
  status: published
  org_type: academic
  region: US
  why: Distribution-free uncertainty paired with the UQ track.
  description: 'The 2023 gentle introduction to conformal prediction by Angelopoulos and Bates, which has become the default reference for distribution-free uncertainty quantification in machine learning. Conformal prediction wraps any black-box model to produce prediction sets with finite-sample coverage guarantees, conditional only on exchangeability. For biology FMs the appeal is that the guarantee survives whether the underlying model is scGPT, AlphaFold or a tabular gradient-boosted predictor — useful when the deployment context is clinical and the regulator wants a calibration story. Sits naturally alongside the van Amersfoort single-pass UQ track as the second pillar of the clinical-grade FM UQ literature. The catch is the exchangeability assumption: conformal sets lose their guarantees under the kind of structural distribution shift that defines real clinical rollout, and the adaptive-conformal extensions that try to recover them are still actively contested.'
  qa:
    did: 'Angelopoulos and Bates published a 2023 gentle introduction to conformal prediction that became the default reference for distribution-free uncertainty quantification — wrapping any black-box model to produce prediction sets with finite-sample coverage guarantees conditional only on exchangeability, applicable across scGPT, AlphaFold or tabular gradient-boosted predictors.'
    purpose: 'The introduction made conformal prediction tractable for practitioners by replacing the older theoretical literature with worked recipes and code. For biology FMs the appeal is regulator-friendly calibration — a finite-sample coverage guarantee that does not depend on knowing the underlying model class or having access to its likelihood.'
    method: 'Split-conformal prediction reserves a calibration set, scores nonconformity of model outputs against held-out labels, then constructs prediction sets at any user-chosen miscoverage rate using the empirical quantile of calibration scores. Extensions cover classification, regression, multi-label and adaptive variants for distribution shift.'
    result: 'The tutorial established conformal prediction as the second UQ pillar alongside single-pass deterministic methods, with adoption across clinical ML, drug-discovery and protein-FM deployment stories. Coverage guarantees fail under exchangeability violations — the structural distribution shifts that define clinical rollout — leaving adaptive-conformal extensions as the actively-contested frontier.'
