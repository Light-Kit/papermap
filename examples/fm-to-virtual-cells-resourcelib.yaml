  description: Graph-based perturbation-effect prediction model from a US academic group, published in Nature Biotechnology in 2024, and the pre-foundation-model state of the art on this task. GEARS conditions predictions on a gene-gene knowledge graph, letting it generalise to unseen perturbations by leveraging structural similarity to perturbations the model has seen. That inductive bias is exactly what single-cell foundation models are trying to learn implicitly from data, which is why GEARS keeps appearing in the reckoning papers as the bar to clear. Its performance on combinatorial perturbations made it the default baseline for compositional generalisation. The open question is how durable the graph-prior approach is as perturbation datasets scale; for now GEARS is a small, well-understood model that the much larger FMs struggle to consistently beat.
  qa:
    did: 'GEARS is a graph-based perturbation-effect prediction model from a US academic group, published in Nature Biotechnology in 2024, and the pre-foundation-model state of the art on this task. It conditions predictions on a gene-gene knowledge graph, letting the model generalise to unseen perturbations by leveraging structural similarity to perturbations seen in training.'
    purpose: 'The aim was to inject an explicit gene-gene graph prior so that the model could generalise to perturbations it has never seen by routing predictions through structural neighbours in the knowledge graph. That inductive bias is exactly what single-cell foundation models are trying to learn implicitly from data, making GEARS the natural bar for FM evaluations.'
    method: 'GEARS conditions perturbation-effect predictions on a gene-gene knowledge graph and learns to propagate effect signal across graph neighbours, letting structurally similar perturbations share information during training and inference. The model is trained to predict transcriptional responses for both single perturbations and combinatorial doubles using the same graph-conditioned architecture.'
    result: 'GEARS set the pre-FM SOTA on perturbation-effect prediction and on combinatorial perturbations became the default baseline for compositional generalisation. The reckoning literature keeps citing it as a bar large sc-FMs struggle to consistently beat, with the open question being how durable the graph-prior approach is as perturbation datasets continue to scale.'
