    purpose: 'The aim is to push generative protein design from sequence-only models toward systems that condition on a target structure and propose binders end to end, competing with RFdiffusion-style pipelines on the same downstream task. The headline metric — wet-lab hit rate, not benchmark accuracy — reflects the bar the field is moving toward.'
    method: 'The Complexa variant conditions generation on a target protein structure and proposes candidate binders end to end, integrating structure-aware conditioning into a generative protein-design foundation model. Validation rests on wet-lab measurements of designed binders rather than purely computational benchmarks, mirroring the experimental-validation standard the field is adopting.'
    result: 'Complexa reported a 63.5% wet-lab hit rate on PDGFR binders, unusually high for de novo binder design where double-digit rates have been considered strong. As a preprint the result needs independent reproduction, and questions remain about generalisation beyond PDGFR-class targets and behaviour on harder undruggable surfaces.'
