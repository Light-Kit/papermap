  region: US
  why: Multi-organ human single-cell reference atlas.
  description: 'Multi-organ human single-cell reference atlas published in 2022 by the Tabula consortium, providing harmonised single-cell transcriptomic profiles across a wide range of human tissues from a small number of well-characterised donors. Its enduring value is as a within-donor multi-tissue reference, which is rare in the public single-cell ecosystem and which makes it useful for benchmarking cross-tissue annotation, cell-type mapping, and integration methods. It is a routine reference dataset for single-cell foundation models, both as training material and as a validation substrate for cell-type-transfer evaluations. Open questions concern coverage: the donor count is small, the demographic representation is limited, and the field is now generating much larger atlases that may eventually displace Tabula Sapiens for primary use while keeping it as a reference for harmonisation experiments.'
- id: cellxgene-census
  pinned: true
  kind: dataset
  modality: single-cell-rna
