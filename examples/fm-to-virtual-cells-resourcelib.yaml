  - perturbation-prediction
  - single-cell
  status: preprint
  org_type: academic
  region: global
  why: Second front in the perturbation-evaluation reckoning — Wasserstein/Energy distances mislead in high-dim gene space.
  papermap_category: reckoning
  description: 'A 2026 bioRxiv preprint opening a second front in the perturbation-evaluation reckoning, arguing that the Wasserstein and energy distances now standard for scoring perturbation-prediction models are systematically misleading in high-dimensional gene-expression space. The work shows that distributional distances can rank a poor model above a strong one simply because the curse of dimensionality flattens the signal, undermining benchmarks built around them, including the metrics used in several recent flow-matching and diffusion comparisons. It complements the linear-baseline critiques from 2025 by attacking the metric layer rather than the model layer. As a preprint without an institutional anchor in the metadata, it carries the usual caveats. The open question is what replacement metrics survive scrutiny: marginal-wise scoring, classifier two-sample tests, and embedding-space distances are all candidates, but the field has not converged.'
