    result: 'As an open release from BGI Research it is reusable and well-positioned to grow as new scLLMs appear. The open question is which evaluation protocols become the community defaults inside BioLLM, since the choice of held-out splits and metrics will largely determine which models look strong over the next benchmarking cycle.'
- id: assaybench
  kind: benchmark
  modality: single-cell-rna
  name: AssayBench
  url: https://arxiv.org/abs/2605.10876
  topics:
  - eval
  - benchmark
  - foundation-model
  - agents
  why: 1,920 public CRISPR screens evaluated as gene-rank prediction with adjusted nDCG; zero-shot general LLMs outperform biology-specific scFMs and trainable baselines (arXiv, 2026).
  papermap_category: reckoning
  year: 2026
  venue: arXiv preprint
  status: preprint
  description: 'AssayBench is an assay-level virtual-cell benchmark released in May 2026 by a Genentech / Mila team (De Brouwer, Edwards, Scalia and colleagues) that converts 1,920 publicly available CRISPR screens spanning five broad classes of cellular phenotypes into a single gene-rank prediction task with an adjusted nDCG metric. The headline empirical finding is striking: zero-shot general-purpose LLMs outperform biology-specific foundation models and trainable baselines on phenotypic screen prediction, and standard optimisation moves (fine-tuning, ensembling, prompt-optimisation) widen rather than close the gap. The contribution sits in the same reckoning lineage as the Virtual Cell Challenge and the perturbation-prediction-vs-baselines paper, but at a different layer of the stack — phenotype rather than transcriptome — and with a different verdict: not that the FMs are wrong, but that the LLMs are unexpectedly strong on the assay-prediction framing. The open question is whether assay-level benchmarks should now be the default first comparison every new scFM is asked to beat.'
  qa:
    did: 'AssayBench is an assay-level virtual-cell benchmark released in May 2026 by a Genentech / Mila team that converts 1,920 publicly available CRISPR screens spanning five broad classes of cellular phenotypes into a single gene-rank prediction task with an adjusted nDCG metric, and evaluates LLMs, agentic systems, and biology-specific foundation models against it.'
    purpose: 'The aim was to fill a missing benchmark slot: existing evaluations of virtual-cell models focus on molecular-level prediction, leaving the phenotypic-screen layer — which is closer to what drug-discovery workflows actually consume — without a standardised comparison framework. AssayBench was designed to make heterogeneous CRISPR screen outcomes scoreable under a single metric.'
    method: '1,920 public CRISPR screens were unified into a gene-rank prediction task, with adjusted nDCG introduced as a continuous evaluation metric that accommodates heterogeneous assays without forcing them into a single threshold. Zero-shot general LLMs, biology-specific foundation models, trainable baselines, and agentic systems were evaluated under identical splits, with downstream optimisation (fine-tuning, ensembling, prompt-optimisation) applied to the LLM track.'
    result: 'Existing methods fall short of estimated performance ceilings, zero-shot general LLMs outperform biology-specific foundation models and trainable baselines on phenotypic screen prediction, and the optimisation moves widen rather than close the gap. The result became the 2026 anchor citation for the case that LLMs are unexpectedly strong at the assay-prediction framing, sitting alongside the Virtual Cell Challenge and perturbation-prediction-vs-baselines in the broader reckoning literature.'
- id: human-cell-atlas
  kind: dataset
  modality: single-cell-rna
  size: '70.8M cells × 11.2K donors × 530 projects'
  license: 'CC-BY-4.0'
  access: 'open'
  name: Human Cell Atlas
  url: https://data.humancellatlas.org/
  topics:
  - single-cell
  why: Community effort mapping all human cell types with 70M+ cells across tissues and developmental stages.
  description: 'The Human Cell Atlas is the community effort to map every human cell type across tissues, developmental stages, and ages, currently holding more than 70 million single cells from hundreds of contributing studies. The data portal is the practical entry point for anyone training a single-cell foundation model, since the atlas''s curation and metadata standards have effectively defined what publishable pretraining data looks like over the last several years. For the virtual-cell stack the atlas is the substrate: nearly every scLLM, integration model, and reference-mapping tool of the 2022-2026 generation has been pretrained or evaluated against some subset of it. As a living consortium effort it continues to grow and to set governance norms for sharing. The open question is whether atlas growth keeps pace with the appetite of frontier models, and whether the next round of pretraining will require harder-to-collect modalities like single-cell proteomics or spatial data at comparable scale.'
- id: tisch2
  kind: dataset
  modality: single-cell-rna
  size: '~6M cells, 190 datasets, 50+ cancer types'
  license: 'CC-BY-NC'
  access: 'open'
  name: TISCH2
  url: http://tisch.comp-genomics.org/
  topics:
  - single-cell
  why: Curated single-cell tumor microenvironment atlas with 190 datasets covering 50+ cancer types and pre-annotated cell types.
  description: 'TISCH2 is a curated single-cell tumour microenvironment atlas that aggregates roughly 190 datasets across more than 50 cancer types with pre-annotated cell-type labels, designed so that researchers can pull tumour scRNA-seq for a specific cancer context without re-running the per-study preprocessing. The value is curation rather than novelty: the underlying studies are public, but the harmonised annotations and consistent loading conventions make TISCH2 the practical default for any oncology-focused virtual-cell project or benchmark. For the wider library it sits in the same category as CELLxGENE and the HCA portal — infrastructure that lowers the cost of building on existing data. The open question is how the harmonised annotations hold up against newer ontology releases and whether TISCH2 commits to the upkeep, since curated atlases tend to drift out of date quickly without active maintenance from the host group.'
- id: tcga
  kind: dataset
  modality: bulk-rna
  size: '11,000+ patients × 33 cancer types (bulk RNA-seq + clinical)'
  license: 'custom'
  access: 'restricted'
  name: TCGA
  url: https://portal.gdc.cancer.gov/
  topics:
  - single-cell
  why: Bulk RNA-seq plus clinical outcome data for 11,000+ patients across 33 cancer types.
  description: The Cancer Genome Atlas (TCGA) is the bulk RNA-seq, methylation, mutation, and clinical-outcome resource covering more than 11,000 patients across 33 cancer types, distributed through the GDC portal. Despite predating single-cell methods, TCGA remains structurally important to the virtual-cell agenda because it is the largest public dataset that pairs molecular measurements with clinical outcomes, which is what most virtual-cell models eventually need to validate against. Bulk-to-single-cell deconvolution methods, survival models built on patient embeddings, and many drug-response predictors trace back to TCGA as ground truth. For a working researcher it is the default citation whenever clinical relevance has to be demonstrated rather than just claimed. The open question is whether TCGA's bulk-and-clinical regime continues to anchor the validation layer, or whether newer cohorts with single-cell, spatial, and longitudinal data displace it over the next several years.
- id: depmap
  kind: dataset
  modality: multimodal
  size: '1,000+ cancer cell lines, multi-omic + CRISPR + drug response'
  license: 'CC-BY-4.0'
  access: 'open'
  name: DepMap
  url: https://depmap.org/
  topics:
  - single-cell
  why: Cell line omics, drug response, and genetic dependency data for 1,000+ cell lines from the Cancer Dependency Map project.
  description: 'DepMap, the Cancer Dependency Map, provides multi-omic cell-line profiles, drug-response measurements, and CRISPR genetic-dependency scores for more than 1,000 cancer cell lines. For the virtual-cell agenda it is the substrate that most drug-target and synthetic-lethality predictors are evaluated against, because the paired genetic-dependency and pharmacological data are unusually clean and the cell-line coverage is broad enough for genuine train-test splits. Many of the perturbation-prediction methods in this library use DepMap either as training data or as validation, and the CRISPR essentiality calls are the de facto ground truth for in-silico knockout simulations on tumour contexts. The open question is the gap between cell-line biology and patient biology: DepMap predictors can score well in-distribution and fail in-clinic, and the virtual-cell community has not yet settled on a standardised way to test that gap, which limits how much weight DepMap-only validation can carry.'
- id: sc-pert
  kind: dataset
  modality: single-cell-rna
  size: 'curated Perturb-seq datasets in h5ad format'
  license: 'unknown'
  access: 'open'
  name: sc-pert
  url: https://github.com/theislab/sc-pert
  topics:
  - single-cell
  why: Curated perturbation datasets in standardized h5ad format from the Theis lab, covering major Perturb-seq studies.
  description: 'sc-pert is a curated collection of perturbation datasets from the Theis lab, redistributed in standardised h5ad format and covering the major Perturb-seq studies that the field benchmarks against. The contribution is infrastructural rather than novel science: by handling the inconsistencies in how different Perturb-seq studies report guide assignments, dosing, and metadata, sc-pert removes one of the most tedious blockers to running a fair cross-study evaluation. That has made it a common starting point for methods papers that need to demonstrate generalisation across Perturb-seq sources rather than within a single study. For a working researcher it is the right default for assembling perturbation-prediction benchmark suites. The open question is how the collection keeps pace as new Perturb-seq atlases land at increasing scale, and whether maintenance stays with the Theis lab or migrates into a broader scverse-style community effort with shared upkeep.'
- id: l1000-cmap
  kind: dataset
  modality: bulk-rna
  size: '1.3M L1000 transcriptional profiles, 978-gene panel'
  license: 'custom'
  access: 'open'
  name: L1000/CMap
  url: https://clue.io/
  topics:
  - single-cell
  why: Connectivity Map with 1M+ transcriptional response profiles to chemical and genetic perturbations.
  description: The Connectivity Map (CMap), particularly its L1000 expansion, holds more than one million transcriptional response profiles to chemical and genetic perturbations measured on a reduced 978-gene panel, accessible through the clue.io portal. Despite the reduced gene panel, the scale and the breadth of perturbations make it the largest perturbation-response resource available, and it remains a common training and evaluation source for drug-response prediction, mechanism-of-action inference, and connectivity-based repurposing. For the virtual-cell stack it is the bulk-perturbation counterpart to the single-cell Perturb-seq atlases collected in sc-pert. The well-known caveat is that L1000 profiles are bulk, low-dimensional, and noisy compared to modern scRNA-seq, which bounds what models trained on it can learn. The open question is whether CMap-style coverage will ever be reproduced at single-cell resolution or whether L1000 remains the only large-scale perturbation atlas of its kind.
- id: spatialdb
  kind: dataset
  modality: spatial
  size: '24 datasets / 305 sub-datasets, 5 species, 8 ST platforms'
  license: 'unknown'
  access: 'open'
  name: SpatialDB
  url: https://www.spatialomics.org/SpatialDB/
  topics:
  - single-cell
  why: Curated collection of 100+ spatial transcriptomics datasets across platforms and tissues.
  description: 'SpatialDB is a curated collection of more than 100 spatial transcriptomics datasets spanning the major commercial platforms — Visium, Slide-seq, MERFISH, and others — and a broad range of tissues. As infrastructure, its role is to make the spatial-omics field benchmarkable: spatial transcriptomics has historically suffered from per-platform data formats and per-study annotation conventions, and a curated cross-platform index reduces the cost of any analysis that needs to compare across studies. For the virtual-cell agenda spatial data are the modality that most current single-cell foundation models do not handle, so a usable cross-platform dataset registry is a precondition for the next generation of spatial-aware models. The open question is how SpatialDB keeps up with platform churn — Xenium and CosMx generate data faster than older curation pipelines were designed for — and whether maintenance keeps pace with the deposition rate over the next few years.'
- id: cz-virtual-cells-platform
  kind: tool
  modality: single-cell-rna
