- id: llms-meet-virtual-cells
  kind: paper
  name: LLMs Meet Virtual Cells
  url: https://arxiv.org/abs/2502.10206
  topics:
  - virtual-cell
  - foundation-model
  why: Survey of how large language models are being applied to virtual cell challenges including perturbation prediction and cell state modeling.
  papermap_category: position
  description: 'An arXiv survey examining how large language models are being applied to virtual-cell challenges, covering perturbation prediction, cell-state modelling, and the broader question of whether LLM-style sequence modelling transfers to cellular data. The review sits at the intersection of two literatures that mostly developed in parallel: the single-cell foundation model wave around scGPT, Geneformer, and scFoundation, and the protein and genomic LLM lineage around ESM and Evo. By treating LLM-for-cells as a coherent category, it makes the design choices — tokenisation, vocabulary, masking objective, ranked versus binned expression — easier to compare across systems. As a survey it is most useful as an entry point for readers new to the area rather than as a source of new results. The open question the field still owes a clean answer to is whether the LLM framing is essential or whether simpler embedding methods suffice.'
- id: virtual-cells-hype-or-hope
  kind: paper
  name: 'Virtual Cells: Hype or Hope?'
  url: https://arxiv.org/abs/2502.10980
  topics:
  - virtual-cell
  - foundation-model
  why: Survey examining the current state of virtual cell research with critical assessment of progress and limitations.
  papermap_category: position
  description: 'An arXiv survey that takes a deliberately critical look at the state of virtual-cell research, weighing claimed progress against actual benchmark results and identifying where the agenda has overpromised. The framing — hype or hope — signals that the authors do not treat the scaling pitch of the AI Virtual Cell community as self-evidently correct, and they walk through the recurring failure modes: weak baselines, contamination between training and test perturbations, and metrics that flatter generative models. As such it functions as a useful counterweight to the more enthusiastic position papers from the AIVC and CZI camps, and pairs naturally with the 2025 Nature Methods linear-baseline critique. The open question the survey leaves explicit is which subset of the virtual-cell agenda has empirical backing strong enough to survive a decade rather than a hype cycle, and the authors decline to declare a winner.'
- id: scvi
  kind: tool
  name: scVI
  url: https://github.com/scverse/scvi-tools
  topics:
  - foundation-model
  - single-cell
  why: VAE-based generative model that sidesteps the tokenization problem entirely; the practical workhorse for batch integration and the foundation for the scvi-tools ecosystem (Nature Methods, 2018).
  papermap_category: scfm
  year: 2018
  venue: Nature Methods
  status: published
  description: scVI is a VAE-based generative model for single-cell RNA-seq introduced in Nature Methods in 2018 that sidesteps the tokenisation problem entirely by treating gene-expression vectors as continuous observations with a negative-binomial likelihood. It became the practical workhorse for batch integration and the foundation of the scvi-tools ecosystem, which now hosts totalVI for CITE-seq, scANVI for label transfer, and a long tail of related models. For the virtual-cell conversation it matters as the baseline that transformer-based scLLMs must beat to justify their parameter counts, and through 2024-2025 a non-trivial fraction of comparisons have shown scVI or its variants holding their own on integration and label transfer. Maintained by the scverse community, it remains under active development. The open question is whether the next generation of VAE variants, particularly those with structured priors or causal layers, will continue to keep pace with attention-based alternatives.
- id: scimilarity
  kind: tool
