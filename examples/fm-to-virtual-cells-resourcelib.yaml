    purpose: 'The aim was to ask whether scGPT''s headline perturbation-prediction numbers held under correctly constructed train-test splits. Naming the leakage was the precondition that let every downstream evaluation re-run perturbation comparisons with stricter splits, and is what turned the reckoning into something with reproducible teeth rather than scattered scepticism.'
    method: 'The original scGPT perturbation evaluation is replicated with attention paid to overlap between train and test perturbations, then re-run with leakage-controlled splits that exclude any perturbation appearing on both sides. Scoring is otherwise matched to the original protocol so the comparison isolates the leakage effect rather than confounding it with new metrics.'
    result: 'Under the leakage-controlled splits the scGPT perturbation-prediction advantage shrinks or disappears, supporting the reckoning case that the original headline numbers were inflated by train-test overlap. The result anchors the perturbation half of the 2025-2026 reckoning and shaped every downstream evaluation that took perturbation comparisons seriously, including Wenkel and Ahlmann-Eltze.'
