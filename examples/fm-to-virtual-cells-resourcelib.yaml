  description: '2020 review surveying the open problems in single-cell genomics analysis just before the foundation-model wave reframed the field. The value of going back to this paper is that it documents what the community thought needed solving (batch effects, doublet detection, trajectory inference, integration across modalities) and how it expected to solve it (specialised statistical methods, mostly), which gives you a clean baseline for assessing what the sc-FM era has and has not delivered. Read alongside the 2025 reckoning literature, it makes the contrast sharper: many of the listed challenges remained genuinely hard, and the foundation-model approach addressed some (integration) but not others (causal perturbation prediction). Useful as the pre-FM landscape framing that newer overviews tend to take for granted, and as a check against narratives that the FM wave was the only path forward for the discipline.'
