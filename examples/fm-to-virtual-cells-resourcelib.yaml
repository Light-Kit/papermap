  name: Enformer
  venue: Nature Methods
  year: 2021
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: industry
  region: UK
  why: Pre-FM-era gene-expression-from-sequence model.
  papermap_category: other_fm
  description: Pre-foundation-model-era gene-expression-from-sequence model from DeepMind, published in 2021. It used a transformer with long-range attention to predict cell-type-resolved expression and chromatin tracks directly from genomic DNA at roughly 100-kb context, and for several years it set the bar on variant-effect tasks that GWAS, eQTL, and rare-variant studies care about. Most of the genomic foundation models that followed Enformer either tried to scale its context window, swap in state-space architectures, or unify more output modalities under a single backbone. It is also notable as one of the cleanest examples of a sequence-to-function model whose embeddings turned out to be useful far outside the original task. It has now been largely subsumed by AlphaGenome at 1-Mb context but remains the natural baseline against which any new sequence-to-function model is measured, and a lot of downstream pipelines still ship with Enformer embeddings as features.
  qa:
    did: 'Enformer is the pre-foundation-model-era gene-expression-from-sequence model from DeepMind, published in 2021. It predicts cell-type-resolved expression and chromatin tracks directly from genomic DNA at roughly 100-kilobase context using a transformer with long-range attention, setting the bar for sequence-to-function modelling on variant-effect tasks.'
    purpose: 'The aim was to predict regulatory genomics tracks directly from raw DNA at a context long enough to capture distal regulation. The downstream target was variant-effect prediction for GWAS, eQTL, and rare-variant studies, where a model that maps sequence to expression delivers immediate value to human-genetics pipelines.'
    method: 'The architecture is a transformer with long-range attention spanning roughly 100 kilobases of input DNA. The model is trained to predict cell-type-resolved expression and chromatin tracks, producing embeddings that subsequent groups repurposed for tasks far outside the original output set including downstream prediction pipelines.'
    result: 'Enformer set the bar on variant-effect tasks for several years and remained the natural baseline against which any new sequence-to-function model is measured. It has now been largely subsumed by AlphaGenome at 1-megabase context, but Enformer embeddings still ship as features in many downstream pipelines.'
