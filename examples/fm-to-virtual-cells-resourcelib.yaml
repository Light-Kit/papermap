    did: 'scPerturBench is a perturbation-prediction benchmark from a European academic group, distinguished by its emphasis on adversarial perturbation and cell-type splits that stress out-of-distribution generalisation. It became one of the benchmarks the 2025-2026 reckoning literature uses to show that single-cell foundation models often do not beat much simpler baselines under stress.'
    purpose: 'The aim is to design splits that are diagnostic rather than permissive — random splits make perturbation models look much better than they are, and the adversarial framing exposes the gap between in-distribution performance and the out-of-distribution generalisation that actually matters for downstream science applications.'
    method: 'The benchmark constructs adversarial perturbation and cell-type splits explicitly chosen to stress out-of-distribution generalisation, contrasting with random splits used by more permissive benchmarks. Methods are evaluated on the same predictions but against held-out perturbations or cell types that share no obvious training-time analogue, raising the bar substantially.'
    result: 'scPerturBench serves as the benchmark the post-2024 sc-FM reckoning literature uses to show foundation models often fail to clearly beat simpler baselines under stress, making it more diagnostic than permissive alternatives. Open questions are how to define adversarial splits that stay biologically meaningful and how to interpret the random-versus-adversarial split gap.'
- id: vcc-2025-portal
  kind: competition
  modality: single-cell-rna
  name: CZ Biohub Virtual Cell Challenge 2025
  url: https://virtualcellchallenge.org/
  topics:
  - virtual-cell
  - eval
  - perturbation-prediction
  status: launched
  org_type: foundation
  region: US
  why: First community virtual-cell benchmark, $50k prize.
  description: 'Portal for the Virtual Cell Challenge, a community competition framed as the first benchmark of its kind for virtual-cell models, run by the foundation backing the broader virtual-cell programme with a $50,000 prize. The competition matters as much for the social effect as for the metric: it gives the virtual-cell community a single public venue where models can be compared on a defined task with held-out evaluation, which is exactly the missing piece that has made it hard to talk about progress in this area without each lab citing its own internal benchmark. The prize is small relative to the compute many entrants will spend, but the leaderboard is the more durable artefact. Open questions are about how the task and the evaluation will evolve in future iterations and how representative the chosen benchmark is of what virtual cells are supposed to deliver.'
- id: tahoe-100m
  pinned: true
  kind: dataset
  modality: single-cell-rna
  size: '100M cells × 1,100 drugs × 50 cancer lines'
  license: 'CC0-1.0'
