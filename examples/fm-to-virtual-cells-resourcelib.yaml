    result: 'The system outperformed physicians on rare-disease cases in a peer-reviewed Nature evaluation, making DeepRare the strongest published evidence that the agentic-FM intersection is clinically viable. The same pattern shows up in Owkin''s Pathology Explorer and PathChat-DX, but DeepRare provided the headline diagnostic-accuracy result.'
