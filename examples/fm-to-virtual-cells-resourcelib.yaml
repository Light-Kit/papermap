  description: 'US biotech building pathology foundation models, notable as the first AI-FM company to be acquired by big pharma when AstraZeneca announced the deal at JPM 2026. The acquisition is a marker for the pathology vertical specifically: it is the first FM-bio segment where a clear clinical pathway, an established data type (whole-slide images), and a defined buyer (pharma translational and CDx teams) have lined up at the same time. The thesis being tested is that a vertically integrated pathology-FM stack is more valuable inside a pharma than as an independent vendor, which contrasts with the protein-FM and sc-FM worlds, where the field is still organised around academic releases and platform companies. Open question is whether more pathology-FM acquisitions follow, or whether AstraZeneca-Modella remains an outlier specific to AstraZeneca diagnostics ambitions.'
- id: roche-tissue-diagnostics
