  status: published
  org_type: academic
  region: CN
  why: Turns Xenium/CosMx/MERSCOPE/PhenoCycler into scalable single-cell profilers — wet-lab counterpart to virtual spatial proteomics.
  description: 'STAMP is a 2025 Cell paper from a Chinese academic group that turns commercial spatial-transcriptomics platforms — Xenium, CosMx, MERSCOPE, and PhenoCycler — into scalable single-cell profilers by harmonising their outputs and reframing each fluorescence cycle as a cell measurement rather than a tissue measurement. The practical outcome is the wet-lab counterpart to virtual spatial proteomics: instead of imputing protein expression in space, STAMP measures it across platforms at single-cell resolution and at throughputs that approach dissociated scRNA-seq. That matters because the virtual-cell community has been generating spatial multi-omic predictions faster than the experimental community can validate them, and STAMP narrows the gap. As a multi-platform method it also sidesteps vendor lock-in. The open question is how robust the cross-platform harmonisation is to batch and panel differences, and whether downstream atlases will adopt the standardised output.'
- id: vcworld-arxiv-2025
