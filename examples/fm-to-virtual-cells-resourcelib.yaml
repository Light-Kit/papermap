  why: RNA-seq-coverage prediction model, Enformer successor — subsumed by AlphaGenome.
  description: Calico's Enformer successor focused on predicting RNA-seq coverage directly from sequence, extending the Enformer paradigm to a richer set of output tracks and longer contexts. For a window of about two years it was the model to beat for transcript-level regulatory predictions, and it found wide use in variant prioritisation pipelines that needed coverage-level granularity. With AlphaGenome's 2025 release reporting wins on essentially all of Borzoi's benchmark territory at 1-Mb context, Borzoi has been functionally subsumed for new work. It remains useful as a baseline and for groups whose pipelines are already built around its output format; the open question is how long the open-weights Borzoi ecosystem stays alive now that the SOTA has moved to a model with different access terms.
  qa:
    did: 'Borzoi is Calico''s Enformer successor focused on predicting RNA-seq coverage directly from sequence, extending the Enformer paradigm to a richer set of output tracks and longer contexts. For about two years it was the model to beat for transcript-level regulatory predictions in variant-prioritisation pipelines needing coverage-level granularity.'
    purpose: 'The aim was to push sequence-to-function modelling beyond Enformer''s expression-track outputs into RNA-seq coverage at transcript-level resolution. That output target matters because variant-prioritisation pipelines need coverage-level signal rather than aggregate expression to attribute regulatory effects to specific transcripts and isoforms.'
    method: 'Borzoi extends the Enformer-style transformer backbone to longer context windows and a broader output head covering RNA-seq coverage tracks. The model maps raw DNA sequence to coverage profiles directly, producing outputs at the resolution variant-prioritisation pipelines consume rather than aggregate expression per gene.'
    result: 'Borzoi was the SOTA on transcript-level regulatory predictions for about two years until AlphaGenome''s 2025 release reported wins on essentially all of its benchmark territory at 1-megabase context. It remains useful as a baseline and for pipelines built around its output format, though it is functionally subsumed for new work.'
