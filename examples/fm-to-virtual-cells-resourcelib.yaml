  why: Optimal-transport perturbation-effect disentanglement.
  description: 'Optimal-transport-based perturbation-effect disentanglement method from a US academic group, separating treatment effect from confounders by matching cells across conditions using OT couplings. The causal-inference framing is what makes it interesting next to autoencoder approaches like CPA: rather than learning disentangled latents implicitly, it leverages the geometry of the data and an OT solver to estimate counterfactual cell states directly. That makes the estimates more interpretable and gives explicit handles for sensitivity analysis. Within the perturbation-modelling landscape it sits in the small but growing causal-methods cluster that the more recent work on causal pretraining objectives builds on. Open questions are scalability to very large screens, how the OT cost function should encode biological similarity, and how the method behaves when treatment-control overlap is poor.'
  qa:
    did: 'CINEMA-OT is an optimal-transport-based perturbation-effect disentanglement method from a US academic group. It separates treatment effect from confounders by matching cells across conditions using OT couplings, leveraging the geometry of the data and an OT solver to estimate counterfactual cell states directly rather than via learned disentangled latents.'
    purpose: 'The aim is to bring an explicit causal-inference framing to perturbation effects in single-cell data, replacing implicit latent-disentanglement with explicit counterfactual estimation. That makes the estimates more interpretable and gives explicit handles for sensitivity analysis compared with autoencoder approaches like CPA that bake disentanglement into the latent geometry.'
    method: 'The method computes optimal-transport couplings between treated and control cell populations, using the resulting matching to estimate per-cell counterfactual states and treatment effects. The OT cost function encodes biological similarity between cells, and the solver returns the couplings used to attribute observed differences to treatment versus baseline variation.'
    result: 'CINEMA-OT sits in the small but growing causal-methods cluster within perturbation modelling that the more recent work on causal pretraining objectives builds on. Open questions are scalability to very large screens, how the OT cost function should encode biological similarity, and how the method behaves when treatment-control overlap is poor.'
