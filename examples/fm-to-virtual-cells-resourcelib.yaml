- id: montazeri-eval-2026
  kind: paper
  name: Evaluating single-cell perturbation response models is far from straightforward
  authors: Heidari, Karimpour, Srivatsa & Montazeri
  venue: bioRxiv
  year: 2026
  url: https://www.biorxiv.org/content/10.64898/2026.02.14.705879v1
  topics:
  - eval
  - perturbation-prediction
  - single-cell
  status: preprint
  org_type: academic
  region: global
  why: Second front in the perturbation-evaluation reckoning — Wasserstein/Energy distances mislead in high-dim gene space.
  papermap_category: reckoning
  description: 'A 2026 bioRxiv preprint opening a second front in the perturbation-evaluation reckoning, arguing that the Wasserstein and energy distances now standard for scoring perturbation-prediction models are systematically misleading in high-dimensional gene-expression space. The work shows that distributional distances can rank a poor model above a strong one simply because the curse of dimensionality flattens the signal, undermining benchmarks built around them, including the metrics used in several recent flow-matching and diffusion comparisons. It complements the linear-baseline critiques from 2025 by attacking the metric layer rather than the model layer. As a preprint without an institutional anchor in the metadata, it carries the usual caveats. The open question is what replacement metrics survive scrutiny: marginal-wise scoring, classifier two-sample tests, and embedding-space distances are all candidates, but the field has not converged.'
- id: pertpy-natmeth-2025
  kind: tool
  name: Pertpy — end-to-end framework for perturbation analysis
  authors: Heumos, Ji, May, Theis et al.
  venue: Nature Methods
  year: 2025
  url: https://github.com/scverse/pertpy
  topics:
  - perturb-seq
  - single-cell
  - perturbation-prediction
  - eval
  status: launched
  org_type: academic
  region: EU
  why: scverse-blessed perturbation toolbox — distances, perturbation spaces, harmonisation. The canonical analysis layer.
  description: 'Pertpy is the scverse-blessed perturbation-analysis toolbox, formalised in a 2025 Nature Methods paper from European academic groups, that aggregates distances, perturbation-space embeddings, harmonisation utilities, and standardised loaders for Perturb-seq style data into a single Python package. It has become the canonical analysis layer that downstream models and benchmarks plug into, much as scanpy is the canonical layer for general scRNA-seq. The practical effect is to lower the cost of running fair comparisons: a method developer can lean on pertpy''s distance implementations and dataset adapters rather than reimplementing them, which makes critical benchmarks like Kernfeld and Wong-Dilworth easier to reproduce. As a living tool inside scverse, it will absorb whatever new evaluation protocols emerge from the metric debates. The open question is whether the API stabilises fast enough for downstream models to commit.'
