  status: published
  org_type: academic
  region: CN
  why: Adapter-style PEFT cuts scLLM fine-tuning to <4% params and beats zero-shot — practical answer to the reckoning.
  description: A 2025 Nature Machine Intelligence paper showing that adapter-style parameter-efficient fine-tuning (PEFT) lets single-cell large language models like scGPT and Geneformer be specialised with under 4% of their parameters trained, while consistently outperforming zero-shot transfer. The result matters because the 2025 single-cell foundation model reckoning hinged on whether multi-billion-parameter scLLMs actually transfer better than simpler baselines once you account for compute and overfitting; this work offers a pragmatic middle path, conceding that full fine-tuning is wasteful and zero-shot is unreliable, and converging on adapter tuning as the deployable default. Coming from a Chinese academic group, it is also a sign that PEFT recipes from NLP are migrating into single-cell tooling rather than being reinvented. What remains open is whether adapter-tuned scLLMs hold up against well-tuned linear baselines on perturbation prediction, the harder benchmark category where the reckoning bit hardest.
  qa:
    did: 'scPEFT introduced an adapter-style parameter-efficient fine-tuning recipe for single-cell large language models such as scGPT and Geneformer, demonstrating that specialising these scLLMs requires under 4 percent of their parameters trained while consistently outperforming zero-shot transfer across downstream single-cell tasks. Published in Nature Machine Intelligence in 2025.'
    purpose: 'The aim was a pragmatic middle path through the 2025 sc-FM reckoning — conceding full fine-tuning is wasteful for billion-parameter scLLMs and zero-shot transfer is unreliable, then converging on adapter tuning as a deployable default that preserves pretrained representations while letting practitioners adapt models without prohibitive compute.'
    method: 'The authors inject lightweight adapter modules into frozen scLLM backbones (scGPT, Geneformer) and train only those adapters plus task heads, keeping under 4 percent of parameters trainable. The recipe ports adapter-style PEFT from NLP into single-cell tooling and is evaluated across standard cell-type annotation and integration benchmarks.'
    result: 'scPEFT consistently beat zero-shot transfer at a fraction of full fine-tuning compute, offering a practical answer to the reckoning critique that scLLMs underperform without expensive task-specific training. The open question is whether adapter-tuned scLLMs hold up against well-tuned linear baselines on perturbation prediction, where the reckoning critique bit hardest.'
