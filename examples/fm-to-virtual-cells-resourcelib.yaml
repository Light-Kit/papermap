  description: scTranslator is a Tencent AI Lab contribution published in Nature Biomedical Engineering in 2025 that learns alignment-free translation from single-cell RNA to single-cell protein abundance, pretrained on roughly 2 million single cells and 18,000 bulk samples. The alignment-free framing matters because most prior scRNA-to-protein methods require paired CITE-seq data or careful gene-protein matching, which limits scale; scTranslator instead treats the modalities as parallel languages and learns a joint generative mapping. As an industrial release from Tencent, it also signals that Chinese tech-firm bio-AI labs are publishing rather than only filing patents. For the virtual-cell agenda it provides a way to impute the proteomic axis cheaply, which most current virtual-cell models ignore. Whether the generated proteomic profiles are accurate enough for downstream perturbation modelling, rather than just for visualisation, is the next test.
- id: causcell-natcomm-2025
  kind: paper
  name: CausCell — causal disentanglement + counterfactual single-cell generation
  authors: Qi Liu lab (Tongji) et al.
  venue: Nature Communications
  year: 2025
  url: https://www.nature.com/articles/s41467-025-62008-1
  topics:
  - causal
