    result: 'TranscriptFormer reported strong cross-species generative results at release and serves as the reference release for how CZI reads the post-reckoning landscape. Whether it clears the perturbation and dynamics bars set by Wenkel, Ahlmann-Eltze, and the cell-dynamics-zero-shot preprint under leakage-controlled splits is the open empirical question its release left for later evaluators.'
