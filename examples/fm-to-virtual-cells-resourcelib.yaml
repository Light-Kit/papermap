items:
- id: bunne-2024
  kind: paper
  name: How to build the virtual cell with AI
  authors: Bunne et al.
  venue: Cell
  year: 2024
  url: https://www.cell.com/cell/fulltext/S0092-8674(24)01044-X
  topics:
  - virtual-cell
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: The canonical virtual-cell thesis — the goal everything else chases.
  papermap_category: position
  description: 'A Cell perspective from Bunne and a large multi-institution group laying out what an AI-driven virtual cell would actually entail: a multi-scale, multi-modal model that predicts cellular behaviour from molecules through tissues. It matters because almost every subsequent program in this space — from CZI''s residency to industry consortia — explicitly cites it as the north-star definition, fixing a shared vocabulary (state, behaviour, simulation) that earlier sc-FM papers lacked. The piece also frames the data, evaluation, and interpretability gaps that the 2025 reckoning would later quantify, which is why critics and proponents both read it as the goalpost. What stays open is whether the integrated virtual cell is achievable by scaling current FMs, by composing specialist modules, or only with new mechanistic priors — the paper is deliberately agnostic on architecture.'
- id: rood-regev-2024
  kind: paper
  name: The future of automated single-cell analysis
  authors: Rood, Regev et al.
  venue: Cell
  year: 2024
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: Regev's reference-mapping framing of the same ambition.
  papermap_category: position
  description: 'A Regev-group perspective recasting the virtual-cell ambition as a reference-mapping problem: build atlases dense enough that any new query cell or perturbation can be located, interpreted, and predicted against them. Its importance is framing — where Bunne et al. emphasise multi-scale simulation, this piece insists the near-term tractable target is a learned cell-state manifold anchored in the Human Cell Atlas tradition rather than a from-scratch mechanistic simulator. It set the agenda for several CZI- and Broad-adjacent efforts and is routinely paired with Bunne 2024 as the two canonical thesis statements of 2024, with the two together defining the inside-the-tent consensus on what to build next. Open question: whether reference-mapping atlases can absorb perturbation, dynamics, and spatial context without collapsing back into the same generalisation failures the sc-FM evaluations of 2025-2026 exposed.'
- id: theis-2026
  kind: paper
  name: From modality-specific to compositional foundation models
  authors: Theis et al.
  venue: Cell Systems
  year: 2026
  topics:
  - foundation-model
  - virtual-cell
  status: published
  org_type: academic
  region: EU
  why: Post-reckoning forward path — stop scaling monoliths.
  papermap_category: position
  description: 'A 2026 forward-look from the Theis group arguing that the field should stop scaling monolithic single-cell foundation models and instead invest in modular, mechanism-aware components glued together by careful evaluation. It matters because Theis was an early sc-FM proponent, so the explicit pivot reads as an inside concession to the reckoning literature — and the piece offers a roadmap that decouples representation learning, perturbation prediction, and dynamics into separately benchmarkable pieces rather than asking one model to do all of them. The piece also reframes scale: bigger atlases and longer context windows are necessary but not the bottleneck; inductive bias and causal structure are. What remains contested is which modular substrate wins — signaling networks, gene-regulatory graphs, or mech-modeling backbones — and whether any composition recovers the integration story Bunne 2024 promised.'
- id: vcc-2025
  kind: paper
  name: Virtual Cell Challenge — a Turing test for the virtual cell
  authors: CZI / Roohani / Hsu et al.
  venue: Cell
  year: 2025
  topics:
  - virtual-cell
  - eval
  status: published
  org_type: foundation
  region: US
  why: What success is supposed to look like, operationalised.
  papermap_category: position
  description: The Virtual Cell Challenge (Arc Institute, 2025) is what success for a virtual cell is supposed to look like, operationalised as a community benchmark with a $50k prize. Five thousand teams registered; over 300 submissions were scored. Most submissions scored worse than the mean-baseline on MAE — the same finding that anchored the Ahlmann-Eltze reckoning months earlier. The winning approach was a hybrid using protein embeddings plus classical features, not a pure single-cell foundation model. As a single result the VCC validates both the reckoning's claim (current sc-FMs don't beat strong baselines) and the post-reckoning architectural response (hybrid + biology-specific features can). It is also the cleanest precedent the next generation of benchmark designers (Open Problems v2, VCBench, Echoes) will reference when building their evaluation suites.
  starred: true
- id: rao-2026
  kind: paper
  name: Generalist biological AI — modeling the language of life
  authors: Rao et al.
  venue: Nature Biotechnology
  year: 2026
  topics:
  - foundation-model
  - multimodal
  status: published
  org_type: industry
  region: US
  why: Position paper unifying the five FM families.
  papermap_category: position
  description: 'An industry position paper that organises the biology-FM landscape into five families — sequence, structure, single-cell, image, and multimodal — and argues for shared interfaces between them. Its value is taxonomic: rather than another benchmark, it gives reviewers and funders a single map onto which AlphaFold-class, ESM-class, scGPT-class, pathology-FM, and emerging multimodal systems all sit, with explicit gaps where bridges between families don''t yet exist. The unification framing is what makes it useful for talk prep and grant scoping, because it forces a question many sc-FM papers dodge: how does this model compose with the others rather than competing for the same evaluation slot. Open: whether the five-family carve-up survives once cross-modal training (genome + protein + cell) becomes routine, or whether the categories collapse into one shared substrate.'
- id: li-agentic-2026
  kind: paper
  name: Agentic AI and in silico team science
  authors: Li et al.
  venue: Nature Biotechnology
  year: 2026
  topics:
  - agents
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: Position paper behind the agentic-FM intersection.
  papermap_category: position
  description: 'A position paper articulating the agentic-foundation-model intersection: LLM-driven agents that call biological FMs as tools, plan experiments, and close loops with wet-lab or simulator feedback. It matters because it crystallises a pattern several groups were converging on without naming it — Robin, BioMARS, rBio — and gives the agentic-FM combination a citable definition rather than a vibes-based one that reviewers have to reconstruct from scattered preprints. The piece distinguishes orchestration (agent on top of FMs) from internalisation (FM trained with agentic objectives), and argues most current systems are firmly the former. Open: whether reliable agent-FM systems require new training paradigms (process supervision, verifier feedback) or whether scaffolding around existing FMs is enough, and how to evaluate end-to-end scientific yield rather than turn-level competence.'
- id: singh-2025
  kind: review
  name: Single-cell foundation models — bringing AI into cell biology
  authors: Singh et al.
  venue: Experimental & Molecular Medicine
  year: 2025
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: KR
  why: Clean mid-2025 review — the orientation read.
  papermap_category: position
  description: 'A mid-2025 review of single-cell foundation models out of a Korean academic group, written as a compact orientation read rather than an exhaustive survey. Its job is to be the article a newcomer reads first: it catalogues the major sc-FM architectures (scBERT, Geneformer, scGPT, scFoundation, UCE, CellPLM), explains the pretraining tasks, and summarises the early evaluation literature without yet capturing the full 2025-2026 reckoning. Because it appeared just before the wave of critical benchmarks landed, it serves as a useful snapshot of how the community framed the field at peak optimism, before context-dependence, leaky splits, and weak baselines became the dominant story. Reading it alongside the later eval papers makes the shift in tone tangible, and it remains a defensible single-citation starter reference for anyone new to the sc-FM literature.'
- id: blueprint-revisit-2026
  kind: review
  name: Revisiting the blueprint for an interpretable virtual cell
  venue: Nature Reviews Genetics
  year: 2026
  topics:
  - virtual-cell
  - interpretability
  status: published
  org_type: outlet
  region: global
  why: Nature Reviews framing piece on what an interpretable virtual cell would even look like.
  source: _Temp/new_paper.md
  description: 'A Nature Reviews framing piece asking what an interpretable virtual cell would actually look like, beyond benchmark numbers. It matters because most virtual-cell programmes have so far been measured by held-out prediction accuracy, while the clinical and mechanistic value the original Bunne-style blueprint promised requires the model to expose the why — gene programmes, pathways, regulatory motifs — in a way a biologist can audit. The piece treats sparse-autoencoder and concept-bottleneck work as preconditions for the virtual-cell agenda rather than nice-to-haves, and lays out criteria (faithfulness, stability, causal grounding) for judging future systems against. Open: how to operationalise these criteria into a benchmark suite the community can actually share, given how subjective interpretability remains and how rarely sc-FM releases include interpretability evaluations at all in their initial reports.'
- id: cell-research-three-pillars-2026
  kind: commentary
  name: Grow AI virtual cells — three data pillars and closed-loop learning
  venue: Cell Research (editorial)
  year: 2026
  topics:
  - virtual-cell
  - foundation-model
  status: published
  org_type: outlet
  region: global
  why: Editorial framing closed-loop learning as the missing ingredient.
  source: _Temp/new_paper.md
  description: 'A Cell Research editorial framing closed-loop learning — model proposes, lab tests, results retrain — as the missing third pillar alongside data and architecture in the virtual-cell programme. Its importance is rhetorical and strategic: it gives a high-visibility venue stamp to the argument that static-benchmark progress on sc-FMs has plateaued, and that the next jump requires coupling models to active perturbation campaigns at scale. The piece is short on technical prescription but explicit about funding and infrastructure asks, particularly automated wet labs and shared perturbation atlases. What remains open is who pays for the loop: closed-loop biology is expensive, and most academic groups can only afford to participate in the model half, leaving the experimental half to a few well-funded foundations and industry consortia.'
- id: innov-oncol-equations-to-agents-2026
  kind: commentary
  name: From equations to agents — the AI virtual cell reshaping precision oncology
  venue: The Innovation Oncology (perspective)
  year: 2026
  topics:
  - virtual-cell
  - agents
  - clinical
  status: published
  org_type: outlet
  region: CN
  why: Clinical-oncology framing of the AIVC story.
  source: _Temp/new_paper.md
  description: 'A commentary in a clinical-oncology venue translating the AIVC story for an audience used to mechanistic ODE models of tumour biology rather than transformer-based cell models. It matters because most virtual-cell discourse is methods-side; this piece asks what the clinical end-state looks like — patient-specific virtual tumours, agentic treatment planners, in-silico trial arms — and where the data and validation gaps sit relative to oncology workflows. The ''equations to agents'' framing draws a continuity line from systems-biology modelling to FM-driven agents rather than treating them as separate paradigms. Open: how regulators absorb model-based evidence, and whether oncology becomes the first speciality with deployment-grade virtual-cell tools given its data density, or stalls on the same generalisation gaps clinical RWD benchmarks have surfaced.'
- id: nat-biotech-minimal-life-2026
  kind: commentary
  name: Minimal life by computer
  venue: Nature Biotechnology
  year: 2026
  topics:
  - virtual-cell
  - mech-modeling
  status: published
  org_type: outlet
  region: global
  why: Framing piece on minimal-cell simulation as the AIVC counterpoint.
  source: _Temp/new_paper.md
  description: 'A Nature Biotechnology framing piece on minimal-cell whole-cell simulation — the JCVI-syn3A lineage and its mechanistic descendants — as the counterpoint to data-driven AIVC programmes. It matters because it reminds the FM-focused reader that an alternative path to a virtual cell already exists: bottom-up, parameter-by-parameter, validated against a stripped-down organism with a known genome and a tractable parts list. The argument is not that mech-modeling wins, but that the two paradigms have complementary failure modes — minimal-cell models extrapolate but don''t scale, FMs scale but don''t extrapolate — and that hybrid designs are underexplored. Open: whether the mech-modeling community and the AIVC community share enough vocabulary and incentives to actually meet, or whether they continue running on parallel tracks with separate venues, separate benchmarks, and separate funders.'
- id: derek-lowe-ubiquitin-2026
  kind: commentary
  name: Ubiquitin Rides Again — comments on the virtual cell
  authors: Derek Lowe
  venue: Science · In the Pipeline (blog)
  year: 2026
  topics:
  - virtual-cell
  status: published
  org_type: outlet
  region: US
  why: Pharma chemist's sceptical-pragmatist read on AIVC claims.
  source: _Temp/new_paper.md
  description: A blog post from In the Pipeline, the long-running Derek Lowe column, applying a pharma medicinal-chemist's sceptical-pragmatist lens to recent AIVC claims, framed around a ubiquitin-pathway example. It matters because Lowe's audience is drug-discovery practitioners who will be asked to act on virtual-cell predictions, and his red-team instinct — what would change my decision tomorrow morning? — surfaces a gap most academic commentary glosses over. The piece neither dismisses nor endorses the programme; it asks for specific, falsifiable claims tied to molecules and assays the reader recognises, and pushes back on benchmark numbers that don't translate into actionable medicinal-chemistry decisions. Useful as a calibration check for anyone preparing AIVC talks to mixed pharma-academic audiences, because the questions Lowe raises are the ones a discovery-team lead will raise in the Q&A.
- id: aivc-review-bib-2026
  kind: review
  name: AI virtual cell — review
  authors: Shugang Zhang, Huasen Jian et al.
  venue: Briefings in Bioinformatics
  year: 2026
  topics:
  - virtual-cell
  - foundation-model
  status: published
  org_type: academic
  region: CN
  why: Mandarin-sphere review of the AIVC landscape.
  source: _Temp/new_paper.md
  description: 'A Mandarin-sphere review of the AI virtual cell landscape, published in Briefings in Bioinformatics, that catalogues the same architectures and benchmarks the Anglophone reviews cover but with a different selection of Chinese-led contributions surfaced. It matters because the China-based sc-FM ecosystem (scFoundation, CellFM, scMulan and others) is sometimes underweighted in Western reviews, and this piece gives a more even accounting of who built what. Use it as a complement rather than a substitute for the Singh and Theis reviews when scoping who is active in the field and which preprints are circulating in Chinese-language reading groups. Open: whether the post-reckoning critique articulated in 2025-2026 has been absorbed at the same speed in this literature, or whether the optimism curve lags by a cycle.'
- id: theory-in-cell-grammar-2026
  kind: paper
  name: Human-interpretable grammar encodes multicellular systems biology
  venue: Theory in Cell (preprint/workshop)
  year: 2026
  topics:
  - virtual-cell
  - interpretability
  - mech-modeling
  status: preprint
  org_type: academic
  region: global
  why: Argues for an interpretable grammar layer to democratise virtual-cell labs.
  source: _Temp/new_paper.md
  description: 'A preprint arguing for an interpretable grammar layer — symbolic, compositional, biologist-readable — sitting between raw FMs and downstream virtual-cell labs, so that smaller groups can use and audit the models without owning the pretraining compute themselves. It matters because the democratisation framing reframes interpretability as an access problem, not just a trust problem: if only the labs that trained the model can probe it, the virtual-cell programme stays oligopolistic and the value capture concentrates in a handful of institutions. The piece sits at the interpretability / mech-modeling boundary, pulling concepts from program induction and gene-regulatory grammar literatures into the FM conversation. Open: whether any concrete grammar-layer system actually works at the scale current FMs operate at, or whether the proposal stays aspirational until paired with an end-to-end implementation.'
- id: cellular-intelligence-signaling-2026
  kind: paper
  name: Cellular Intelligence — Engineering Cell Fate, towards a foundation model for cell signaling
  venue: preprint
  year: 2026
  topics:
  - signaling
  - foundation-model
  - virtual-cell
  status: preprint
  org_type: academic
  region: global
  why: Reframes virtual cells as signaling-FMs rather than transcriptome-FMs.
  source: _Temp/new_paper.md
  description: 'A preprint that reframes virtual cells as signaling foundation models rather than transcriptome foundation models, on the grounds that signaling networks — not steady-state mRNA — encode the decision-making logic the AIVC programme wants to capture. It matters because nearly all current sc-FMs are trained on scRNA-seq, which is a snapshot of one slow layer; the piece argues this is why perturbation generalisation has been so weak and why the reckoning literature keeps finding the models default to baselines. The proposal is to pretrain on signaling-aware substrates (phospho-proteomics, live imaging, kinase-substrate graphs) and treat transcriptome as one readout among many. Open: whether enough signaling data exists at sc-FM-relevant scale to support pretraining, or whether the bottleneck shifts from compute to assay throughput.'
- id: scbert
  kind: tool
  name: scBERT
  authors: Yang et al.
  venue: Nature Machine Intelligence
  year: 2022
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: CN
  why: BERT-style precursor that pre-dated the 2023 sc-FM wave.
  papermap_category: scfm
  description: 'A 2022 BERT-style transformer trained on single-cell RNA-seq for cell-type annotation, predating the 2023-2024 sc-FM wave and serving as its architectural template. Its importance is historical: scBERT showed that masked-language-model pretraining transferred to gene-expression vectors at all, which was the precondition for everything that followed and the proof-of-concept that justified subsequent atlas-scale pretraining runs. By contemporary standards the corpus and parameter count are modest, and the model does not appear among the strongest performers in the post-reckoning evaluations, but it is the citation that establishes the lineage from NLP transformers to sc-FMs in any serious history of the field. Worth reading mainly to see how thin the original empirical case was, and how much of the subsequent enthusiasm was driven by architecture transfer rather than by demonstrated biological gains over classical pipelines.'
- id: scgpt
  kind: tool
  name: scGPT
  authors: Cui et al.
  venue: Nature Methods
  year: 2024
  topics:
  - single-cell
  - foundation-model
  - perturbation-prediction
  status: published
  org_type: academic
  region: US
  why: Defined the category — genes + cells as tokens. The reckoning's main target.
  papermap_category: scfm
  description: 'A generative transformer treating both genes and cells as tokens, pretrained on roughly 33M cells and positioned as a general-purpose sc-FM for cell-typing, integration, and perturbation prediction. Its importance is category-defining — scGPT is what most readers picture when they hear single-cell foundation model, and it is the model the 2025-2026 reckoning literature most often benchmarks against. The perturbation-prediction claims drove much of the original excitement and, later, much of the critical attention when Csendes, Wenkel, and others showed the splits were leaky and stronger baselines closed the gap. Open: whether the scGPT recipe, given cleaner splits and updated training, recovers a genuine edge over linear baselines, or whether the architectural choice was the wrong inductive bias for the task.'
- id: geneformer
  kind: tool
  name: Geneformer / Geneformer V2
  authors: Theodoris et al.
  venue: Nature
  year: 2023
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: First atlas-pretrained transformer; rank-based tokenisation. V2 (Dec 2024) matched 316M at ⅓ the compute.
  papermap_category: scfm
  description: 'An atlas-pretrained transformer using rank-based gene tokenisation, trained originally on around 30M cells and positioned for zero-shot cell-typing and network-level perturbation inference. Its importance is being the first credible atlas-scale sc-FM; the rank tokenisation sidestepped read-depth normalisation and was widely copied across the subsequent sc-FM cohort. The December 2024 V2 release reportedly matched a 316M-parameter model with roughly one-third the compute, which is one of the cleaner efficiency demonstrations in the sc-FM literature and partially answers the ''just scale it'' critique without conceding ground on the paradigm itself. Open: how Geneformer performs once perturbation and dynamics benchmarks are evaluated with leakage-controlled splits, since the cell-typing wins it shows are exactly the axis Wu et al. 2026 find FMs do best on, while harder axes still favour classical methods.'
- id: uce
  kind: tool
  name: Universal Cell Embedding (UCE)
  authors: Rosen et al.
  venue: Nature Methods
  year: 2024
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: Cross-species sc-FM — bridges through ESM2 protein embeddings (8 species).
  papermap_category: scfm
  description: 'Universal Cell Embedding, a cross-species sc-FM that uses ESM2 protein embeddings as the bridge between organisms, trained across roughly eight species so that a query cell from one can be located in another''s reference. It matters as the first sc-FM to take cross-species generalisation seriously instead of training one model per organism, which is a precondition for any virtual-cell programme that wants to use mouse and yeast data to constrain human models. The ESM2-as-translator design is also the cleanest example of composing FMs across families (protein → cell) in this corpus. Open: Kedzierska et al. 2025 extended the reckoning critique to UCE in zero-shot settings, so the cross-species value proposition needs revisiting with the leakage-controlled benchmarks that have since emerged.'
- id: scfoundation
  kind: tool
  name: scFoundation
  authors: Hao et al.
  venue: Nature Methods
  year: 2024
  topics:
  - single-cell
  - foundation-model
  - perturbation-prediction
  status: published
  org_type: biotech
  region: CN
  why: Read-depth-aware attention; one of the four reckoning regulars.
  papermap_category: scfm
  description: 'A Chinese biotech sc-FM with read-depth-aware attention, trained on roughly 50M cells and routinely included as one of the four regulars (alongside scGPT, Geneformer, UCE) in post-reckoning benchmarks. Its importance is two-fold: the read-depth-aware design directly addresses a known confound in scRNA-seq that earlier sc-FMs largely ignored, and the model is one of the few large sc-FMs with substantial industry backing rather than pure academic provenance. On perturbation-prediction tasks it sits in the same band as the others in the reckoning evaluations, which is part of the critique: the architectural innovations did not translate into clear empirical wins over linear baselines. Open: whether attention designs that internalise more assay physics eventually break the plateau, or whether the bottleneck is data rather than architecture.'
- id: cellplm
  kind: tool
  name: CellPLM
  authors: Wen et al.
  venue: ICLR
  year: 2024
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: Cell-as-token sc-FM; beats scGPT/Geneformer on cell-typing cheaply.
  papermap_category: scfm
  description: 'A cell-as-token sc-FM that treats whole cells (rather than individual genes) as the basic unit, reporting cell-typing accuracy above scGPT and Geneformer at substantially lower compute. Its importance is showing that the genes-as-tokens orthodoxy inherited from NLP was not the only viable choice, and that the cheaper alternative competes on the most-cited downstream task without giving up much downstream flexibility. This matters for the cost narrative around sc-FMs, because it undercuts the implicit assumption that bigger token-counts and longer context windows are necessary for cell-typing performance and that more compute is the obvious lever. Open: how the cell-token design holds up on the harder axes — perturbation, dynamics, multimodal integration — where the field''s headline failures sit, since cell-typing is exactly the task FMs were already strongest on.'
- id: state
  kind: tool
  name: STATE (Arc Institute)
  venue: bioRxiv
  year: 2025
  topics:
  - single-cell
  - virtual-cell
  - perturbation-prediction
  status: preprint
  org_type: foundation
  region: US
  why: First production virtual cell at Tahoe-100M scale.
  papermap_category: scfm
  description: 'STATE, an Arc Institute sc-FM trained at Tahoe-100M scale and positioned as the first production virtual cell — meaning a model intended to be queried by downstream labs rather than only used as a benchmark target. Its importance is institutional as much as technical: Arc treating virtual-cell as a product, not a paper, sets a different release cadence and support expectation than academic sc-FMs have used, with versioning and uptime treated as part of the deliverable. The Tahoe-100M scale also raises the data-quantity ceiling the field has been working under, even if the post-reckoning benchmarks have not yet been fully run on STATE in a leakage-controlled way. Open: whether the production framing delivers a different value proposition (uptime, versioning, support) that justifies its use even where benchmark-equivalence with linear baselines remains contested.'
- id: transcriptformer
  kind: tool
  name: TranscriptFormer
  authors: Pearce et al.
  venue: Science
  year: 2025
  topics:
  - single-cell
  - foundation-model
  status: published
  org_type: foundation
  region: US
  why: First generative cross-species sc-FM; CZ Biohub flagship (112M cells, 12 species).
  papermap_category: scfm
  description: 'TranscriptFormer, the CZ Biohub flagship cross-species generative sc-FM trained on roughly 112M cells across 12 species, positioned as the first generative model of its kind at that breadth. Its importance is being the institutional sc-FM coming out of CZI''s virtual-cell programme: the model''s design choices and release norms signal how a major foundation reads the post-reckoning landscape. Generative training across species is the harder version of the UCE story and is what enables the model to be queried for cross-organism predictions rather than only embeddings. Open: how TranscriptFormer performs on the perturbation and dynamics axes that have defeated earlier sc-FMs, and whether CZI''s evaluation discipline produces the kind of leakage-controlled report cards the rest of the field has been criticised for omitting.'
- id: nicheformer
  kind: tool
  name: Nicheformer
  authors: Theis lab
  venue: Nature Methods
  year: 2025
  topics:
  - single-cell
  - spatial
  - foundation-model
  status: published
  org_type: academic
  region: EU
  why: Spatial-omics sc-FM with a niche-aware objective.
  papermap_category: scfm
  description: 'A spatial-omics sc-FM with a niche-aware pretraining objective that conditions cell representations on local tissue context rather than treating each cell as independent. Its importance is being one of the first credible attempts to fold spatial information directly into the sc-FM pretraining recipe, rather than bolting spatial reasoning onto a dissociated-cell model after the fact. This is a precondition for any virtual-cell programme that wants to predict tissue-level behaviour, since most clinically relevant cell behaviour is niche-dependent. Open: whether the niche objective survives once the field''s spatial benchmarks mature — current spatial evaluation infrastructure lags behind dissociated scRNA-seq, so reckoning-style critiques have not yet been applied with the same rigour, and the headline numbers should be read with that gap in mind.'
