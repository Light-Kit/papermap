  description: SCimilarity is a metric-learning model from Genentech published in Nature Biotechnology in 2024, trained on 23.4 million cells to produce a unified embedding that generalises to new studies without retraining. The design choice — metric learning rather than masked-language-model-style pretraining — matters because it sidesteps the tokenisation debate around scGPT and Geneformer, while still delivering an off-the-shelf embedding suitable for cell-type query and atlas integration. As an industry release from a major biopharma, it also signals that pharma is investing in single-cell foundation infrastructure rather than relying only on academic releases. For practitioners it is one of the more reliable defaults when the task is finding similar cells across studies, and the absence of fine-tuning makes deployment cheap. The open question is whether the metric-learning approach scales to the 100M-cell regime that newer atlas releases are reaching, and whether it transfers to perturbation tasks.
  qa:
    did: 'It developed SCimilarity, a foundation model for single-cell RNA-seq data. The model embeds cells into a shared space so researchers can search massive cell atlases for transcriptionally similar cells, across tissues, diseases, studies, and experimental systems. It queried 23.4 million cells from 412 studies.'
    purpose: 'The purpose was to make the Human Cell Atlas searchable. Instead of only annotating cells by predefined labels or signatures, the authors wanted a scalable way to ask: "Where else do cells like this exist?" This helps connect disease states, tissues, perturbations, and in vitro models.'
    method: 'SCimilarity uses deep metric learning. It trains a neural network with cell triplets: an anchor cell, a similar positive cell, and a dissimilar negative cell, using Cell Ontology annotations. It combines triplet loss with reconstruction loss, preserving both cell-type similarity and finer gene-expression variation.'
    result: 'SCimilarity rapidly found biologically meaningful similar cells across the atlas. It identified fibrosis-associated macrophage and fibroblast states across ILD, COVID-19, cancers, and other fibrotic contexts. It also found a 3D hydrogel culture system that reproduced a fibrosis-associated macrophage-like state, validated experimentally.'
- id: aido-cell
