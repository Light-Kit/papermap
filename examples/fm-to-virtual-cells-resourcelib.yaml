  status: preprint
  org_type: foundation
  region: US
  why: Agent that REASONS OVER a virtual cell as a verifier.
  papermap_category: agentic
  description: 'rBio, an agentic system that reasons over a virtual cell as a verifier — the agent proposes hypotheses, the virtual cell scores them, and the loop iterates without (or before) wet-lab steps. Its importance is being one of the cleanest demonstrations of the agent-plus-FM composition the Li et al. position paper articulates: the virtual cell is used as an in-silico oracle inside the agent''s reasoning loop rather than as a passive predictor. If the verifier framing holds, it changes what virtual cells are for — less ''predict this experiment'' and more ''rank these hypotheses cheaply enough that we can search''. Open: how reliable the verifier signal actually is given the perturbation and dynamics failures the reckoning literature has documented, since an agent that trusts a miscalibrated oracle can search confidently in the wrong direction.'
- id: vcharness-2026
  kind: tool
  name: VCHarness — autonomous virtual-cell builder
  venue: bioRxiv (BioMap)
  year: 2026
  topics:
  - agents
  - virtual-cell
  - foundation-model
  status: preprint
  org_type: biotech
  region: US
  why: Agent that BUILDS virtual-cell models end to end.
  papermap_category: agentic
  description: 'Preprint-stage agent system from a US biotech that builds virtual-cell models end to end rather than serving as one. The pitch sits at the intersection of three live threads in the field: foundation models for cellular biology, the virtual-cell programme as a long-horizon goal, and the recent shift toward agentic scaffolds that orchestrate data loading, model selection, training, and evaluation without a human in the loop. If it works, it pushes a chunk of the modelling labour graduate students currently do into a callable pipeline, which matters most for groups without machine-learning depth on the bench. As of 2026 it is preprint, so claims of generality, reproducibility on held-out tissues, and the cost of running the agent versus a tuned single model remain to be checked by independent users.'
- id: cellvoyager-2026
  kind: tool
  name: CellVoyager — autonomous comp-bio agent
  venue: Nature Methods
  year: 2026
  topics:
  - agents
  - single-cell
  status: published
  org_type: academic
  region: US
  why: Agent that ANALYSES single-cell data with the FM as substrate.
  papermap_category: agentic
  description: 'Published agent that drives single-cell analysis with a foundation model as its computational substrate, from a US academic group. The framing is the inverse of tools that build FMs: here the FM is fixed and the agent decides what to ask it, chaining together QC, clustering, annotation, and downstream tests in response to a high-level user query. It targets the long tail of single-cell analyses that are routine for experienced bioinformaticians but blocking for wet-lab PIs. The open questions are familiar to anyone watching the agentic-bio space: how robust is it on datasets the underlying FM did not see, how does it fail when the FM hallucinates a cell type, and does it actually reduce time-to-insight versus a competent scanpy user.'
- id: medagentgym
  kind: tool
  name: MedAgentGym
  topics:
  - agents
