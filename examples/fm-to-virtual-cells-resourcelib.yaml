- id: nt-instadeep
  kind: tool
  modality: dna-seq
  name: Nucleotide Transformer
  venue: InstaDeep
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: biotech
  region: EU
  why: Early DNA FM pretrained across many genomes for variant and regulatory tasks.
  description: Nucleotide Transformer, an early DNA foundation model from the European biotech InstaDeep, pretrained across many genomes and evaluated on variant-effect and regulatory-element tasks. It was one of the first serious attempts to scale a masked-language-model recipe to DNA in the way ESM had scaled it to proteins, and it provided a reusable encoder for groups that wanted DNA embeddings without training their own model. Within the genomic-FM lineage it sits upstream of architectures that traded transformer attention for state-space models to push context length, and downstream of the original DNABERT line. The cross-genome pretraining strategy was also a deliberate bet that variation across species would teach the model regulatory grammar that single-genome models miss. With AlphaGenome and the long-context state-space family now dominating leaderboards, NT's main role is as a well-documented baseline and as an open-weights option for tasks where 1-Mb context is overkill.
  qa:
    did: 'Nucleotide Transformer is an early DNA foundation model from the European biotech InstaDeep, pretrained across many genomes and evaluated on variant-effect and regulatory-element tasks. It was one of the first serious attempts to scale a masked-language-model recipe to DNA in the way ESM had scaled it to proteins.'
    purpose: 'The aim was to provide a reusable DNA encoder so that downstream groups could obtain embeddings without training their own model. Cross-genome pretraining was a deliberate bet that variation across species would teach the model regulatory grammar that single-genome models miss, giving the encoder broader transfer than within-species recipes.'
    method: 'The recipe is a transformer encoder trained with a masked-language-model objective on DNA sequences drawn from many genomes. Training jointly across species lets the model see conserved regulatory signal at a scale single-genome pretraining cannot, mirroring the ESM playbook ported from proteins to DNA.'
    result: 'Nucleotide Transformer sits upstream of state-space architectures that traded transformer attention for longer context, and downstream of the DNABERT line. With AlphaGenome and long-context state-space families now dominating leaderboards, NT serves as a well-documented baseline and an open-weights option for tasks where 1-megabase context is overkill.'
- id: dnabert-2
  kind: tool
  modality: dna-seq
  name: DNABERT-2
  topics:
  - genomic
  - foundation-model
  status: published
  org_type: academic
  region: US
  why: BPE-tokenised DNA FM; efficiency-focused DNABERT successor.
  description: BPE-tokenised successor to DNABERT, from a US academic group, pitched as the efficiency-focused next step in the DNABERT line. Replacing the original k-mer tokenisation with byte-pair encoding lets the model handle longer sequences with smaller vocabularies and was shown to improve both throughput and performance on the standard genomic-classification battery. It is one of the easier on-ramps into DNA language modelling because the weights are open and the model is small enough to fine-tune on a single GPU, which makes it a common choice for course projects and method-development prototypes. The tokenisation change also makes the model interoperable with mainstream NLP tooling in a way the k-mer original was not. As the field has moved to state-space backbones for long context and to AlphaGenome-class models for variant effects, DNABERT-2's niche is shorter-context tasks where a lightweight, well-understood encoder is preferable to a heavyweight foundation model.
  qa:
    did: 'DNABERT-2 is a BPE-tokenised successor to DNABERT from a US academic group, pitched as the efficiency-focused next step in the DNABERT line. Replacing the original k-mer tokenisation with byte-pair encoding lets the model handle longer sequences with smaller vocabularies and improves throughput on standard genomic-classification batteries.'
    purpose: 'The aim was to fix the throughput and vocabulary inefficiency of k-mer tokenisation while keeping DNABERT''s lightweight architecture. Byte-pair encoding also makes the model interoperable with mainstream NLP tooling, lowering the barrier for groups that want a small DNA encoder fine-tunable on a single GPU.'
    method: 'The architecture inherits DNABERT''s transformer backbone but swaps k-mer tokens for byte-pair-encoded tokens learned on DNA sequences. The smaller vocabulary and variable-length tokens let the model cover longer sequences per forward pass while improving downstream-task accuracy on the standard genomic-classification battery.'
    result: 'DNABERT-2 improved both throughput and performance on the standard genomic-classification battery while staying small enough to fine-tune on a single GPU, making it a common choice for course projects and method-development prototypes. Its niche is shorter-context tasks where a lightweight, well-understood encoder beats heavyweight long-context foundation models.'
- id: hyenadna
  kind: tool
  modality: dna-seq
  name: HyenaDNA
  topics:
  - genomic
  - foundation-model
  - state-space
  status: published
  org_type: academic
  region: US
  why: State-space (non-transformer) genomic FM for very long context at single-nucleotide resolution.
  description: Genomic foundation model from a US academic group that swaps transformer attention for a Hyena state-space backbone, letting it run at single-nucleotide resolution over very long contexts that attention-based DNA models cannot reach. The point was to demonstrate that you do not need attention to do sequence modelling on DNA, and that the inductive biases of state-space models map naturally onto regulatory elements that span tens or hundreds of kilobases. The compute profile is also more favourable than transformer attention at the same context, which matters for academic labs without industry-scale clusters. It became the architectural template for the next wave of long-context DNA models, including the reverse-complement-equivariant Caduceus, and helped popularise state-space methods inside genomics more broadly. Whether single-nucleotide context at this scale actually translates into better variant-effect prediction relative to AlphaGenome's 1-Mb attention stack is still being worked out in head-to-head benchmarks.
  qa:
    did: 'HyenaDNA is a genomic foundation model from a US academic group that swaps transformer attention for a Hyena state-space backbone. The design choice lets the model run at single-nucleotide resolution over very long contexts that attention-based DNA models cannot reach, demonstrating that DNA sequence modelling does not require attention.'
    purpose: 'The aim was to show that state-space inductive biases map naturally onto regulatory elements spanning tens or hundreds of kilobases, where attention-based models hit a context wall. The favourable compute profile at the same context also mattered for academic labs without industry-scale clusters trying to model long-range DNA.'
    method: 'The model uses the Hyena state-space backbone in place of transformer self-attention, processing DNA at single-nucleotide resolution. The state-space recurrence keeps memory and compute scaling sub-quadratic in sequence length, enabling context windows that attention-based architectures cannot match on equivalent hardware budgets.'
    result: 'HyenaDNA became the architectural template for the next wave of long-context DNA models, including the reverse-complement-equivariant Caduceus, and helped popularise state-space methods inside genomics. Whether single-nucleotide context at this scale translates into better variant-effect prediction than AlphaGenome''s 1-megabase attention stack remains under benchmark.'
- id: caduceus
  kind: tool
  modality: dna-seq
  name: Caduceus
  topics:
  - genomic
  - foundation-model
  - state-space
  status: published
  org_type: academic
  region: US
  why: Bidirectional, reverse-complement-equivariant state-space DNA FM.
  description: Bidirectional, reverse-complement-equivariant state-space DNA foundation model from a US academic group, built in the lineage of HyenaDNA. The key design choice is hard-coding the reverse-complement symmetry of DNA into the architecture itself rather than relying on the model to learn it from data augmentation, which is a clean way to bake in biology that we already know to be true. It keeps the long-context advantages of state-space models while making the embeddings strand-invariant by construction, which matters for many regulatory and variant-effect tasks where the strand label is essentially arbitrary. The bidirectional design also addresses one of the limitations of the original HyenaDNA, which was unidirectional. Whether the equivariance buys enough on downstream benchmarks to displace simpler long-context backbones, and how it compares to AlphaGenome on variant effects, remain open questions for groups choosing between genomic FMs.
  qa:
    did: 'Caduceus is a bidirectional, reverse-complement-equivariant state-space DNA foundation model from a US academic group, built in the HyenaDNA lineage. It hard-codes the reverse-complement symmetry of DNA into the architecture itself rather than relying on the model to learn the symmetry from data augmentation alone.'
    purpose: 'The aim was to bake a known biological invariance — that DNA strand label is essentially arbitrary for many regulatory and variant-effect tasks — into the architecture so the model does not have to spend capacity rediscovering it. The bidirectional design also addresses the unidirectional limitation of the original HyenaDNA.'
    method: 'The architecture extends the HyenaDNA state-space backbone with explicit reverse-complement equivariance and bidirectional processing. Strand symmetry is enforced by construction in the layer operations rather than by training-time augmentation, while preserving the long-context advantages of state-space sequence modelling over transformer attention.'
    result: 'Caduceus delivers strand-invariant embeddings by construction while keeping the long-context advantages of state-space models and fixing HyenaDNA''s unidirectionality. Whether the equivariance buys enough on downstream benchmarks to displace simpler long-context backbones, and how it compares to AlphaGenome on variant effects, remain open questions.'
