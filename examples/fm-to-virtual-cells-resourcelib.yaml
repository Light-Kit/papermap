  description: 'DIA-BERT is a transformer pretrained on 276 million peptide precursor spectra from Westlake University, published in Nature Communications in 2025, that targets data-independent acquisition mass spectrometry. The headline result is a 51% increase in protein identifications over DIA-NN, the current default DIA processing tool, on standard benchmarks. The significance is twofold: it shows that proteomics has enough public spectra to pretrain a respectable foundation model in the BERT mould, and it positions Westlake as a credible Chinese entrant in proteomics FM development alongside groups working on de novo sequencing and PTM prediction. For the virtual-cell stack, better DIA processing matters because protein-level measurements remain the missing modality in most single-cell foundation models. Whether the 51% gain holds up across instrument vendors and sample types, and whether the embeddings transfer to downstream tasks like PTM prediction, are the open questions.'
