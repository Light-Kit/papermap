  description: KEEP is a knowledge-graph-conditioned pathology vision-language model from Shanghai Jiao Tong University, released through the MAGIC-AI4Med group in 2025. It uses a structured medical knowledge graph to constrain image-text alignment during pretraining, with the goal of producing a histopathology foundation model that reasons in terms of clinically meaningful entities rather than free-text captions. Positioned against PathChat and Virchow, it is a credible Chinese answer to the US-led pathology foundation model wave and signals that the next round of competition in computational pathology will be on grounding and interpretability rather than raw scale. The open repository makes it actually reusable, which is uncommon among recent pathology VLMs. The unsettled question is how KEEP performs under prospective clinical evaluation and whether the knowledge-graph conditioning genuinely changes downstream behaviour or mostly reorganises the embedding space.
