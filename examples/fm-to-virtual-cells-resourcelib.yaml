    purpose: 'The design goal was to handle a known confound — variable read depth across scRNA-seq libraries — that earlier sc-FMs largely ignored, on the bet that internalising more assay physics inside the attention mechanism would break the plateau on perturbation and integration tasks where other sc-FMs had stalled.'
    method: 'A transformer is pretrained on roughly 50M cells with attention that conditions on per-cell sequencing depth, so the model learns to interpret expression values in light of how deeply each library was sampled. The recipe otherwise follows the gene-as-token masked-prediction template established by scBERT and scGPT.'
    result: 'scFoundation reports competitive cell-typing, integration, and perturbation-prediction numbers at release. In the Ahlmann-Eltze and Wu evaluations it sits in the same band as scGPT, Geneformer, and UCE — the read-depth-aware design did not translate into a clean empirical win over linear baselines, leaving the bottleneck question between architecture and data unresolved.'
