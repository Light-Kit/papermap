    purpose: 'The aim was to provide a clean, independent, easy-to-reproduce test of whether scLLMs actually learn perturbation-relevant biology beyond what trivial baselines capture. The headline finding was meant not as a dismissal of scGPT and GEARS but as evidence that current perturbation benchmarks fail to reward the kind of biology foundation models are supposed to learn.'
    method: 'Linear baselines were trained on the same held-out perturbation splits used by scGPT and GEARS, with identical preprocessing and evaluation protocols. The independent evaluation isolated model choice as the only variable, removing the pipeline confounds that had distorted prior cross-method comparisons in the perturbation-prediction literature.'
    result: 'Linear models matched or beat scGPT and GEARS on held-out perturbations, making this the citation to reach for when defending the use of strong baselines. The paper became a central reference in the 2025 single-cell foundation model reckoning. The open question is which post-reckoning benchmarks will eventually separate the methods cleanly.'
- id: biollm
  kind: benchmark
  modality: single-cell-rna
  name: BioLLM
  url: https://github.com/BGIResearch/BioLLM
  topics:
  - eval
  - benchmark
  why: Standardized benchmarking framework running scBERT, Geneformer, scGPT, and scFoundation through unified APIs for fair comparison.
  papermap_category: reckoning
  description: 'BioLLM is a standardised benchmarking framework from BGI Research that runs scBERT, Geneformer, scGPT, and scFoundation through unified APIs, enabling fair comparison without the per-method boilerplate that usually distorts evaluations. The contribution is infrastructural: by isolating preprocessing, tokenisation, and inference behind a common interface, BioLLM removes the most common confounds in cross-model comparisons and exposes the underlying performance gaps. That role is particularly important after the 2025 reckoning, since the post-reckoning conversation has hinged on whether reported gains came from the models or from inconsistent evaluation pipelines. As an open release from a major Chinese genomics institute it is reusable and well-positioned to grow as new scLLMs appear. The open question is which evaluation protocols become the community defaults inside BioLLM, since the choice of held-out splits and metrics will largely determine which models look strong over the next benchmarking cycle.'
  qa:
