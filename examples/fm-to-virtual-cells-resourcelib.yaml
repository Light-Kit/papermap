  why: Cell-as-token sc-FM; beats scGPT/Geneformer on cell-typing cheaply.
  papermap_category: scfm
  description: 'A cell-as-token sc-FM that treats whole cells (rather than individual genes) as the basic unit, reporting cell-typing accuracy above scGPT and Geneformer at substantially lower compute. Its importance is showing that the genes-as-tokens orthodoxy inherited from NLP was not the only viable choice, and that the cheaper alternative competes on the most-cited downstream task without giving up much downstream flexibility. This matters for the cost narrative around sc-FMs, because it undercuts the implicit assumption that bigger token-counts and longer context windows are necessary for cell-typing performance and that more compute is the obvious lever. Open: how the cell-token design holds up on the harder axes — perturbation, dynamics, multimodal integration — where the field''s headline failures sit, since cell-typing is exactly the task FMs were already strongest on.'
  qa:
    did: 'CellPLM introduced a cell-as-token single-cell foundation model that treats whole cells, rather than individual genes, as the basic unit. Published at ICLR 2024 by Wen et al., it reported cell-typing accuracy above scGPT and Geneformer at substantially lower compute, challenging the gene-as-token orthodoxy inherited from NLP.'
    purpose: 'The aim was to test whether the gene-as-token recipe inherited from NLP was load-bearing or merely conventional. If treating cells as tokens worked as well or better at lower cost, the implicit assumption that bigger context windows and more tokens drive sc-FM performance would lose its grip on the field''s compute narrative.'
    method: 'Each cell is encoded as a single token built from its expression profile, and a transformer is pretrained over sequences of cells drawn from related tissue contexts. Pretraining objectives blend masked-cell prediction with reconstruction, and downstream cell-type classification heads attach to the cell-level embedding rather than to per-gene attention outputs.'
    result: 'CellPLM beat scGPT and Geneformer on cell-typing benchmarks at materially lower compute cost, validating the cell-as-token bet on the task sc-FMs were already strongest on. Whether the design holds up on the harder axes — perturbation, dynamics, multimodal integration — where the field''s headline failures sit is the open follow-up question.'
