  why: Diffusion model generating full response distributions for perturbation prediction; massively outperforms GEARS on standard benchmarks but has not yet faced the most rigorous evaluations (Nature Methods, 2026).
  papermap_category: other_fm
  year: 2026
  venue: Nature Methods
  status: published
  description: Squidiff is a 2026 Nature Methods paper introducing a diffusion model that generates full response distributions for single-cell perturbation prediction, reporting large gains over GEARS on standard benchmarks. The diffusion framing places it alongside CellFlow in the distributional-generation school of perturbation modelling, against the embedding-shift methods like scGPT-perturbation and the GRN-simulation methods like CellOracle. The caveat the authors themselves flag, and that the post-reckoning reader should hold onto, is that Squidiff has not yet faced the most rigorous evaluations — particularly the linear-baseline comparisons and the metric critiques raised in 2025-2026 — so the magnitude of the reported gains may shrink under harder scrutiny. As a fresh peer-reviewed release with open code, it is nevertheless one of the more credible recent entrants in the field. The open question is how it performs on combinatorial and held-out-perturbation benchmarks.
  qa:
    did: 'Squidiff, a 2026 Nature Methods paper, introduced a diffusion model that generates full response distributions for single-cell perturbation prediction. It reports large gains over GEARS on standard benchmarks and joins CellFlow in the distributional-generation school, against embedding-shift methods like scGPT-perturbation and GRN methods like CellOracle.'
    purpose: 'The aim was to push perturbation prediction beyond mean-shift estimation by modelling the full conditional distribution of cell states after perturbation, using a diffusion backbone for tractable sampling. Diffusion captures heterogeneity across cells in a single perturbation condition, which is the headline failure mode of embedding-shift methods.'
    method: 'A diffusion model is trained to sample from the conditional distribution of perturbed cell states given a control distribution and perturbation identity. At inference it generates response populations rather than point predictions, plugging into standard distributional-metric evaluation rather than the MSE-style metrics used by older predictors.'
    result: 'Squidiff reports large gains over GEARS on standard benchmarks with open code, making it one of the more credible recent entrants. The authors flag that it has not yet faced the linear-baseline comparisons or metric critiques raised in 2025-2026, so gains may shrink. Combinatorial and held-out-perturbation benchmarks are the next test.'
- id: torchcfm
