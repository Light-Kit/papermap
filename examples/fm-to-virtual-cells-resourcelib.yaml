  org_type: industry
  region: EU
  why: Pharma pathology AI division.
  description: Roche division responsible for tissue diagnostics including the Ventana and NavigatorAI portfolios, the in-house pharma counterpart to the independent pathology-AI vendors. Relevance here is that Roche has both a deployed clinical-pathology footprint and a diagnostics business model that gives it a different cost structure and regulatory pathway than venture-funded pathology-FM startups. As the pathology vertical consolidates, with Modella going to AstraZeneca and PathChat-Dx winning FDA Breakthrough, Roche in-house play is the incumbent benchmark for what a fully integrated pharma-owned pathology-AI capability looks like. Open question is whether Roche develops its own foundation models, licenses externally, or stays focused on the assay-plus-algorithm pairings that fit its companion-diagnostic franchises. Useful as the reference for what a non-acquisition path to vertical pathology AI inside pharma actually looks like.
- id: jpm-2026-lilly-nvidia
  kind: move
