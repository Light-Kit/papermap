  why: 98B-param multimodal protein FM; generated esmGFP de novo; cleanest compute disclosure.
  papermap_category: other_fm
  description: 'EvolutionaryScale''s 98B-parameter multimodal protein foundation model, published in 2025, which extended the ESM line from sequence-only masked language modelling to a model that reasons jointly over sequence, structure, and function tokens. The headline result was the de novo generation of esmGFP, a fluorescent protein with no close homolog in nature, demonstrated experimentally and held up as evidence that the model is doing more than interpolation. ESM-3 also stood out at release for unusually clean compute disclosure, which made it one of the few large protein FMs whose training-cost claims could be independently sanity-checked rather than taken on faith. The launch marked the moment when the protein-FM frontier moved from FAIR''s research line into a venture-funded company building specifically around scaled protein generation. The open issues are the usual ones at this scale: licensing terms, what fraction of generated proteins actually fold and function in the wet lab, and whether the multimodal gains transfer to the standard zero-shot benchmarks ESM-2 still anchors.'
  qa:
    did: 'ESM-3 is EvolutionaryScale''s 98-billion-parameter multimodal protein foundation model, published in 2025. It extended the ESM line from sequence-only masked language modelling to joint reasoning over sequence, structure, and function tokens, and de novo generated esmGFP — a fluorescent protein with no close homolog in nature, validated experimentally.'
    purpose: 'The aim was to move the protein-FM frontier from sequence-only pretraining into a multimodal generative regime that designs new proteins from scratch. The esmGFP demonstration was framed as evidence the model goes beyond interpolation, anchoring EvolutionaryScale''s pitch as a venture-funded company building specifically around scaled protein generation.'
    method: 'ESM-3 is a 98B-parameter transformer trained jointly over sequence, structure, and function tokens, extending masked-language-model recipes to a multimodal token vocabulary. Generation conditions on partial tokens across modalities, and the release stood out for unusually clean compute disclosure that let training-cost claims be independently sanity-checked.'
    result: 'ESM-3 de novo generated esmGFP, a fluorescent protein with no close homolog, demonstrated experimentally as the headline functional result. The launch marked the frontier moving from FAIR''s research line into a venture-funded company, with open issues around licensing, wet-lab success rates of generated proteins, and zero-shot transfer.'
