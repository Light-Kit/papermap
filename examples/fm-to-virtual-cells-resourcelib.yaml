  region: US
  why: First big-pharma acquisition of an AI-FM firm.
  description: 'AstraZeneca acquisition of Modella AI, announced at JPMorgan Healthcare 2026, marking the first big-pharma acquisition of a dedicated AI foundation-model company in the bio space. The deal lands in pathology, which is the vertical with the clearest line from FM capability to deployed diagnostic, and it crystallises a structural question that had been hanging over the entire bio-FM startup landscape: do these companies grow into independent platforms or get absorbed into pharma as capability acquisitions. The early answer, at least in pathology, is the latter. The deal also raises the comparison set for other pathology-FM teams and reframes the sc-FM and protein-FM verticals, which are watching to see whether the same logic applies once a clinical pathway emerges. Open is the integration question and whether the Modella FM stack stays externally available.'
- id: pathchat-dx-fda-breakthrough
  kind: move
  modality: pathology
  name: PathChat-DX FDA Breakthrough Designation
  year: 2025
  topics:
  - pathology
  - agents
  - clinical
  status: announced
  org_type: academic
  region: US
  why: First generative-AI pathology tool to win FDA Breakthrough.
  description: 'PathChat-Dx, the diagnostic-grade descendant of the PathChat generative pathology system from the Mahmood lab, became the first generative-AI pathology tool to receive FDA Breakthrough Device designation in 2025. The significance is regulatory rather than purely technical: it establishes that the FDA is willing to engage with a generative, conversational pathology workflow rather than just a single-task classifier, which is the dominant prior approval pattern in computational pathology. That opens a pathway for other pathology-FM efforts (UNI, Virchow, TITAN-derived tools) to plan for clinical deployment rather than only research use. It also strengthens the read that pathology is the most advanced clinical vertical for the current FM wave. Open is what the Breakthrough designation translates into in terms of actual clearance scope and labelling, and whether subsequent generative tools follow the same pathway.'
- id: cz-biohub-vc-program-launch
  kind: event
  modality: single-cell-rna
  name: CZ Biohub Virtual Cell Program launch
  year: 2024
  url: https://chanzuckerberg.com/science/programs-resources/virtual-cells-initiative/
  topics:
  - virtual-cell
  - foundation-model
  status: launched
  org_type: foundation
  region: US
  why: Multi-billion-dollar non-dilutive commitment to virtual cells.
  description: 'Chan Zuckerberg Initiative 2024 launch of its Virtual Cells program, a multi-year, multi-billion-dollar non-dilutive commitment that has effectively defined the framing of virtual cell as a research target in the foundation-model era. The program funds data generation (perturbation atlases, multimodal single-cell datasets), benchmarks, and model development, and it organises a community around shared infrastructure including CELLxGENE and the virtual-cell benchmarks suite. Its relevance is structural: by putting non-dilutive money behind both data and evaluation, CZI shifts the field away from the publish-a-model-and-claim-emergence pattern that the 2025 sc-FM reckoning critiqued, toward a more discipline-like evaluation regime. Open question is whether the chosen benchmarks become field standard or whether competing efforts from Arc, Polaris, and academic groups fragment the evaluation landscape over the next two to three years.'
- id: arc-virtual-cell-challenge-event
  kind: event
  modality: single-cell-rna
  name: Arc Virtual Cell Challenge 2025
  url: https://virtualcellchallenge.org/
  topics:
  - virtual-cell
  - eval
  - competition
  status: launched
  org_type: foundation
  region: US
  why: Community benchmark with $50k prize; first formal VC evaluation.
  description: Community competition organised around the virtual-cell prediction task, with a $50k prize and the distinction of being the first formal external evaluation that the virtual-cell modelling community has actually committed to. The structure matters because it forces submissions onto a shared held-out task rather than the model-side leaderboards that the 2025 reckoning showed could be gamed by linear baselines if the eval design was loose. Hosting at Arc, alongside STATE and Tahoe-100M, also gives the competition data-side credibility that purely academic benchmarks have struggled to match. Open is the question of which task definition the challenge converges on (unseen perturbations, unseen cell types, both), how the leaderboard composition shifts as more groups submit, and whether the winners come from sc-FM scaling or simpler models tuned for the specific objective.
- id: lahnemann-challenges-2020
  kind: review
  modality: single-cell-rna
  name: Eleven grand challenges in single-cell data science
  authors: Lähnemann et al.
  venue: Genome Biology
  year: 2020
  topics:
  - single-cell
  status: published
  org_type: academic
  region: EU
  why: Pre-FM landscape framing — what needed solving before the wave hit.
  description: '2020 review surveying the open problems in single-cell genomics analysis just before the foundation-model wave reframed the field. The value of going back to this paper is that it documents what the community thought needed solving (batch effects, doublet detection, trajectory inference, integration across modalities) and how it expected to solve it (specialised statistical methods, mostly), which gives you a clean baseline for assessing what the sc-FM era has and has not delivered. Read alongside the 2025 reckoning literature, it makes the contrast sharper: many of the listed challenges remained genuinely hard, and the foundation-model approach addressed some (integration) but not others (causal perturbation prediction). Useful as the pre-FM landscape framing that newer overviews tend to take for granted, and as a check against narratives that the FM wave was the only path forward for the discipline.'
