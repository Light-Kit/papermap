    did: 'DrugCLIP, a 2023 NeurIPS paper from a Chinese academic group, ported the CLIP contrastive-learning recipe to protein-molecule retrieval. It provides a zero-shot virtual-screening baseline by embedding proteins and small molecules into a shared space, where retrieval substitutes for traditional docking-score ranking.'
    purpose: 'The aim was less about beating docking on accuracy and more about establishing that pretraining-then-retrieve is a viable alternative to scoring-function-based virtual screens. The embeddings then became a reusable substrate for downstream systems like DrugReflector, anchoring a CLIP-style lineage between geometric methods and agentic screening pipelines.'
    method: 'A contrastive objective aligns protein and small-molecule encoders in a shared embedding space, mirroring image-text CLIP but on protein-ligand pairs. At inference, virtual screens query the molecule index against a target-protein embedding, producing a retrieval ranking that replaces structure-based docking scores.'
    result: 'DrugCLIP demonstrated that CLIP-style protein-molecule retrieval is a workable zero-shot virtual screen, and the embeddings have been reused by DrugReflector and other successor systems. The three-year-old open question is how well retrieval competes with structure-aware methods on prospective benchmarks where the test set is genuinely unseen.'
