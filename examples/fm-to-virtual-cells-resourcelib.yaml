  description: UNAGI is a time-series single-cell generative model published in Nature Biomedical Engineering in 2025 that learns disease trajectories from longitudinal scRNA-seq and then runs in-silico perturbation screens against them, framing it as a virtual-disease simulator rather than a static cell encoder. The interesting move is treating disease progression as the latent axis being modelled, so candidate interventions are scored by how well they reverse trajectory direction rather than by how they shift a single steady-state embedding. That positions UNAGI alongside PDGrapher and CellOracle as members of a small set of methods designed to be clinically actionable for target discovery, not just descriptive. From a US academic group, it adds a generative, drug-design-oriented entry to the virtual-cell stack. Whether the simulated trajectories generalise across patient cohorts and whether the perturbation rankings hold up in wet-lab validation are the obvious next questions.
