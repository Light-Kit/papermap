    method: 'scDiffusion applies diffusion-model machinery to single-cell expression vectors, treating gene expression as the target modality for iterative denoising. Conditioning on cell type, perturbation, or other covariates is injected into the denoising process to support targeted sample generation rather than only unconditional sampling from the learned distribution.'
