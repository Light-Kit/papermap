  why: Transfer learning framework for mapping new data to trained reference VAEs without retraining from scratch (Nature Biotechnology, 2021).
  year: 2021
  venue: Nature Biotechnology
  status: published
  description: 'scArches is a transfer-learning framework from the Theis lab published in Nature Biotechnology in 2021 that maps new single-cell datasets onto trained reference VAEs without retraining from scratch, using architectural surgery to inject new conditional inputs while freezing the backbone. The design is essentially parameter-efficient fine-tuning before that term migrated from NLP into single-cell tooling, and it remains the canonical way to extend a fitted scVI or totalVI model to a new study or batch. For the virtual-cell agenda its relevance is operational: most reference atlases in production use today rely on scArches-style mappings rather than full re-training, which keeps inference cheap and reproducible. As a maintained scverse component it is reliable to depend on. The open question is whether the conditional-injection trick extends cleanly to transformer-backed models, where the architectural surgery is less obviously analogous to the VAE case it was designed for.'
  qa:
    did: 'scArches is a transfer-learning framework from the Theis lab published in Nature Biotechnology 2021. It maps new single-cell datasets onto trained reference VAEs without retraining from scratch, using architectural surgery to inject new conditional inputs while freezing the backbone — parameter-efficient fine-tuning before that term migrated into single-cell tooling.'
    purpose: 'The aim was to make reference atlases reusable across studies without expensive retraining, so that adding a new dataset to an existing scVI or totalVI model becomes a localised parameter update rather than a full rebuild. That keeps reference-mapping inference cheap and reproducible at the scale modern atlases now operate.'
    method: 'A trained scVI or totalVI reference model is extended by adding new conditional-input branches and freezing the original backbone. Only the inserted parameters are fitted on the new dataset, so the architectural surgery mirrors PEFT in language models while preserving the reference embedding for downstream mapping.'
    result: 'scArches became the canonical way to extend a fitted scVI or totalVI model to a new study or batch, and most production reference-atlas pipelines rely on scArches-style mappings rather than full retraining. The open question is whether the conditional-injection trick extends cleanly to transformer-backed models where the surgery is less analogous.'
