  why: Time-series scRNA generative model used as a virtual-disease simulator for in-silico perturbation screens.
  description: UNAGI is a time-series single-cell generative model published in Nature Biomedical Engineering in 2025 that learns disease trajectories from longitudinal scRNA-seq and then runs in-silico perturbation screens against them, framing it as a virtual-disease simulator rather than a static cell encoder. The interesting move is treating disease progression as the latent axis being modelled, so candidate interventions are scored by how well they reverse trajectory direction rather than by how they shift a single steady-state embedding. That positions UNAGI alongside PDGrapher and CellOracle as members of a small set of methods designed to be clinically actionable for target discovery, not just descriptive. From a US academic group, it adds a generative, drug-design-oriented entry to the virtual-cell stack. Whether the simulated trajectories generalise across patient cohorts and whether the perturbation rankings hold up in wet-lab validation are the obvious next questions.
  qa:
    did: 'UNAGI introduced a time-series single-cell generative model in Nature Biomedical Engineering 2025 that learns disease trajectories from longitudinal scRNA-seq and runs in-silico perturbation screens against them. The system is framed as a virtual-disease simulator rather than a static cell encoder, scoring interventions by trajectory reversal.'
    purpose: 'The goal was to make perturbation screening clinically actionable for target discovery by treating disease progression itself as the latent axis being modelled. Scoring candidate interventions by how well they reverse trajectory direction, rather than shifting a single steady-state embedding, positions UNAGI alongside PDGrapher and CellOracle in the clinically-oriented virtual-cell stack.'
    method: 'A generative architecture is trained on longitudinal scRNA-seq so the latent space encodes disease-progression dynamics. Candidate perturbations are applied in silico and ranked by their effect on trajectory direction toward healthy reference states, rather than by static embedding shifts in a fixed cell-state space.'
    result: 'The Nature Biomedical Engineering paper reports a working trajectory-based perturbation screen from a US academic group, adding a generative drug-design entry to the virtual-cell stack. Open questions include whether the simulated trajectories generalise across patient cohorts and whether the perturbation rankings survive wet-lab validation.'
