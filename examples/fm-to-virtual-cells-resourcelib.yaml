  why: Autoencoder baseline the reckoning repeatedly tests FMs against.
  description: 'Compositional Perturbation Autoencoder from a European academic group, published in 2023 as an autoencoder baseline that learns disentangled representations of cell state and perturbation effect. CPA matters because it is the model the 2025-2026 reckoning literature on single-cell foundation models repeatedly tests them against, and on perturbation-prediction tasks the FMs often fail to clearly beat it. That makes CPA''s role somewhere between baseline and uncomfortable mirror: a relatively small, transparent autoencoder that captures enough of the structure of perturbation responses to set a hard floor for the more expensive sc-FMs. Open questions live in two directions: how far CPA-style architectures can be pushed with more data and better conditioning, and where exactly the gap is between CPA and FMs that justifies the much larger compute spend.'
  qa:
    did: 'CPA is the Compositional Perturbation Autoencoder from a European academic group, published in 2023 as an autoencoder baseline that learns disentangled representations of cell state and perturbation effect. It became the model the 2025-2026 single-cell-FM reckoning literature repeatedly tests against, often without being clearly beaten on perturbation-prediction tasks.'
    purpose: 'The aim was to disentangle baseline cell state from perturbation effect so that the two components can be recombined to predict held-out conditions. CPA is a relatively small, transparent autoencoder, which is exactly why the reckoning literature uses it as a hard floor against the much larger sc-FMs claiming perturbation-prediction progress.'
    method: 'CPA is an autoencoder that factorises the latent into a baseline cell-state component and a perturbation-effect component, then reconstructs the perturbed expression by composition. Disentanglement is enforced through architectural and adversarial constraints, letting unseen perturbations be predicted by combining a known cell-state vector with a known perturbation-effect vector.'
    result: 'CPA sets a hard floor on perturbation-prediction benchmarks that sc-foundation-models often fail to clearly clear, serving somewhere between baseline and uncomfortable mirror. Open questions live in two directions: how far CPA-style architectures can be pushed with more data and better conditioning, and where exactly the gap to FMs justifies their much larger compute spend.'
