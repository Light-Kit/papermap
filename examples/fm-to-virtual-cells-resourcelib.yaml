  qa:
    did: 'Wu et al. benchmarked six sc-FMs in Genome Biology in 2025 using cell-ontology-grounded metrics that respect the hierarchical structure of cell types instead of treating them as a flat label set. The work raises the evaluation floor for any future sc-FM release on cell-typing tasks by surfacing biologically meaningful misclassifications.'
    purpose: 'The aim was to expose what flat-accuracy reporting hides — that an sc-FM can be confidently wrong at biologically meaningful distances on the cell-type ontology and still look fine under a flat metric. Ontology-aware scoring forces the comparison to engage with what biologists actually care about, at low cost to the evaluator.'
    method: 'Six sc-FMs are evaluated on cell-typing across standard datasets using metrics that score predictions against the Cell Ontology hierarchy rather than as flat labels. Errors at small ontological distance — close-relative cell types — are penalised less than errors that confuse distant lineages, surfacing the qualitative structure of each model''s mistakes.'
    result: 'No single sc-FM consistently outperforms the others under ontology-grounded metrics, and the per-model failure modes look meaningfully different once ontology distance is exposed. Combined with the Nature Methods axis decomposition, the result raises the cell-typing evaluation floor — bare accuracy reporting is no longer sufficient for any release that wants to be taken seriously.'
