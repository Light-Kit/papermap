title: comp-bio PhD — full-time jobs (US & international)
subtitle: 'Full-time tracker for a computational-biology PhD — 947 employers and 1187 roles (industry
  FTE + academic postdocs) across the US and international markets. Filter Resources by United States
  vs International (modality) and research topic; region, sector, and role-type are in each card''s meta
  line. Eligibility is flagged as VISA SPONSORSHIP for a Chinese-national (PRC) candidate: China roles
  have no barrier (✓); US roles ride OPT + STEM-OPT (~36 months) then need H-1B/green-card sponsorship
  — US university/nonprofit postdocs are H-1B cap-exempt (✓), most big pharma/tech sponsor (✓/?), some
  employers state no sponsorship (✗); elsewhere needs a host work visa + employer support. Full-time reqs
  for 2027–2029 are not posted yet — rows show currently-open roles + careers/lab pages as the templates
  to monitor. The US-internships vault is separate.'
vocab:
  kind:
    org: A company, institute, or lab that hires comp-bio PhDs into full-time roles
    position: A specific full-time posting (industry FTE or academic postdoc) or recurring opening
