title: All FM in Biomedical Science
subtitle: A model-first vault of foundation models across biomedicine — single-cell, genomic, protein, pathology, radiology, clinical language, chemistry, and physiological signals — with the datasets, benchmarks, and labs each one depends on. Use Compare to line them up; open any card for its lineage.
vocab:
  kind:
    model: A biomedical foundation model (pretrained, general-purpose backbone)
    dataset: A data resource — atlas, screen, corpus
    benchmark: A leaderboard / evaluation suite
    org: Lab, institute, company, or consortium
    paper: Paper, preprint, or report
  modality:
  - single-cell-rna
  - genomic
  - protein
  - pathology
  - radiology
  - clinical-language
  - chemistry
  - physiological-signal
  - multimodal
  - spatial
