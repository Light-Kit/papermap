  # ── ecosystem (datasets the anchors train on) ────────────────────
  - {id: cellxgene-census, kind: dataset, label: CELLxGENE Census, modality: single-cell-rna, org_type: nonprofit, region: US, year: 2023, url: "https://chanzuckerberg.github.io/cellxgene-census/", topics: [single-cell], why: "CZI's harmonised single-cell atlas — the de facto pretraining corpus for sc-FMs."}
  - {id: uniref, kind: dataset, label: UniRef, modality: protein, year: 2007, url: "https://www.uniprot.org/help/uniref", topics: [protein], why: "Clustered UniProt sequences — the standard protein-LM pretraining source."}
  - {id: multispecies-genomes, kind: dataset, label: Multispecies genomes (NT corpus), modality: genomic, year: 2023, url: "https://huggingface.co/InstaDeepAI", topics: [genomic], why: "3,202 human genomes + 850 species assembled for Nucleotide Transformer."}
  - {id: pmc-15m, kind: dataset, label: PMC-15M, modality: multimodal, year: 2023, url: "https://arxiv.org/abs/2303.00915", topics: [multimodal], why: "15M biomedical figure–caption pairs mined from PubMed Central; BiomedCLIP's pretraining set."}
  - {id: pubchem, kind: dataset, label: PubChem, modality: chemistry, org_type: government, region: US, year: 2004, url: "https://pubchem.ncbi.nlm.nih.gov/", topics: [chemistry], why: "NIH chemical database; a primary molecular-FM pretraining source."}
