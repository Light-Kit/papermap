title: All FM in Biomedical Science
subtitle: A model-first vault of foundation models across biomedicine — single-cell, genomic, protein, pathology, radiology, clinical language, chemistry, and physiological signals — with the datasets, benchmarks, and labs each one depends on. Use Compare to line them up; open any card for its lineage.
vocab:
  kind:
    model: A biomedical foundation model (pretrained, general-purpose backbone)
    dataset: A data resource — atlas, screen, corpus
    benchmark: A leaderboard / evaluation suite
    org: Lab, institute, company, or consortium
    paper: Paper, preprint, or report
  modality:
    - single-cell-rna
    - genomic
    - protein
    - pathology
    - radiology
    - clinical-language
    - chemistry
    - physiological-signal
    - multimodal
    - spatial
  topics:
    - foundation-model
    - single-cell
    - genomic
    - protein
    - pathology
    - radiology
    - clinical
    - chemistry
    - signals
    - multimodal
    - spatial
    - generative
    - diffusion
    - structure-prediction
    - segmentation
papermap_relations:
  - {id: trained-on, label: Trained on, color: "#4e79a7"}
  - {id: evaluated-on, label: Evaluated on, color: "#59a14f"}
  - {id: derived-from, label: Derived from, color: "#e8924a"}
  - {id: from-org, label: From, color: "#9c6bab"}
papermap_edges:
  - [scgpt, cellxgene-census, trained-on]
  - [esm2, uniref, trained-on]
  - [nucleotide-transformer, multispecies-genomes, trained-on]
  - [biomedclip, pmc-15m, trained-on]
  - [molformer, pubchem, trained-on]
items:
  # ── anchor models (one per family) ───────────────────────────────
  - id: scgpt
    kind: model
    label: scGPT
    modality: single-cell-rna
    params: "~50M"
    architecture: "transformer (generative)"
    objective: "masked + generative gene/cell tokens"
    pretrain_data: "~33M cells (CELLxGENE)"
    context: "≤2048 genes"
    year: 2024
    released: "2023-05"
    license: "MIT"
    access: open-weights
    org_type: academic
    region: Canada
    url: "https://www.nature.com/articles/s41592-024-02201-0"
    weights: "https://github.com/bowang-lab/scGPT"
    topics: [single-cell, foundation-model]
    why: "Category-defining single-cell FM — genes and cells as tokens; the reckoning's main benchmark target."
  - id: esm2
    kind: model
    label: ESM-2
    modality: protein
    params: "15B (8M–15B family)"
    architecture: "transformer (encoder, BERT-style)"
    objective: "masked-residue"
    pretrain_data: "~65M sequences (UniRef50/90)"
    context: "1024 aa"
    year: 2022
    released: "2022-08"
    license: "MIT"
    access: open-weights
    org_type: industry
    region: US
    url: "https://www.science.org/doi/10.1126/science.ade2574"
    weights: "https://github.com/facebookresearch/esm"
    topics: [protein, foundation-model, structure-prediction]
    why: "Defined the protein-language-model category; backbone for ESMFold and most downstream protein tools."
  - id: nucleotide-transformer
    kind: model
    label: Nucleotide Transformer
    modality: genomic
    params: "2.5B (50M–2.5B family)"
    architecture: "transformer (encoder)"
    objective: "masked-language (k-mer tokens)"
    pretrain_data: "3,202 human genomes + 850 species"
    context: "~6 kb"
    year: 2024
    license: "CC-BY-NC-SA-4.0"
    access: open-weights
    org_type: industry
    region: UK
    url: "https://huggingface.co/InstaDeepAI/nucleotide-transformer-2.5b-multi-species"
    weights: "https://huggingface.co/InstaDeepAI"
    topics: [genomic, foundation-model]
    why: "One of the first large multispecies DNA language models; a standard genomic-FM baseline."
  - id: uni
    kind: model
    label: UNI
