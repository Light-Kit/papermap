title: comp-bio PhD internships — a live US tracker (2027 target)
subtitle: 'US summer-internship tracker for a computational-biology PhD candidate (F-1, CPT/OPT). 282
  companies/labs across pharma, ML-first biotech, big-tech bio, and academia, with the roles they post.
  Built from the 2026 cycle (open/closed) + recurring programs to learn timing, eligibility, and fit for
  Summer 2027 — filter Resources by sector (modality) and research topic; F-1 eligibility is flagged conservatively
  (✓ confirmed · ? verify per posting · ✗ citizenship/PR required). Blogs hold the landscape read, the
  fall-2026 application calendar, and the F-1 CPT/OPT playbook. Note: Summer-2027 postings open ~Sept
  2026–Mar 2027, so live 2027 links are not posted yet — rows show the recurring/closed-2026 templates
  they will follow.'
